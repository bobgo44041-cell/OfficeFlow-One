<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro PDF Editor | Stable Release</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%); user-select: none; min-height: 100vh; overflow-x: hidden; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .page-card-container { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-card-container.dragging .page-card-visual {
            opacity: 0.4;
            border: 2px dashed #6366f1;
            transform: scale(0.95);
            box-shadow: none;
        }
        
        .page-card-visual:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .card-selected .page-card-visual {
            ring: 3px solid #4f46e5;
            transform: translateY(-4px);
            background-color: #eef2ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;
        const { PDFDocument, degrees } = PDFLib;

        // --- Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    lucide.createIcons({ root: iconRef.current, nameAttrs: { 'data-lucide': [name] } });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        function App() {
            const getScopedStorageKey = () => {
                try {
                    const parentState =
                        localStorage.getItem('officeflow-one-embed-session') ||
                        localStorage.getItem('officeflow-one-mvp-state');
                    if (parentState) {
                        const parsed = JSON.parse(parentState);
                        const email = String(parsed?.session?.email || '').toLowerCase().trim();
                        if (email) return `pro-pdf-editor-session-v2-${email}`;
                    }
                } catch (error) {
                    console.warn('OfficeFlow session read failed:', error);
                }
                return 'pro-pdf-editor-session-v2-guest';
            };

            const STORAGE_KEY = getScopedStorageKey();
            const [pages, setPages] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [isProcessing, setIsProcessing] = useState(false);
            const [processingText, setProcessingText] = useState("");
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);
            const [isDragOver, setIsDragOver] = useState(false);
            const [history, setHistory] = useState([]);
            const [future, setFuture] = useState([]);
            const [rangeInput, setRangeInput] = useState("");
            const [showOptions, setShowOptions] = useState(false);
            const [previewIndex, setPreviewIndex] = useState(null);
            const [previewLoading, setPreviewLoading] = useState(false);
            const [isRestoringSession, setIsRestoringSession] = useState(false);
            const [outputOptions, setOutputOptions] = useState({
                mergeFileName: "Merged_Output",
                splitPrefix: "Split_PDFs",
                imagePrefix: "PDF_Images",
                pngPrefix: "PDF_PNG_Images",
                imageScale: 2,
                imageQuality: 0.9,
            });

            const dragCounter = useRef(0);
            const fileInputRef = useRef(null);
            const sessionImportRef = useRef(null);
            const previewCanvasRef = useRef(null);
            const dragItem = useRef(null);
            const dragOverItem = useRef(null);
            const prevPagesRef = useRef([]);
            const reorderSnapshotRef = useRef(null);
            const hasRestoredSessionRef = useRef(false);

            const clonePagesState = useCallback((sourcePages) => (
                sourcePages.map((page) => ({ ...page }))
            ), []);

            const getPageId = () => {
                if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                    return window.crypto.randomUUID();
                }
                return `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
            };

            const collectTrackedUrls = useCallback((statePages = [], historyStates = [], futureStates = []) => {
                const liveUrls = new Set();
                const addPages = (pageList) => {
                    for (const page of pageList) {
                        if (page && page.imageObjectUrl) liveUrls.add(page.imageObjectUrl);
                    }
                };

                addPages(statePages);
                for (const snapshot of historyStates) addPages(snapshot);
                for (const snapshot of futureStates) addPages(snapshot);
                return liveUrls;
            }, []);

            const commitPagesChange = useCallback((updater) => {
                setPages((currentPages) => {
                    const updatedPages = typeof updater === 'function' ? updater(currentPages) : updater;
                    const safePages = Array.isArray(updatedPages) ? updatedPages : currentPages;
                    const currentSnapshot = clonePagesState(currentPages);
                    const nextSnapshot = clonePagesState(safePages);
                    setHistory((prev) => [...prev, currentSnapshot]);
                    setFuture([]);
                    return nextSnapshot;
                });
            }, [clonePagesState]);

            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                }

                const preventGlobalDrop = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                };

                window.addEventListener('dragover', preventGlobalDrop);
                window.addEventListener('drop', preventGlobalDrop);

                return () => {
                    window.removeEventListener('dragover', preventGlobalDrop);
                    window.removeEventListener('drop', preventGlobalDrop);
                };
            }, []);

            useEffect(() => {
                const liveUrls = collectTrackedUrls(pages, history, future);
                for (const page of prevPagesRef.current) {
                    if (page.imageObjectUrl && !liveUrls.has(page.imageObjectUrl)) {
                        URL.revokeObjectURL(page.imageObjectUrl);
                    }
                }
                prevPagesRef.current = pages;
            }, [pages, history, future, collectTrackedUrls]);

            useEffect(() => {
                const currentIds = new Set(pages.map((page) => page.id));
                setSelectedIds((prev) => {
                    const next = new Set([...prev].filter((id) => currentIds.has(id)));
                    if (next.size === prev.size) return prev;
                    return next;
                });
                setPreviewIndex((prev) => {
                    if (prev === null) return prev;
                    if (pages.length === 0) return null;
                    return Math.min(prev, pages.length - 1);
                });
            }, [pages]);

            useEffect(() => {
                return () => {
                    const liveUrls = collectTrackedUrls(prevPagesRef.current, history, future);
                    for (const objectUrl of liveUrls) {
                        URL.revokeObjectURL(objectUrl);
                    }
                };
            }, [history, future, collectTrackedUrls]);

            useEffect(() => {
                if (hasRestoredSessionRef.current) return;
                hasRestoredSessionRef.current = true;

                const restoreSession = async () => {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return;

                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed.outputOptions) {
                            setOutputOptions((prev) => ({ ...prev, ...parsed.outputOptions }));
                        }
                        if (!Array.isArray(parsed.pages) || parsed.pages.length === 0) return;

                        setIsRestoringSession(true);
                        setIsProcessing(true);
                        setProcessingText("이전 작업 복원 중...");
                        const restorePdfJsCache = new Map();
                        const restoredPages = [];

                        for (const savedPage of parsed.pages) {
                            const pdfBytes = base64ToArrayBuffer(savedPage.pdfBase64);
                            const restoredPage = await createPageEntry({
                                pdfBytes,
                                pdfBase64: savedPage.pdfBase64,
                                pageIndex: savedPage.pageIndex,
                                originFileName: savedPage.originFileName,
                                rotation: savedPage.rotation || 0,
                            }, restorePdfJsCache);
                            restoredPages.push(restoredPage);
                        }

                        setPages(restoredPages);
                        setHistory([]);
                        setFuture([]);
                        setSelectedIds(new Set());
                    } catch (error) {
                        console.error(error);
                        localStorage.removeItem(STORAGE_KEY);
                    } finally {
                        setIsRestoringSession(false);
                        setIsProcessing(false);
                    }
                };

                restoreSession();
            }, []);

            useEffect(() => {
                if (isRestoringSession) return;

                const payload = {
                    pages: pages
                        .filter((page) => page.pdfBase64)
                        .map((page) => ({
                            pdfBase64: page.pdfBase64,
                            pageIndex: page.pageIndex,
                            originFileName: page.originFileName,
                            rotation: page.rotation,
                        })),
                    outputOptions,
                };

                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            }, [pages, outputOptions, isRestoringSession]);

            useEffect(() => {
                if (previewIndex === null) return undefined;

                const handlePreviewKeydown = (event) => {
                    if (event.key === 'Escape') {
                        setPreviewIndex(null);
                    } else if (event.key === 'ArrowRight') {
                        setPreviewIndex((current) => Math.min((current ?? 0) + 1, pages.length - 1));
                    } else if (event.key === 'ArrowLeft') {
                        setPreviewIndex((current) => Math.max((current ?? 0) - 1, 0));
                    }
                };

                window.addEventListener('keydown', handlePreviewKeydown);
                return () => window.removeEventListener('keydown', handlePreviewKeydown);
            }, [previewIndex, pages.length]);

            useEffect(() => {
                if (previewIndex === null || !pages[previewIndex]) {
                    setPreviewLoading(false);
                    if (previewCanvasRef.current) {
                        const canvas = previewCanvasRef.current;
                        const context = canvas.getContext('2d');
                        context.clearRect(0, 0, canvas.width, canvas.height);
                    }
                    return undefined;
                }

                let isCancelled = false;
                const previewPdfJsCache = new Map();

                const renderPreview = async () => {
                    setPreviewLoading(true);
                    try {
                        const pageData = pages[previewIndex];
                        const pdf = await getPdfJsDocCached(previewPdfJsCache, pageData.pdfBytes);
                        const page = await pdf.getPage(pageData.pageIndex + 1);
                        const totalRotation = (page.rotate + pageData.rotation) % 360;
                        const viewport = page.getViewport({ scale: 2.2, rotation: totalRotation });
                        const canvas = previewCanvasRef.current;
                        if (!canvas) return;
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        context.fillStyle = "white";
                        context.fillRect(0, 0, canvas.width, canvas.height);
                        await page.render({ canvasContext: context, viewport }).promise;
                    } catch (error) {
                        console.error(error);
                        const fallbackPage = pages[previewIndex];
                        const canvas = previewCanvasRef.current;
                        if (canvas && fallbackPage) {
                            const context = canvas.getContext('2d');
                            const fallbackImage = new Image();
                            fallbackImage.onload = () => {
                                canvas.width = fallbackImage.width;
                                canvas.height = fallbackImage.height;
                                context.clearRect(0, 0, canvas.width, canvas.height);
                                context.save();
                                if (fallbackPage.rotation) {
                                    const radians = (fallbackPage.rotation * Math.PI) / 180;
                                    if (fallbackPage.rotation === 90 || fallbackPage.rotation === 270) {
                                        canvas.width = fallbackImage.height;
                                        canvas.height = fallbackImage.width;
                                    }
                                    context.translate(canvas.width / 2, canvas.height / 2);
                                    context.rotate(radians);
                                    context.drawImage(fallbackImage, -fallbackImage.width / 2, -fallbackImage.height / 2);
                                } else {
                                    context.drawImage(fallbackImage, 0, 0);
                                }
                                context.restore();
                            };
                            fallbackImage.src = fallbackPage.imageSrc;
                        }
                    } finally {
                        if (!isCancelled) setPreviewLoading(false);
                    }
                };

                renderPreview();

                return () => {
                    isCancelled = true;
                };
            }, [previewIndex, pages]);

            const getPdfJsDocCached = async (cache, pdfBytes) => {
                let pdfPromise = cache.get(pdfBytes);
                if (!pdfPromise) {
                    const loadingTask = pdfjsLib.getDocument({
                        data: new Uint8Array(pdfBytes),
                        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
                        cMapPacked: true,
                    });
                    pdfPromise = loadingTask.promise;
                    cache.set(pdfBytes, pdfPromise);
                }
                return pdfPromise;
            };

            const getPdfLibDocCached = async (cache, pdfBytes) => {
                let doc = cache.get(pdfBytes);
                if (!doc) {
                    doc = await PDFDocument.load(pdfBytes);
                    cache.set(pdfBytes, doc);
                }
                return doc;
            };

            const normalizeFileName = (value, fallback) => {
                const normalized = (value || fallback || "output").trim().replace(/[\\/:*?"<>|]+/g, "_");
                return normalized || fallback || "output";
            };

            const arrayBufferToBase64 = (buffer) => {
                const bytes = new Uint8Array(buffer);
                let binary = '';
                const chunkSize = 0x8000;
                for (let i = 0; i < bytes.length; i += chunkSize) {
                    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
                }
                return btoa(binary);
            };

            const base64ToArrayBuffer = (base64) => {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i += 1) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes.buffer;
            };

            const createPageEntry = async ({ pdfBytes, pdfBase64, pageIndex, originFileName, rotation = 0 }, pdfJsCache, thumbnailScale = 0.5) => {
                const pdf = await getPdfJsDocCached(pdfJsCache, pdfBytes);
                const page = await pdf.getPage(pageIndex + 1);
                const viewport = page.getViewport({ scale: thumbnailScale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport }).promise;
                const thumbnailBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.75));
                if (!thumbnailBlob) throw new Error("썸네일 생성 실패");
                const imageObjectUrl = URL.createObjectURL(thumbnailBlob);

                return {
                    id: getPageId(),
                    pdfBytes,
                    pdfBase64,
                    pageIndex,
                    originFileName,
                    imageSrc: imageObjectUrl,
                    imageObjectUrl,
                    rotation,
                };
            };

            const updateOutputOption = (key, value) => {
                setOutputOptions((prev) => ({ ...prev, [key]: value }));
            };

            const triggerDownload = (blobData, fileName, mimeType) => {
                const blob = new Blob([blobData], { type: mimeType });
                const link = document.createElement('a');
                const objectUrl = URL.createObjectURL(blob);
                link.href = objectUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
            };

            const processFiles = async (files) => {
                if (files.length === 0) return;
                setIsProcessing(true);
                setProcessingText("PDF 분석 및 페이지 추출 중...");
                const uploadPdfJsCache = new Map();

                try {
                    const newPages = [];
                    for (const file of files) {
                        if (file.type !== 'application/pdf') continue;
                        const arrayBuffer = await file.arrayBuffer();
                        const pdfDoc = await PDFDocument.load(arrayBuffer);
                        const pageCount = pdfDoc.getPageCount();
                        const pdfBase64 = arrayBufferToBase64(arrayBuffer);

                        for (let i = 0; i < pageCount; i++) {
                            const pageEntry = await createPageEntry({
                                pdfBytes: arrayBuffer,
                                pdfBase64,
                                pageIndex: i,
                                originFileName: file.name,
                                rotation: 0,
                            }, uploadPdfJsCache);
                            newPages.push(pageEntry);
                        }
                    }

                    if (newPages.length > 0) {
                        commitPagesChange((prev) => [...prev, ...newPages]);
                    }
                } catch (error) {
                    alert(`오류 발생: ${error.message}`);
                    console.error(error);
                } finally {
                    for (const pdfPromise of uploadPdfJsCache.values()) {
                        try {
                            const pdf = await pdfPromise;
                            if (pdf && typeof pdf.cleanup === 'function') pdf.cleanup();
                            if (pdf && typeof pdf.destroy === 'function') await pdf.destroy();
                        } catch (cleanupError) {
                            console.error(cleanupError);
                        }
                    }
                    setIsProcessing(false);
                    if (fileInputRef.current) fileInputRef.current.value = "";
                    setIsDragOver(false);
                    dragCounter.current = 0;
                }
            };

            const handleFileUpload = (e) => processFiles(Array.from(e.target.files));

            const handleDragEnter = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter.current += 1;
                if (e.dataTransfer.items && e.dataTransfer.items.length > 0) {
                    setIsDragOver(true);
                }
            }, []);

            const handleDragLeave = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter.current -= 1;
                if (dragCounter.current <= 0) {
                    setIsDragOver(false);
                    dragCounter.current = 0;
                }
            }, []);

            const handleDrop = useCallback((e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragOver(false);
                dragCounter.current = 0;
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processFiles(Array.from(e.dataTransfer.files));
                }
            }, []);

            const onDragStart = (e, index) => {
                reorderSnapshotRef.current = clonePagesState(pages);
                dragItem.current = index;
                setDraggedItemIndex(index);
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", index);
            };

            const onDragEnterCard = (e, index) => {
                if (dragItem.current === null) return;

                dragOverItem.current = index;
                if (dragItem.current !== index) {
                    const copyListItems = [...pages];
                    const dragItemContent = copyListItems[dragItem.current];
                    if (!dragItemContent) return;

                    copyListItems.splice(dragItem.current, 1);
                    copyListItems.splice(dragOverItem.current, 0, dragItemContent);

                    dragItem.current = index;
                    setDraggedItemIndex(index);
                    setPages(copyListItems);
                }
            };

            const onDragEnd = () => {
                const beforeReorder = reorderSnapshotRef.current;
                const afterReorder = clonePagesState(pages);
                const hasChanged = beforeReorder && JSON.stringify(beforeReorder.map((page) => page.id)) !== JSON.stringify(afterReorder.map((page) => page.id));
                if (hasChanged) {
                    setHistory((prev) => [...prev, beforeReorder]);
                    setFuture([]);
                }
                reorderSnapshotRef.current = null;
                dragItem.current = null;
                dragOverItem.current = null;
                setDraggedItemIndex(null);
            };

            const toggleSelection = (id) => {
                setSelectedIds((prev) => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const selectAll = () => {
                if (pages.length === 0) return;
                if (selectedIds.size === pages.length) setSelectedIds(new Set());
                else setSelectedIds(new Set(pages.map((page) => page.id)));
            };

            const selectOddPages = () => {
                setSelectedIds(new Set(pages.filter((_, index) => index % 2 === 0).map((page) => page.id)));
            };

            const selectEvenPages = () => {
                setSelectedIds(new Set(pages.filter((_, index) => index % 2 === 1).map((page) => page.id)));
            };

            const invertSelection = () => {
                setSelectedIds(new Set(pages.filter((page) => !selectedIds.has(page.id)).map((page) => page.id)));
            };

            const handleRangeSelect = () => {
                if (!rangeInput.trim() || pages.length === 0) return;
                const parsed = new Set();
                const segments = rangeInput.split(',').map((part) => part.trim()).filter(Boolean);

                for (const segment of segments) {
                    if (/^\d+$/.test(segment)) {
                        const pageNumber = Number(segment);
                        if (pageNumber >= 1 && pageNumber <= pages.length) parsed.add(pages[pageNumber - 1].id);
                        continue;
                    }

                    const rangeMatch = segment.match(/^(\d+)\s*-\s*(\d+)$/);
                    if (!rangeMatch) {
                        alert("범위 형식이 올바르지 않습니다. 예: 1-3, 5, 8-10");
                        return;
                    }

                    let start = Number(rangeMatch[1]);
                    let end = Number(rangeMatch[2]);
                    if (start > end) [start, end] = [end, start];
                    for (let pageNumber = start; pageNumber <= end; pageNumber += 1) {
                        if (pageNumber >= 1 && pageNumber <= pages.length) {
                            parsed.add(pages[pageNumber - 1].id);
                        }
                    }
                }

                if (parsed.size === 0) {
                    alert("선택할 페이지를 찾지 못했습니다.");
                    return;
                }

                setSelectedIds(parsed);
            };

            const undo = () => {
                if (history.length === 0) return;
                const previous = history[history.length - 1];
                const currentSnapshot = clonePagesState(pages);
                setHistory((prev) => prev.slice(0, -1));
                setFuture((prev) => [currentSnapshot, ...prev]);
                setPages(clonePagesState(previous));
                dragItem.current = null;
                dragOverItem.current = null;
                setDraggedItemIndex(null);
            };

            const redo = () => {
                if (future.length === 0) return;
                const [nextState, ...rest] = future;
                const currentSnapshot = clonePagesState(pages);
                setFuture(rest);
                setHistory((prev) => [...prev, currentSnapshot]);
                setPages(clonePagesState(nextState));
                dragItem.current = null;
                dragOverItem.current = null;
                setDraggedItemIndex(null);
            };

            const clonePageThumbnail = async (page) => {
                const response = await fetch(page.imageSrc);
                const blob = await response.blob();
                const imageObjectUrl = URL.createObjectURL(blob);
                return {
                    ...page,
                    id: getPageId(),
                    imageSrc: imageObjectUrl,
                    imageObjectUrl,
                };
            };

            const duplicateSelected = async () => {
                const selectedPages = pages.filter((page) => selectedIds.has(page.id));
                if (selectedPages.length === 0) return;

                setIsProcessing(true);
                setProcessingText("선택 페이지 복제 중...");
                try {
                    const duplicatesById = new Map();
                    for (const page of selectedPages) {
                        duplicatesById.set(page.id, await clonePageThumbnail(page));
                    }

                    commitPagesChange((currentPages) => {
                        const nextPages = [];
                        for (const page of currentPages) {
                            nextPages.push(page);
                            if (duplicatesById.has(page.id)) {
                                nextPages.push(duplicatesById.get(page.id));
                            }
                        }
                        return nextPages;
                    });

                    setSelectedIds(new Set(selectedPages.map((page) => duplicatesById.get(page.id).id)));
                } catch (error) {
                    console.error(error);
                    alert("페이지 복제에 실패했습니다.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const resolveTargetPages = (onlySelected = false) => (
                onlySelected ? pages.filter((page) => selectedIds.has(page.id)) : pages
            );

            const downloadMergedPdf = async (onlySelected = false) => {
                const targetPages = resolveTargetPages(onlySelected);
                if (targetPages.length === 0) return;
                setIsProcessing(true);
                setProcessingText("PDF 병합 중...");

                try {
                    const newPdfDoc = await PDFDocument.create();
                    const pdfLibCache = new Map();
                    for (const pageData of targetPages) {
                        const srcDoc = await getPdfLibDocCached(pdfLibCache, pageData.pdfBytes);
                        const [copiedPage] = await newPdfDoc.copyPages(srcDoc, [pageData.pageIndex]);
                        copiedPage.setRotation(degrees((copiedPage.getRotation().angle + pageData.rotation) % 360));
                        newPdfDoc.addPage(copiedPage);
                    }

                    const pdfBytes = await newPdfDoc.save();
                    const baseName = normalizeFileName(outputOptions.mergeFileName, "Merged_Output");
                    triggerDownload(pdfBytes, `${baseName}${onlySelected ? "_selected" : ""}.pdf`, 'application/pdf');
                } catch (error) {
                    console.error(error);
                    alert("PDF 생성 실패");
                } finally {
                    setIsProcessing(false);
                    if (onlySelected) setSelectedIds(new Set());
                }
            };

            const downloadSplitPdf = async (onlySelected = false) => {
                const targetPages = resolveTargetPages(onlySelected);
                if (targetPages.length === 0) return;
                setIsProcessing(true);
                setProcessingText("파일 분할 중...");

                try {
                    const zip = new JSZip();
                    const folderName = normalizeFileName(outputOptions.splitPrefix, "Split_PDFs");
                    const folder = zip.folder(folderName);
                    const pdfLibCache = new Map();

                    for (let i = 0; i < targetPages.length; i += 1) {
                        const pageData = targetPages[i];
                        const singlePagePdf = await PDFDocument.create();
                        const srcDoc = await getPdfLibDocCached(pdfLibCache, pageData.pdfBytes);
                        const [copiedPage] = await singlePagePdf.copyPages(srcDoc, [pageData.pageIndex]);
                        copiedPage.setRotation(degrees((copiedPage.getRotation().angle + pageData.rotation) % 360));
                        singlePagePdf.addPage(copiedPage);

                        const pdfBytes = await singlePagePdf.save();
                        const safeName = pageData.originFileName.replace(/\.pdf$/i, '');
                        const fileName = `${(i + 1).toString().padStart(3, '0')}_${safeName}_p${pageData.pageIndex + 1}.pdf`;
                        folder.file(fileName, pdfBytes);
                    }

                    const content = await zip.generateAsync({ type: "blob" });
                    triggerDownload(content, `${folderName}${onlySelected ? "_selected" : ""}.zip`, 'application/zip');
                } catch (error) {
                    console.error(error);
                    alert("분할 실패");
                } finally {
                    setIsProcessing(false);
                    if (onlySelected) setSelectedIds(new Set());
                }
            };

            const downloadJpgs = async (onlySelected = false) => {
                const targetPages = resolveTargetPages(onlySelected);
                if (targetPages.length === 0) return;
                setIsProcessing(true);
                setProcessingText("이미지 변환 중...");
                const pdfJsCache = new Map();

                try {
                    const zip = new JSZip();
                    const folderName = normalizeFileName(outputOptions.imagePrefix, "PDF_Images");
                    const imgFolder = zip.folder(folderName);

                    for (let i = 0; i < targetPages.length; i += 1) {
                        setProcessingText(`이미지 변환 중... (${i + 1}/${targetPages.length})`);
                        const pageData = targetPages[i];
                        const pdf = await getPdfJsDocCached(pdfJsCache, pageData.pdfBytes);
                        const page = await pdf.getPage(pageData.pageIndex + 1);
                        const totalRotation = (page.rotate + pageData.rotation) % 360;
                        const viewport = page.getViewport({ scale: Number(outputOptions.imageScale), rotation: totalRotation });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        context.fillStyle = "white";
                        context.fillRect(0, 0, canvas.width, canvas.height);
                        await page.render({ canvasContext: context, viewport }).promise;
                        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', Number(outputOptions.imageQuality)));
                        if (!blob) throw new Error("JPG 변환 실패");

                        const safeName = pageData.originFileName.replace(/\.pdf$/i, '');
                        const fileName = `${(i + 1).toString().padStart(3, '0')}_${safeName}_p${pageData.pageIndex + 1}.jpg`;
                        imgFolder.file(fileName, blob);
                    }

                    setProcessingText("압축 파일 생성 중...");
                    const content = await zip.generateAsync({ type: "blob" });
                    triggerDownload(content, `${folderName}${onlySelected ? "_selected" : ""}.zip`, 'application/zip');
                } catch (error) {
                    console.error(error);
                    alert("이미지 변환 실패");
                } finally {
                    for (const pdfPromise of pdfJsCache.values()) {
                        try {
                            const pdf = await pdfPromise;
                            if (pdf && typeof pdf.cleanup === 'function') pdf.cleanup();
                            if (pdf && typeof pdf.destroy === 'function') await pdf.destroy();
                        } catch (cleanupError) {
                            console.error(cleanupError);
                        }
                    }
                    setIsProcessing(false);
                    if (onlySelected) setSelectedIds(new Set());
                }
            };

            const downloadPngs = async (onlySelected = false) => {
                const targetPages = resolveTargetPages(onlySelected);
                if (targetPages.length === 0) return;
                setIsProcessing(true);
                setProcessingText("PNG 변환 중...");
                const pdfJsCache = new Map();

                try {
                    const zip = new JSZip();
                    const folderName = normalizeFileName(outputOptions.pngPrefix, "PDF_PNG_Images");
                    const imgFolder = zip.folder(folderName);

                    for (let i = 0; i < targetPages.length; i += 1) {
                        setProcessingText(`PNG 변환 중... (${i + 1}/${targetPages.length})`);
                        const pageData = targetPages[i];
                        const pdf = await getPdfJsDocCached(pdfJsCache, pageData.pdfBytes);
                        const page = await pdf.getPage(pageData.pageIndex + 1);
                        const totalRotation = (page.rotate + pageData.rotation) % 360;
                        const viewport = page.getViewport({ scale: Number(outputOptions.imageScale), rotation: totalRotation });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport }).promise;
                        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
                        if (!blob) throw new Error("PNG 변환 실패");

                        const safeName = pageData.originFileName.replace(/\.pdf$/i, '');
                        const fileName = `${(i + 1).toString().padStart(3, '0')}_${safeName}_p${pageData.pageIndex + 1}.png`;
                        imgFolder.file(fileName, blob);
                    }

                    setProcessingText("압축 파일 생성 중...");
                    const content = await zip.generateAsync({ type: "blob" });
                    triggerDownload(content, `${folderName}${onlySelected ? "_selected" : ""}.zip`, 'application/zip');
                } catch (error) {
                    console.error(error);
                    alert("PNG 변환 실패");
                } finally {
                    for (const pdfPromise of pdfJsCache.values()) {
                        try {
                            const pdf = await pdfPromise;
                            if (pdf && typeof pdf.cleanup === 'function') pdf.cleanup();
                            if (pdf && typeof pdf.destroy === 'function') await pdf.destroy();
                        } catch (cleanupError) {
                            console.error(cleanupError);
                        }
                    }
                    setIsProcessing(false);
                    if (onlySelected) setSelectedIds(new Set());
                }
            };

            const rotatePage = (pageId) => {
                commitPagesChange((currentPages) => currentPages.map((page) => (
                    page.id === pageId ? { ...page, rotation: (page.rotation + 90) % 360 } : page
                )));
            };

            const rotateSelectedPages = () => {
                if (selectedIds.size === 0) return;
                commitPagesChange((currentPages) => currentPages.map((page) => (
                    selectedIds.has(page.id) ? { ...page, rotation: (page.rotation + 90) % 360 } : page
                )));
            };

            const deleteSelected = () => {
                if (selectedIds.size === 0) return;
                if (confirm(`${selectedIds.size}개의 페이지를 삭제하시겠습니까?`)) {
                    commitPagesChange((currentPages) => currentPages.filter((page) => !selectedIds.has(page.id)));
                    setSelectedIds(new Set());
                }
            };

            const clearAll = () => {
                if (pages.length === 0) return;
                if (confirm("모든 작업을 초기화 하시겠습니까?")) {
                    commitPagesChange([]);
                    setSelectedIds(new Set());
                    clearSavedSession();
                }
            };

            const clearSavedSession = () => {
                localStorage.removeItem(STORAGE_KEY);
            };

            const exportSession = () => {
                const payload = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    pages: pages
                        .filter((page) => page.pdfBase64)
                        .map((page) => ({
                            pdfBase64: page.pdfBase64,
                            pageIndex: page.pageIndex,
                            originFileName: page.originFileName,
                            rotation: page.rotation,
                        })),
                    outputOptions,
                };
                triggerDownload(JSON.stringify(payload, null, 2), `pdf_editor_session_${Date.now()}.json`, 'application/json');
            };

            const importSessionFile = async (event) => {
                const file = event.target.files?.[0];
                if (!file) return;

                if (pages.length > 0 && !confirm("현재 작업을 덮어쓰고 불러오시겠습니까?")) {
                    if (sessionImportRef.current) sessionImportRef.current.value = "";
                    return;
                }

                try {
                    setIsProcessing(true);
                    setProcessingText("작업 파일 불러오는 중...");
                    const raw = await file.text();
                    const parsed = JSON.parse(raw);
                    if (!Array.isArray(parsed.pages)) {
                        throw new Error("올바른 작업 파일이 아닙니다.");
                    }

                    const restorePdfJsCache = new Map();
                    const restoredPages = [];
                    for (const savedPage of parsed.pages) {
                        const pdfBytes = base64ToArrayBuffer(savedPage.pdfBase64);
                        const restoredPage = await createPageEntry({
                            pdfBytes,
                            pdfBase64: savedPage.pdfBase64,
                            pageIndex: savedPage.pageIndex,
                            originFileName: savedPage.originFileName,
                            rotation: savedPage.rotation || 0,
                        }, restorePdfJsCache);
                        restoredPages.push(restoredPage);
                    }

                    setPages(restoredPages);
                    setHistory([]);
                    setFuture([]);
                    setSelectedIds(new Set());
                    setPreviewIndex(null);
                    if (parsed.outputOptions) {
                        setOutputOptions((prev) => ({ ...prev, ...parsed.outputOptions }));
                    }
                } catch (error) {
                    console.error(error);
                    alert(error.message || "작업 파일을 불러오지 못했습니다.");
                } finally {
                    setIsProcessing(false);
                    if (sessionImportRef.current) sessionImportRef.current.value = "";
                }
            };

            useEffect(() => {
                const handleShortcuts = (event) => {
                    const targetTag = event.target?.tagName;
                    const isTyping = targetTag === 'INPUT' || targetTag === 'TEXTAREA';
                    if (isTyping) return;

                    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z' && !event.shiftKey) {
                        event.preventDefault();
                        undo();
                        return;
                    }
                    if (((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'z') || ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'y')) {
                        event.preventDefault();
                        redo();
                        return;
                    }
                    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'a') {
                        event.preventDefault();
                        selectAll();
                        return;
                    }
                    if (event.key === 'Delete' || event.key === 'Backspace') {
                        if (selectedIds.size > 0 && previewIndex === null) {
                            event.preventDefault();
                            deleteSelected();
                        }
                        return;
                    }
                    if (event.key.toLowerCase() === 'r') {
                        if (selectedIds.size > 0 && previewIndex === null) {
                            event.preventDefault();
                            rotateSelectedPages();
                        }
                    }
                };

                window.addEventListener('keydown', handleShortcuts);
                return () => window.removeEventListener('keydown', handleShortcuts);
            }, [selectedIds.size, previewIndex, pages.length, history.length, future.length]);

            return (
                <div 
                    className="flex flex-col min-h-screen relative"
                    onDragEnter={handleDragEnter}
                    onDragOver={(e) => e.preventDefault()} 
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                >
                    <header className="glass-header sticky top-0 z-30 transition-all duration-300">
                        <div className="max-w-full px-6 py-4 flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-primary-500 to-indigo-600 p-2.5 rounded-xl text-white shadow-lg shadow-primary-500/30">
                                    <Icon name="files" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800 tracking-tight hidden md:block">Pro PDF Editor</h1>
                                    <h1 className="text-xl font-bold text-gray-800 tracking-tight md:hidden">Pro PDF</h1>
                                    {pages.length > 0 && (
                                        <p className="text-xs text-gray-500 mt-1">{pages.length}개 페이지 로드됨</p>
                                    )}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 flex-wrap xl:justify-end">
                                <input type="file" multiple accept=".pdf" ref={fileInputRef} onChange={handleFileUpload} className="hidden" id="file-upload" />
                                <input type="file" accept=".json,application/json" ref={sessionImportRef} onChange={importSessionFile} className="hidden" id="session-import" />
                                {pages.length > 0 ? (
                                    <div className="flex items-center gap-2 flex-wrap xl:justify-end">
                                        <button onClick={undo} disabled={history.length === 0} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 font-bold text-sm flex items-center gap-2 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                                            <Icon name="undo-2" size={16} /> 실행 취소
                                        </button>
                                        <button onClick={redo} disabled={future.length === 0} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 font-bold text-sm flex items-center gap-2 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                                            <Icon name="redo-2" size={16} /> 다시 실행
                                        </button>
                                        <div className="hidden xl:flex items-center gap-2 ml-2">
                                            <button onClick={() => downloadSplitPdf(false)} className="px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg hover:bg-gray-50 font-bold text-sm flex items-center gap-2 shadow-sm">
                                                <Icon name="scissors" size={16} /> 전체 분할
                                            </button>
                                            <button onClick={() => downloadJpgs(false)} className="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold text-sm flex items-center gap-2 shadow-md">
                                                <Icon name="image" size={16} /> JPG 저장
                                            </button>
                                            <button onClick={() => downloadPngs(false)} className="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700 font-bold text-sm flex items-center gap-2 shadow-md">
                                                <Icon name="image" size={16} /> PNG 저장
                                            </button>
                                            <button onClick={() => downloadMergedPdf(false)} className="px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-black font-bold text-sm flex items-center gap-2 shadow-md">
                                                <Icon name="save" size={16} /> PDF 저장
                                            </button>
                                        </div>
                                        <button onClick={() => setShowOptions((prev) => !prev)} className="px-3 py-2 bg-amber-50 text-amber-700 border border-amber-200 rounded-lg text-sm font-bold flex items-center gap-2">
                                            <Icon name="sliders-horizontal" size={16} /> 출력 옵션
                                        </button>
                                        <label htmlFor="file-upload" className="cursor-pointer bg-primary-50 hover:bg-primary-100 text-primary-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition border border-primary-200">
                                            <Icon name="plus" size={16} /> <span className="hidden md:inline">추가</span>
                                        </label>
                                        <button onClick={selectAll} className="text-sm font-medium text-gray-600 hover:text-primary-600 px-3 py-2 rounded-lg hover:bg-gray-100 transition whitespace-nowrap">
                                            {selectedIds.size === pages.length ? '해제' : '전체'}
                                        </button>
                                        <button onClick={invertSelection} className="text-sm font-medium text-gray-600 hover:text-primary-600 px-3 py-2 rounded-lg hover:bg-gray-100 transition whitespace-nowrap">
                                            반전
                                        </button>
                                        <button onClick={clearAll} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition" title="초기화">
                                            <Icon name="rotate-ccw" size={20} />
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <label htmlFor="file-upload" className="flex items-center gap-2 px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-xl cursor-pointer transition shadow-lg shadow-primary-600/30 font-bold transform hover:-translate-y-0.5">
                                            <Icon name="upload-cloud" size={18} />
                                            <span>PDF 불러오기</span>
                                        </label>
                                        <label htmlFor="session-import" className="flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl cursor-pointer transition font-bold">
                                            <Icon name="folder-open" size={18} />
                                            <span>작업 불러오기</span>
                                        </label>
                                    </div>
                                )}
                            </div>
                        </div>
                        {pages.length > 0 && (
                            <div className="px-6 pb-4 flex flex-col gap-3">
                                {showOptions && (
                                    <div className="bg-white/90 border border-gray-200 rounded-2xl p-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-3 shadow-sm">
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            병합 파일명
                                            <input value={outputOptions.mergeFileName} onChange={(e) => updateOutputOption('mergeFileName', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            분할 ZIP 이름
                                            <input value={outputOptions.splitPrefix} onChange={(e) => updateOutputOption('splitPrefix', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            이미지 ZIP 이름
                                            <input value={outputOptions.imagePrefix} onChange={(e) => updateOutputOption('imagePrefix', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            PNG ZIP 이름
                                            <input value={outputOptions.pngPrefix} onChange={(e) => updateOutputOption('pngPrefix', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            JPG 해상도 배율
                                            <input type="number" min="1" max="4" step="0.5" value={outputOptions.imageScale} onChange={(e) => updateOutputOption('imageScale', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <label className="flex flex-col gap-1 text-sm font-semibold text-gray-700">
                                            JPG 품질
                                            <input type="number" min="0.5" max="1" step="0.05" value={outputOptions.imageQuality} onChange={(e) => updateOutputOption('imageQuality', e.target.value)} className="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500" />
                                        </label>
                                        <div className="xl:col-span-5 flex flex-wrap justify-end gap-2">
                                            <button onClick={exportSession} className="px-3 py-2 text-sm font-bold text-primary-700 bg-primary-50 border border-primary-200 rounded-lg">
                                                작업 내보내기
                                            </button>
                                            <label htmlFor="session-import" className="px-3 py-2 text-sm font-bold text-gray-700 bg-white border border-gray-200 rounded-lg cursor-pointer">
                                                작업 불러오기
                                            </label>
                                            <button onClick={clearSavedSession} className="px-3 py-2 text-sm font-bold text-red-600 bg-red-50 border border-red-200 rounded-lg">
                                                저장된 작업 기록 삭제
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-3">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <input
                                            value={rangeInput}
                                            onChange={(e) => setRangeInput(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter') handleRangeSelect(); }}
                                            placeholder="범위 선택 예: 1-3, 5, 8-10"
                                            className="min-w-[220px] px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm font-medium outline-none focus:border-primary-500"
                                        />
                                        <button onClick={handleRangeSelect} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                                            <Icon name="list-filter" size={16} /> 범위 선택
                                        </button>
                                        <button onClick={selectOddPages} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                                            <Icon name="filter" size={16} /> 홀수
                                        </button>
                                        <button onClick={selectEvenPages} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                                            <Icon name="list" size={16} /> 짝수
                                        </button>
                                        <button onClick={invertSelection} className="px-3 py-2 bg-white border border-gray-200 text-gray-700 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                                            <Icon name="shuffle" size={16} /> 선택 반전
                                        </button>
                                    </div>

                                    <div className="xl:hidden flex gap-2 overflow-x-auto">
                                        <button onClick={() => downloadSplitPdf(false)} className="flex-shrink-0 px-3 py-1.5 bg-white border border-gray-200 text-gray-700 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                            <Icon name="scissors" size={14} /> 분할
                                        </button>
                                        <button onClick={() => downloadJpgs(false)} className="flex-shrink-0 px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                            <Icon name="image" size={14} /> JPG
                                        </button>
                                        <button onClick={() => downloadPngs(false)} className="flex-shrink-0 px-3 py-1.5 bg-sky-600 text-white rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                            <Icon name="image" size={14} /> PNG
                                        </button>
                                        <button onClick={() => downloadMergedPdf(false)} className="flex-shrink-0 px-3 py-1.5 bg-gray-900 text-white rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                            <Icon name="save" size={14} /> PDF
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto">
                        {isDragOver && (
                            <div className="fixed inset-0 z-50 bg-primary-500/10 backdrop-blur-sm border-4 border-dashed border-primary-500 flex items-center justify-center pointer-events-none m-4 rounded-2xl">
                                <div className="bg-white px-8 py-6 rounded-2xl shadow-xl flex flex-col items-center animate-bounce-slow">
                                    <Icon name="arrow-down" size={40} className="text-primary-600 mb-2" />
                                    <span className="text-xl font-bold text-primary-700">여기에 놓으세요</span>
                                </div>
                            </div>
                        )}

                        {pages.length === 0 ? (
                            <div className="h-[calc(100vh-160px)] flex flex-col items-center justify-center max-w-4xl mx-auto">
                                <div className="w-full h-full max-h-[500px] flex flex-col items-center justify-center border-3 border-dashed border-gray-300 rounded-3xl bg-white hover:border-primary-400 hover:bg-gray-50 transition-all duration-300 group">
                                    <div className="w-24 h-24 bg-primary-50 text-primary-600 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner">
                                        <Icon name="file-up" size={40} />
                                    </div>
                                    <h2 className="text-3xl font-bold text-gray-800 mb-3">PDF 파일을 이곳에 놓으세요</h2>
                                    <p className="text-gray-500 mb-8 text-center max-w-md leading-relaxed">
                                        여러 개의 PDF를 합치거나 분할하고, 이미지로 변환할 수 있습니다.<br/>
                                        드래그하여 순서를 변경하거나 필요한 페이지만 선택하세요.
                                    </p>
                                    <label htmlFor="file-upload" className="px-8 py-4 bg-gradient-to-r from-primary-600 to-indigo-600 text-white rounded-xl hover:shadow-lg hover:shadow-primary-500/40 cursor-pointer transition-all transform hover:-translate-y-1 font-bold text-lg flex items-center gap-3">
                                        <Icon name="folder-open" size={24} />
                                        <span>내 컴퓨터에서 파일 선택</span>
                                    </label>
                                    <label htmlFor="session-import" className="mt-3 px-6 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl cursor-pointer transition font-bold text-base flex items-center gap-3">
                                        <Icon name="folder-open" size={20} />
                                        <span>저장한 작업 불러오기</span>
                                    </label>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-32 animate-slide-up">
                                {pages.map((page, index) => {
                                    const isSelected = selectedIds.has(page.id);
                                    return (
                                        <div 
                                            key={page.id}
                                            className={`page-card-container relative group cursor-pointer ${draggedItemIndex === index ? 'dragging' : ''} ${isSelected ? 'card-selected' : ''}`}
                                            onClick={() => toggleSelection(page.id)}
                                            draggable
                                            onDragStart={(e) => onDragStart(e, index)}
                                            onDragEnter={(e) => onDragEnterCard(e, index)}
                                            onDragEnd={onDragEnd}
                                            onDragOver={(e) => e.preventDefault()}
                                        >
                                            <div className={`page-card-visual bg-white rounded-xl shadow-sm border overflow-hidden aspect-[1/1.4] relative flex flex-col transition-all ${isSelected ? 'border-primary-500' : 'border-gray-200'}`}>
                                                <div className={`absolute top-0 left-0 right-0 h-1 transition-colors z-20 ${isSelected ? 'bg-primary-600' : 'bg-gray-100 group-hover:bg-primary-500'}`}></div>
                                                
                                                <div className="absolute top-3 left-3 z-20">
                                                    <div className={`w-5 h-5 rounded border flex items-center justify-center transition-all ${isSelected ? 'bg-primary-600 border-primary-600' : 'bg-white/80 border-gray-300'}`}>
                                                        {isSelected && <Icon name="check" size={14} className="text-white" />}
                                                    </div>
                                                </div>

                                                <div className="absolute bottom-3 left-3 bg-gray-900 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-md z-10 font-mono">
                                                    {index + 1}
                                                </div>

                                                <div 
                                                    className="absolute top-3 right-3 max-w-[60%] bg-indigo-600/90 backdrop-blur text-white text-[9px] font-bold px-2 py-1 rounded shadow-md z-10 truncate border border-indigo-400/30"
                                                    title={page.originFileName} 
                                                >
                                                    {page.originFileName}
                                                </div>

                                                <div className="flex-1 flex items-center justify-center bg-slate-50 p-4 overflow-hidden relative">
                                                    <img 
                                                        src={page.imageSrc} 
                                                        alt={`Page ${index + 1}`}
                                                        className="w-full h-auto shadow-md object-contain transition-transform duration-300 bg-white"
                                                        style={{ transform: `rotate(${page.rotation}deg)` }}
                                                    />
                                                </div>

                                                <div className="absolute inset-0 bg-gray-900/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-10 pointer-events-none">
                                                    <div className="pointer-events-auto flex items-center gap-2">
                                                        <button 
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                setPreviewIndex(index);
                                                            }}
                                                            className="bg-white p-2 rounded-full shadow-lg hover:bg-gray-100 text-gray-700 transform scale-0 group-hover:scale-100 transition-transform duration-200"
                                                            title="미리보기"
                                                        >
                                                            <Icon name="expand" size={18} />
                                                        </button>
                                                        <button 
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                rotatePage(page.id);
                                                            }}
                                                            className="bg-white p-2 rounded-full shadow-lg hover:bg-gray-100 text-gray-700 transform scale-0 group-hover:scale-100 transition-transform duration-200"
                                                            title="회전"
                                                        >
                                                            <Icon name="rotate-cw" size={18} />
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {isProcessing && (
                        <div className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center">
                            <div className="bg-white rounded-2xl p-8 flex flex-col items-center max-w-sm w-full shadow-2xl animate-fade-in">
                                <div className="w-12 h-12 border-4 border-primary-100 border-t-primary-600 rounded-full animate-spin mb-4"></div>
                                <p className="font-bold text-lg text-gray-800">처리 중입니다</p>
                                <p className="text-gray-500 text-sm mt-1">{processingText}</p>
                            </div>
                        </div>
                    )}

                    <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-40 bg-white/95 backdrop-blur-md border border-gray-200 shadow-2xl rounded-2xl p-2 px-4 flex items-center gap-2 transition-all duration-300 ${selectedIds.size > 0 ? 'translate-y-0 opacity-100' : 'translate-y-24 opacity-0 pointer-events-none'}`}>
                        <div className="text-sm font-bold text-gray-700 border-r border-gray-200 pr-4 mr-2">
                            <span className="text-primary-600 text-lg">{selectedIds.size}</span>
                            <span className="text-xs ml-1">장 선택</span>
                        </div>

                        <button onClick={duplicateSelected} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition min-w-[50px]">
                            <Icon name="copy" size={18} />
                            <span className="text-[10px] font-bold">복제</span>
                        </button>

                        <button onClick={rotateSelectedPages} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-sky-600 hover:bg-sky-50 rounded-lg transition min-w-[50px]">
                            <Icon name="rotate-cw" size={18} />
                            <span className="text-[10px] font-bold">회전</span>
                        </button>
                        
                        <button onClick={() => downloadMergedPdf(true)} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition min-w-[50px]">
                            <Icon name="file-plus" size={18} />
                            <span className="text-[10px] font-bold">병합</span>
                        </button>
                        
                        <button onClick={() => downloadSplitPdf(true)} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition min-w-[50px]">
                            <Icon name="scissors" size={18} />
                            <span className="text-[10px] font-bold">분할</span>
                        </button>

                        <button onClick={() => downloadJpgs(true)} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition min-w-[50px]">
                            <Icon name="image" size={18} />
                            <span className="text-[10px] font-bold">JPG</span>
                        </button>

                        <button onClick={() => downloadPngs(true)} className="flex flex-col items-center gap-1 p-2 text-gray-600 hover:text-sky-600 hover:bg-sky-50 rounded-lg transition min-w-[50px]">
                            <Icon name="image" size={18} />
                            <span className="text-[10px] font-bold">PNG</span>
                        </button>

                        <div className="w-px h-8 bg-gray-200 mx-1"></div>

                        <button onClick={deleteSelected} className="flex flex-col items-center gap-1 p-2 text-red-500 hover:text-red-700 hover:bg-red-50 rounded-lg transition min-w-[50px]">
                            <Icon name="trash-2" size={18} />
                            <span className="text-[10px] font-bold">삭제</span>
                        </button>
                    </div>

                    {previewIndex !== null && pages[previewIndex] && (
                        <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setPreviewIndex(null)}>
                            <div className="bg-white rounded-3xl max-w-5xl w-full max-h-[90vh] overflow-hidden shadow-2xl" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                                    <div>
                                        <p className="text-sm font-semibold text-gray-500">{pages[previewIndex].originFileName}</p>
                                        <h3 className="text-lg font-bold text-gray-900">페이지 {previewIndex + 1} 미리보기</h3>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setPreviewIndex((current) => Math.max((current ?? 0) - 1, 0))} disabled={previewIndex === 0} className="px-3 py-2 rounded-lg border border-gray-200 text-sm font-bold disabled:opacity-40">
                                            이전
                                        </button>
                                        <button onClick={() => setPreviewIndex((current) => Math.min((current ?? 0) + 1, pages.length - 1))} disabled={previewIndex === pages.length - 1} className="px-3 py-2 rounded-lg border border-gray-200 text-sm font-bold disabled:opacity-40">
                                            다음
                                        </button>
                                        <button onClick={() => setPreviewIndex(null)} className="p-2 rounded-lg hover:bg-gray-100 text-gray-600">
                                            <Icon name="x" size={18} />
                                        </button>
                                    </div>
                                </div>
                                <div className="bg-slate-100 p-6 flex items-start justify-center overflow-auto max-h-[calc(90vh-88px)] relative">
                                    <canvas
                                        ref={previewCanvasRef}
                                        className="max-w-full h-auto shadow-2xl bg-white self-start"
                                    />
                                    {previewLoading && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center gap-3 bg-slate-100/80 text-gray-600">
                                            <div className="w-10 h-10 border-4 border-gray-200 border-t-primary-600 rounded-full animate-spin"></div>
                                            <p className="text-sm font-semibold">고해상도 미리보기 생성 중...</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
