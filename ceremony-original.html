        const ExecutionView = ({ events, executions, onSaveExecution }) => {
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [statusFilter, setStatusFilter] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');

            const availableYears = useMemo(() => {
                const ys = events
                    .map(e => e.date ? new Date(e.date).getFullYear() : null)
                    .filter(y => Number.isFinite(y));
                const set = new Set(ys);
                set.add(new Date().getFullYear());
                return Array.from(set).sort((a, b) => b - a);
            }, [events]);

            useEffect(() => {
                if (!availableYears.includes(selectedYear)) setSelectedYear(availableYears[0] || new Date().getFullYear());
            }, [availableYears, selectedYear]);

            const rows = useMemo(() => {
                const q = searchTerm.trim().toLowerCase();
                return events
                    .filter(e => e.date && e.date.startsWith(String(selectedYear)))
                    .map(e => {
                        const exec = executions.find(x => Number(x.eventId) === Number(e.id));
                        return {
                            ...e,
                            executed: Boolean(exec?.executed),
                            executionDate: exec?.executionDate || '',
                            method: exec?.method || '',
                            executionMemo: exec?.memo || ''
                        };
                    })
                    .filter(e => {
                        if (statusFilter === 'done') return e.executed;
                        if (statusFilter === 'todo') return !e.executed;
                        return true;
                    })
                    .filter(e => {
                        if (!q) return true;
                        return (
                            String(e.empName || '').toLowerCase().includes(q) ||
                            String(e.deptName || '').toLowerCase().includes(q) ||
                            String(e.type || '').toLowerCase().includes(q)
                        );
                    })
                    .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            }, [events, executions, selectedYear, statusFilter, searchTerm]);

            const totalAmount = rows.reduce((sum, r) => sum + Number(r.amount || 0), 0);
            const doneCount = rows.filter(r => r.executed).length;
            const doneAmount = rows.filter(r => r.executed).reduce((sum, r) => sum + Number(r.amount || 0), 0);

            const toggleDone = async (row, checked) => {
                await onSaveExecution({
                    eventId: row.id,
                    executed: checked,
                    executionDate: checked ? (row.executionDate || new Date().toISOString().slice(0, 10)) : '',
                    method: row.method || '',
                    memo: row.executionMemo || ''
                });
            };

            return (
                <div className="animate-fade-in space-y-6 pb-24 md:pb-0">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">지급 집행관리</h2>
                            <p className="text-sm text-slate-500 mt-1">신청과 실제 집행을 분리해 정산 상태를 관리합니다.</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <select value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))} className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm">
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                            <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm">
                                <option value="all">전체</option>
                                <option value="todo">미집행</option>
                                <option value="done">집행완료</option>
                            </select>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="glass-panel p-5 rounded-2xl border-l-4 border-slate-500">
                            <p className="text-xs text-slate-500 font-bold">총 대상 건수</p>
                            <p className="text-2xl font-black text-slate-800 mt-1">{rows.length}건</p>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl border-l-4 border-emerald-500">
                            <p className="text-xs text-slate-500 font-bold">집행 완료</p>
                            <p className="text-2xl font-black text-slate-800 mt-1">{doneCount}건 / {formatCurrency(doneAmount)}</p>
                        </div>
                        <div className="glass-panel p-5 rounded-2xl border-l-4 border-amber-500">
                            <p className="text-xs text-slate-500 font-bold">집행 대상 총액</p>
                            <p className="text-2xl font-black text-slate-800 mt-1">{formatCurrency(totalAmount)}</p>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-100 bg-white/80 flex justify-between gap-3">
                            <h4 className="font-bold text-slate-800">집행 상태 목록</h4>
                            <input
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="사원/부서/유형 검색"
                                className="w-64 px-3 py-2 rounded-lg border border-slate-200 text-sm"
                            />
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50/80 text-slate-500 text-xs uppercase font-bold tracking-wider">
                                    <tr>
                                        <th className="px-6 py-4">발생일</th>
                                        <th className="px-6 py-4">사원 정보</th>
                                        <th className="px-6 py-4">유형</th>
                                        <th className="px-6 py-4 text-right">지원금</th>
                                        <th className="px-6 py-4">집행일</th>
                                        <th className="px-6 py-4">수단</th>
                                        <th className="px-6 py-4 text-right">상태</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 bg-white/60">
                                    {rows.length === 0 ? (
                                        <tr><td colSpan="7" className="text-center py-12 text-slate-400">표시할 데이터가 없습니다.</td></tr>
                                    ) : rows.map(row => (
                                        <tr key={row.id} className="hover:bg-blue-50/40">
                                            <td className="px-6 py-4 text-xs font-mono text-slate-600">{row.date}</td>
                                            <td className="px-6 py-4">
                                                <div className="font-bold text-slate-800">{row.empName}</div>
                                                <div className="text-xs text-slate-500">{row.deptName || '-'}</div>
                                            </td>
                                            <td className="px-6 py-4">{row.type}</td>
                                            <td className="px-6 py-4 text-right font-bold">{formatCurrency(row.amount || 0)}</td>
                                            <td className="px-6 py-4">
                                                <input
                                                    type="date"
                                                    value={row.executionDate || ''}
                                                    disabled={!row.executed}
                                                    onChange={(e) => onSaveExecution({ eventId: row.id, executed: true, executionDate: e.target.value, method: row.method || '', memo: row.executionMemo || '' })}
                                                    className="px-2 py-1.5 rounded border border-slate-200 text-xs disabled:bg-slate-50 disabled:text-slate-300"
                                                />
                                            </td>
                                            <td className="px-6 py-4">
                                                <select
                                                    value={row.method || ''}
                                                    disabled={!row.executed}
                                                    onChange={(e) => onSaveExecution({ eventId: row.id, executed: true, executionDate: row.executionDate || new Date().toISOString().slice(0, 10), method: e.target.value, memo: row.executionMemo || '' })}
                                                    className="px-2 py-1.5 rounded border border-slate-200 text-xs disabled:bg-slate-50 disabled:text-slate-300"
                                                >
                                                    <option value="">선택</option>
                                                    <option value="계좌이체">계좌이체</option>
                                                    <option value="법인카드">법인카드</option>
                                                    <option value="현금">현금</option>
                                                </select>
                                            </td>
                                            <td className="px-6 py-4 text-right">
                                                <label className="inline-flex items-center gap-2 text-xs font-semibold text-slate-700">
                                                    <input type="checkbox" checked={row.executed} onChange={(e) => toggleDone(row, e.target.checked)} />
                                                    {row.executed ? '집행완료' : '미집행'}
                                                </label>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const AlertsView = ({ events, executions, readAlerts, onToggleRead, onMarkAllRead }) => {
            const now = new Date();
            const alerts = useMemo(() => {
                const rows = [];
                events.forEach((e) => {
                    const exec = executions.find(x => Number(x.eventId) === Number(e.id));
                    const eventDate = e.date ? new Date(e.date) : null;
                    if (eventDate && !exec?.executed) {
                        const diffDays = Math.floor((now - eventDate) / (1000 * 60 * 60 * 24));
                        if (diffDays >= 7) {
                            rows.push({
                                id: `overdue_${e.id}`,
                                level: 'high',
                                title: '집행 지연',
                                desc: `${e.empName} (${e.type}) 건이 ${diffDays}일 미집행 상태입니다.`,
                                date: e.date,
                                amount: e.amount || 0
                            });
                        } else if (diffDays >= 3) {
                            rows.push({
                                id: `todo_${e.id}`,
                                level: 'medium',
                                title: '집행 대기',
                                desc: `${e.empName} (${e.type}) 건의 집행 확인이 필요합니다.`,
                                date: e.date,
                                amount: e.amount || 0
                            });
                        }
                    }
                    if (!String(e.memo || '').trim()) {
                        rows.push({
                            id: `memo_${e.id}`,
                            level: 'low',
                            title: '메모 누락',
                            desc: `${e.empName} (${e.type}) 건에 메모가 없습니다.`,
                            date: e.date,
                            amount: e.amount || 0
                        });
                    }
                });
                return rows.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            }, [events, executions, now]);

            const unreadCount = alerts.filter(a => !readAlerts[a.id]).length;

            const levelClass = (level) => {
                if (level === 'high') return 'bg-red-50 border-red-200 text-red-700';
                if (level === 'medium') return 'bg-amber-50 border-amber-200 text-amber-700';
                return 'bg-slate-50 border-slate-200 text-slate-700';
            };

            return (
                <div className="animate-fade-in space-y-6 pb-24 md:pb-0">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">알림·기한관리</h2>
                            <p className="text-sm text-slate-500 mt-1">1인 운영 기준으로 우선 처리 건만 빠르게 확인합니다.</p>
                        </div>
                        <button onClick={onMarkAllRead} className="px-4 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold">
                            알림 일괄 확인 ({unreadCount})
                        </button>
                    </header>

                    <div className="glass-panel rounded-2xl p-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="p-4 rounded-xl bg-white border border-slate-200">
                                <p className="text-xs text-slate-500 font-bold">전체 알림</p>
                                <p className="text-2xl font-black text-slate-800 mt-1">{alerts.length}건</p>
                            </div>
                            <div className="p-4 rounded-xl bg-white border border-slate-200">
                                <p className="text-xs text-slate-500 font-bold">미확인 알림</p>
                                <p className="text-2xl font-black text-red-600 mt-1">{unreadCount}건</p>
                            </div>
                            <div className="p-4 rounded-xl bg-white border border-slate-200">
                                <p className="text-xs text-slate-500 font-bold">고위험 알림</p>
                                <p className="text-2xl font-black text-amber-600 mt-1">{alerts.filter(a => a.level === 'high').length}건</p>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3">
                        {alerts.length === 0 ? (
                            <div className="glass-panel rounded-2xl p-10 text-center text-slate-400">현재 확인할 알림이 없습니다.</div>
                        ) : alerts.map(alert => (
                            <div key={alert.id} className={`glass-panel rounded-2xl p-5 border ${levelClass(alert.level)} ${readAlerts[alert.id] ? 'opacity-60' : ''}`}>
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-3">
                                    <div>
                                        <div className="text-xs font-bold uppercase tracking-wide">{alert.title}</div>
                                        <div className="font-semibold mt-1">{alert.desc}</div>
                                        <div className="text-xs mt-1">발생일 {alert.date || '-'} · {formatCurrency(alert.amount || 0)}</div>
                                    </div>
                                    <button
                                        onClick={() => onToggleRead(alert.id)}
                                        className="px-3 py-1.5 rounded-lg text-xs font-bold border border-current"
                                    >
                                        {readAlerts[alert.id] ? '확인 취소' : '확인 완료'}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ReportCenterView = ({ events, executions }) => {
            const currentYear = new Date().getFullYear();
            const [selectedYear, setSelectedYear] = useState(currentYear);
            const [template, setTemplate] = useState('monthly');
            const [includeExecution, setIncludeExecution] = useState(true);

            const availableYears = useMemo(() => {
                const ys = events
                    .map(e => e.date ? new Date(e.date).getFullYear() : null)
                    .filter(y => Number.isFinite(y));
                const set = new Set(ys);
                set.add(currentYear);
                return Array.from(set).sort((a, b) => b - a);
            }, [events, currentYear]);

            useEffect(() => {
                if (!availableYears.includes(selectedYear)) setSelectedYear(availableYears[0] || currentYear);
            }, [availableYears, selectedYear, currentYear]);

            const month = new Date().getMonth() + 1;
            const quarter = Math.ceil(month / 3);
            const rows = useMemo(() => {
                let filtered = events.filter(e => e.date && e.date.startsWith(String(selectedYear)));
                if (template === 'monthly') {
                    filtered = filtered.filter(e => Number(String(e.date).split('-')[1]) === month);
                } else if (template === 'quarterly') {
                    filtered = filtered.filter(e => {
                        const m = Number(String(e.date).split('-')[1]);
                        return m >= (quarter - 1) * 3 + 1 && m <= quarter * 3;
                    });
                }
                return filtered
                    .map(e => {
                        const exec = executions.find(x => Number(x.eventId) === Number(e.id));
                        return { ...e, executed: Boolean(exec?.executed), executionDate: exec?.executionDate || '' };
                    })
                    .sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
            }, [events, executions, selectedYear, template, month, quarter]);

            const totalAmount = rows.reduce((sum, r) => sum + Number(r.amount || 0), 0);
            const doneAmount = rows.filter(r => r.executed).reduce((sum, r) => sum + Number(r.amount || 0), 0);

            const printLabel = template === 'yearly' ? '연간' : template === 'quarterly' ? `${quarter}분기` : `${month}월`;

            return (
                <div className="animate-fade-in space-y-6 pb-24 md:pb-0">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 no-print">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">리포트 센터</h2>
                            <p className="text-sm text-slate-500 mt-1">대시보드와 분리된 A4 세로형 운영 보고서를 출력합니다.</p>
                        </div>
                        <div className="flex flex-wrap items-center gap-2">
                            <select value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))} className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm">
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                            <select value={template} onChange={(e) => setTemplate(e.target.value)} className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm">
                                <option value="monthly">월간</option>
                                <option value="quarterly">분기</option>
                                <option value="yearly">연간</option>
                            </select>
                            <label className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm inline-flex items-center gap-2">
                                <input type="checkbox" checked={includeExecution} onChange={(e) => setIncludeExecution(e.target.checked)} />
                                집행정보 포함
                            </label>
                            <button onClick={() => window.print()} className="px-4 py-2 rounded-xl bg-slate-800 text-white text-sm font-semibold">인쇄 / PDF</button>
                        </div>
                    </header>

                    <section className="glass-panel rounded-2xl p-8 bg-white">
                        <h3 className="text-2xl font-black text-slate-900">{selectedYear}년 경조사 운영 보고서 ({printLabel})</h3>
                        <p className="text-xs text-slate-500 mt-1">생성시각: {new Date().toLocaleString('ko-KR')}</p>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mt-6">
                            <div className="border border-slate-200 rounded-xl p-4 bg-slate-50">
                                <p className="text-xs text-slate-500 font-bold">대상 건수</p>
                                <p className="text-2xl font-black text-slate-800 mt-1">{rows.length}건</p>
                            </div>
                            <div className="border border-slate-200 rounded-xl p-4 bg-slate-50">
                                <p className="text-xs text-slate-500 font-bold">총 지원금</p>
                                <p className="text-2xl font-black text-slate-800 mt-1">{formatCurrency(totalAmount)}</p>
                            </div>
                            <div className="border border-slate-200 rounded-xl p-4 bg-slate-50">
                                <p className="text-xs text-slate-500 font-bold">집행완료 금액</p>
                                <p className="text-2xl font-black text-slate-800 mt-1">{formatCurrency(doneAmount)}</p>
                            </div>
                        </div>

                        <div className="mt-6 overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                                    <tr>
                                        <th className="px-3 py-2">발생일</th>
                                        <th className="px-3 py-2">부서</th>
                                        <th className="px-3 py-2">사원</th>
                                        <th className="px-3 py-2">유형</th>
                                        <th className="px-3 py-2 text-right">휴가</th>
                                        <th className="px-3 py-2 text-right">지원금</th>
                                        {includeExecution && <th className="px-3 py-2 text-right">집행</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {rows.length === 0 ? (
                                        <tr><td colSpan={includeExecution ? 7 : 6} className="px-3 py-8 text-center text-slate-400">보고서 데이터가 없습니다.</td></tr>
                                    ) : rows.map(row => (
                                        <tr key={row.id}>
                                            <td className="px-3 py-2">{row.date}</td>
                                            <td className="px-3 py-2">{row.deptName || '-'}</td>
                                            <td className="px-3 py-2">{row.empName}</td>
                                            <td className="px-3 py-2">{row.type}</td>
                                            <td className="px-3 py-2 text-right">{row.days || 0}일</td>
                                            <td className="px-3 py-2 text-right font-semibold">{formatCurrency(row.amount || 0)}</td>
                                            {includeExecution && <td className="px-3 py-2 text-right">{row.executed ? `완료 (${row.executionDate || '-'})` : '미집행'}</td>}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            );
        };

        // --- App Shell ---
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [events, setEvents] = useState([]);
            const [deletedEvents, setDeletedEvents] = useState([]);
            const [executions, setExecutions] = useState([]);
            const [regulations, setRegulations] = useState(DEFAULT_REGULATIONS);
            const [editingEvent, setEditingEvent] = useState(null);
            const [cloudReady, setCloudReady] = useState(false);
            const [cloudError, setCloudError] = useState('');
            const [lastBackupAt, setLastBackupAt] = useState(() => localStorage.getItem(UI_STORAGE_KEYS.lastBackupAt) || '');
            const [recentInput, setRecentInput] = useState(null);
            const [readAlerts, setReadAlerts] = useState(() => safeJsonParse(localStorage.getItem(UI_STORAGE_KEYS.alertReads), {}));

            useEffect(() => {
                if (!db || !auth) {
                    setCloudError('Firebase 초기화 실패');
                    return;
                }

                let unsubEvents = null;
                let unsubRegs = null;
                let unsubDeleted = null;
                let unsubExecutions = null;

                const attachSnapshots = () => {
                    if (unsubEvents || unsubRegs) return;
                    const ownerUid = resolveSessionUid();
                    if (!ownerUid) {
                        setCloudError('사용자 세션을 확인하지 못했습니다.');
                        return;
                    }
                    unsubEvents = db.collection('corp_events').where('ownerUid', '==', ownerUid).onSnapshot(
                        (snap) => {
                            const rows = snap.docs
                                .map(d => ({ docKey: d.id, id: Number(d.id), ...d.data() }))
                                .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                            setEvents(rows);
                            if (rows[0]) {
                                setRecentInput({
                                    deptName: rows[0].deptName || '',
                                    empName: rows[0].empName || ''
                                });
                            }
                            setCloudReady(true);
                        },
                        (err) => {
                            console.error('Events snapshot error:', err);
                            setCloudError('이벤트 데이터 동기화 실패');
                        }
                    );

                    unsubRegs = db.collection('corp_regulations').where('ownerUid', '==', ownerUid).onSnapshot(
                        async (snap) => {
                            const rows = snap.docs.map(d => ({ docKey: d.id, id: Number(d.id), ...d.data() }));
                            if (rows.length === 0) {
                                const batch = db.batch();
                                DEFAULT_REGULATIONS.forEach((reg) => {
                                    const ref = db.collection('corp_regulations').doc(buildOwnedDocKey(reg.id));
                                    batch.set(ref, {
                                        ...reg,
                                        ownerUid,
                                        ownerEmail: resolveSessionEmail(),
                                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                                    });
                                });
                                await batch.commit();
                            } else {
                                setRegulations(rows.sort((a, b) => Number(a.id) - Number(b.id)));
                            }
                        },
                        (err) => {
                            console.error('Regulations snapshot error:', err);
                            setCloudError('규정 데이터 동기화 실패');
                        }
                    );

                    unsubDeleted = db.collection('corp_events_deleted').where('ownerUid', '==', ownerUid).onSnapshot(
                        (snap) => {
                            const now = Date.now();
                            const rows = snap.docs
                                .map(d => ({ docKey: d.id, id: Number(d.id), ...d.data() }))
                                .filter(r => {
                                    if (!r.deletedAtMs) return true;
                                    return now - Number(r.deletedAtMs) <= 30 * 24 * 60 * 60 * 1000;
                                })
                                .sort((a, b) => Number(b.deletedAtMs || 0) - Number(a.deletedAtMs || 0));
                            setDeletedEvents(rows);
                        },
                        (err) => {
                            console.error('Deleted events snapshot error:', err);
                        }
                    );

                    unsubExecutions = db.collection('corp_event_executions').where('ownerUid', '==', ownerUid).onSnapshot(
                        (snap) => {
                            const rows = snap.docs
                                .map(d => ({ docKey: d.id, eventId: Number(d.id), ...d.data() }))
                                .sort((a, b) => Number(b.eventId || 0) - Number(a.eventId || 0));
                            setExecutions(rows);
                        },
                        (err) => {
                            console.error('Executions snapshot error:', err);
                        }
                    );
                };

                const unsubAuth = auth.onAuthStateChanged((u) => {
                    if (u) {
                        attachSnapshots();
                        return;
                    }
                    window.setTimeout(() => {
                        if (!auth.currentUser) {
                            setCloudError(
                                officeFlowSession?.authenticated
                                    ? 'OfficeFlow 인증 세션을 아직 확인하지 못했습니다.'
                                    : '로그인 세션을 확인하지 못했습니다. 다시 로그인 후 시도해주세요.'
                            );
                        }
                    }, officeFlowSession?.authenticated ? 2500 : 1500);
                });

                return () => {
                    unsubAuth && unsubAuth();
                    unsubEvents && unsubEvents();
                    unsubRegs && unsubRegs();
                    unsubDeleted && unsubDeleted();
                    unsubExecutions && unsubExecutions();
                };
            }, []);

            useEffect(() => {
                localStorage.setItem(UI_STORAGE_KEYS.alertReads, JSON.stringify(readAlerts));
            }, [readAlerts]);

            const handleDeleteEvent = async (id) => {
                if (!confirm('정말 이 신청 내역을 삭제하시겠습니까?')) return;
                if (!db) return;
                const target = events.find(e => Number(e.id) === Number(id));
                const docKey = target?.docKey || buildOwnedDocKey(id);
                if (target) {
                    await db.collection('corp_events_deleted').doc(docKey).set({
                        ...target,
                        ownerUid: resolveSessionUid(),
                        ownerEmail: resolveSessionEmail(),
                        deletedAtMs: Date.now(),
                        deletedAtLocal: new Date().toLocaleString('ko-KR'),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
                await db.collection('corp_events').doc(docKey).delete();
                await db.collection('corp_event_executions').doc(docKey).delete().catch(() => {});
            };
            const handleEditEvent = (event) => {
                setEditingEvent(event);
                setView('register');
            };
            const handleSaveEvent = async (eventData) => {
                if (!db) return;
                const docKey = eventData.docKey || buildOwnedDocKey(eventData.id);
                await db.collection('corp_events').doc(docKey).set({
                    ...eventData,
                    ownerUid: resolveSessionUid(),
                    ownerEmail: resolveSessionEmail(),
                    ownerRole: resolveSessionRole(),
                    ownerProvider: resolveSessionProvider(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                setRecentInput({ deptName: eventData.deptName || '', empName: eventData.empName || '' });
                setEditingEvent(null);
                setView('dashboard');
            };
            const handleRestoreEvent = async (id) => {
                if (!db) return;
                const target = deletedEvents.find(e => Number(e.id) === Number(id));
                if (!target) return;
                const deletedDocKey = target.docKey || buildOwnedDocKey(id);
                const { deletedAtMs, deletedAtLocal, ...rest } = target;
                await db.collection('corp_events').doc(buildOwnedDocKey(id)).set({
                    ...rest,
                    ownerUid: resolveSessionUid() || rest.ownerUid || '',
                    ownerEmail: resolveSessionEmail() || rest.ownerEmail || '',
                    ownerRole: resolveSessionRole() || rest.ownerRole || 'member',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                await db.collection('corp_events_deleted').doc(deletedDocKey).delete();
            };
            const handlePermanentDelete = async (id) => {
                if (!db) return;
                if (!confirm('휴지통에서 영구 삭제하시겠습니까?')) return;
                const target = deletedEvents.find(e => Number(e.id) === Number(id));
                await db.collection('corp_events_deleted').doc(target?.docKey || buildOwnedDocKey(id)).delete();
            };
            const handleSaveRegulation = async (regulation) => {
                if (!db) return;
                const docKey = regulation.docKey || buildOwnedDocKey(regulation.id);
                await db.collection('corp_regulations').doc(docKey).set({
                    ...regulation,
                    ownerUid: resolveSessionUid(),
                    ownerEmail: resolveSessionEmail(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            };
            const handleDeleteRegulation = async (id) => {
                if (!db) return;
                const target = regulations.find(r => Number(r.id) === Number(id));
                await db.collection('corp_regulations').doc(target?.docKey || buildOwnedDocKey(id)).delete();
            };
            const handleSaveExecution = async (execution) => {
                if (!db) return;
                const docKey = execution.docKey || buildOwnedDocKey(execution.eventId);
                await db.collection('corp_event_executions').doc(docKey).set({
                    ...execution,
                    ownerUid: resolveSessionUid(),
                    ownerEmail: resolveSessionEmail(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            };
            const handleCancelRegister = (targetView = 'dashboard') => {
                setEditingEvent(null);
                setView(targetView);
            };
            const handleTabChange = (target) => {
                if (target === 'register') setEditingEvent(null);
                setView(target);
            };

            const handleBackupJson = () => {
                const payload = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    events,
                    deletedEvents,
                    executions,
                    regulations
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `경조사_백업_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                const stamp = new Date().toLocaleString('ko-KR');
                setLastBackupAt(stamp);
                localStorage.setItem(UI_STORAGE_KEYS.lastBackupAt, stamp);
            };
            const handleBackupCsv = () => {
                const headers = 'id,발생일자,부서명,사원명,유형,지원금,휴가일수,화환,메모\n';
                const rows = events.map(e =>
                    `${e.id},${e.date || ''},${e.deptName || ''},${e.empName || ''},${e.type || ''},${Number(e.amount || 0)},${Number(e.days || 0)},${e.wreath ? 'Y' : 'N'},${String(e.memo || '').replace(/,/g, ' ')}`
                ).join('\n');
                const blob = new Blob(["\uFEFF" + headers + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `경조사_백업_${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                const stamp = new Date().toLocaleString('ko-KR');
                setLastBackupAt(stamp);
                localStorage.setItem(UI_STORAGE_KEYS.lastBackupAt, stamp);
            };
            const handleRestoreJson = async (file) => {
                if (!db) return;
                if (!confirm('JSON 백업으로 복원하면 동일 id 데이터가 덮어쓰기 됩니다. 진행할까요?')) return;
                const text = await file.text();
                const data = safeJsonParse(text, null);
                if (!data || !Array.isArray(data.events) || !Array.isArray(data.regulations)) {
                    alert('복원 파일 형식이 올바르지 않습니다.');
                    return;
                }
                const batch = db.batch();
                data.events.forEach((e) => {
                    const ref = db.collection('corp_events').doc(buildOwnedDocKey(e.id));
                    batch.set(ref, {
                        ...e,
                        ownerUid: resolveSessionUid(),
                        ownerEmail: resolveSessionEmail(),
                        ownerRole: resolveSessionRole(),
                        ownerProvider: resolveSessionProvider(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
                (data.deletedEvents || []).forEach((e) => {
                    const ref = db.collection('corp_events_deleted').doc(buildOwnedDocKey(e.id));
                    batch.set(ref, {
                        ...e,
                        ownerUid: resolveSessionUid(),
                        ownerEmail: resolveSessionEmail(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
                (data.executions || []).forEach((e) => {
                    const ref = db.collection('corp_event_executions').doc(buildOwnedDocKey(e.eventId));
                    batch.set(ref, {
                        ...e,
                        ownerUid: resolveSessionUid(),
                        ownerEmail: resolveSessionEmail(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
                data.regulations.forEach((r) => {
                    const ref = db.collection('corp_regulations').doc(buildOwnedDocKey(r.id));
                    batch.set(ref, {
                        ...r,
                        ownerUid: resolveSessionUid(),
                        ownerEmail: resolveSessionEmail(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                });
                await batch.commit();
                alert('복원이 완료되었습니다.');
            };
            const handleToggleAlertRead = (alertId) => {
                setReadAlerts(prev => ({ ...prev, [alertId]: !prev[alertId] }));
            };
            const handleMarkAllAlertsRead = () => {
                const map = {};
                events.forEach((e) => {
                    map[`overdue_${e.id}`] = true;
                    map[`todo_${e.id}`] = true;
                    map[`memo_${e.id}`] = true;
                });
                setReadAlerts(prev => ({ ...prev, ...map }));
            };
            const Sidebar = ({ activeTab, setActiveTab }) => (
                <aside className="w-64 bg-slate-900 text-white hidden md:flex flex-col h-screen fixed left-0 top-0 z-20 shadow-2xl no-print">
                    <div className="p-8">
                        <h1 className="text-2xl font-black text-white tracking-tighter">
                            경조사관리<span className="text-blue-500">.Pro</span>
                        </h1>
                        <p className="text-slate-500 text-[10px] mt-1 uppercase tracking-widest font-bold">Enterprise Solution</p>
                    </div>
                    <nav className="flex-1 px-4 space-y-2">
                        {[
                            { id: 'dashboard', label: '대시보드', icon: IconDashboard },
                            { id: 'register', label: '경조사 등록', icon: IconPlus },
                            { id: 'history', label: '경조사 이력', icon: IconSearch },
                            { id: 'execution', label: '지급 집행관리', icon: IconWallet },
                            { id: 'alerts', label: '알림·기한관리', icon: IconBell },
                            { id: 'reports', label: '리포트 센터', icon: IconReport },
                            { id: 'trash', label: '휴지통', icon: IconTrash },
                            { id: 'settings', label: '규정 설정', icon: IconSettings },
                        ].map(item => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-200 group ${
                                    activeTab === item.id 
                                    ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50 translate-x-1' 
                                    : 'text-slate-400 hover:bg-slate-800 hover:text-white hover:translate-x-1'
                                }`}
                            >
                                <item.icon />
                                <span>{item.label}</span>
                                {activeTab === item.id && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-blue-300"></div>}
                            </button>
                        ))}
                    </nav>
                    <div className="p-6 border-t border-slate-800">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-sm shadow-lg">A</div>
                            <div className="leading-tight">
                                <div className="text-sm font-bold">관리자</div>
                                <div className="text-xs text-slate-500">시스템 마스터</div>
                            </div>
                        </div>
                        <div className={`mt-4 flex items-center gap-2 text-[11px] font-semibold px-2.5 py-2 rounded-lg border ${
                            cloudError ? 'text-red-300 bg-red-900/30 border-red-900/40' : (cloudReady ? 'text-emerald-300 bg-emerald-900/20 border-emerald-900/40' : 'text-amber-300 bg-amber-900/20 border-amber-900/40')
                        }`}>
                            <IconCloud />
                            <span>{cloudError ? '클라우드 오류' : (cloudReady ? '클라우드 연동됨' : '클라우드 연결중')}</span>
                        </div>
                    </div>
                </aside>
            );

            // Mobile Nav (Bottom)
            const MobileNav = ({ activeTab, setActiveTab }) => (
                <div className="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur border-t border-slate-200 z-50 flex justify-around p-3 pb-6 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] no-print">
                    {[
                        { id: 'dashboard', label: '홈', icon: IconDashboard },
                        { id: 'register', label: '등록', icon: IconPlus },
                        { id: 'history', label: '이력', icon: IconSearch },
                        { id: 'execution', label: '집행', icon: IconWallet },
                        { id: 'alerts', label: '알림', icon: IconBell },
                        { id: 'reports', label: '보고서', icon: IconReport },
                        { id: 'trash', label: '휴지통', icon: IconTrash },
                        { id: 'settings', label: '설정', icon: IconSettings },
                    ].map(item => (
                        <button
                            key={item.id}
                            onClick={() => setActiveTab(item.id)}
                            className={`flex flex-col items-center space-y-1 ${activeTab === item.id ? 'text-blue-600 scale-105' : 'text-slate-400'} transition-transform`}
                        >
                            <item.icon />
                            <span className="text-[10px] font-bold">{item.label}</span>
                        </button>
                    ))}
                </div>
            );

            if (!cloudReady && !cloudError) {
                return (
                    <div className="min-h-screen flex items-center justify-center text-slate-500">
                        클라우드 데이터 동기화 중...
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen">
                    <Sidebar activeTab={view} setActiveTab={handleTabChange} />
                    <MobileNav activeTab={view} setActiveTab={handleTabChange} />
                    <main className="flex-1 md:ml-64 p-4 md:p-10 w-full transition-all">
                        {cloudError && (
                            <div className="mb-4 px-4 py-3 rounded-xl border border-red-200 bg-red-50 text-red-700 text-sm font-medium">
                                {cloudError}
                            </div>
                        )}
                        {view === 'dashboard' && <DashboardView events={events} />}
                        {view === 'register' && <RegisterView regulations={regulations} events={events} eventData={editingEvent} onSave={handleSaveEvent} onCancel={handleCancelRegister} recentInput={recentInput} />}
                        {view === 'history' && <HistoryView events={events} onEditEvent={handleEditEvent} onDeleteEvent={handleDeleteEvent} />}
                        {view === 'execution' && <ExecutionView events={events} executions={executions} onSaveExecution={handleSaveExecution} />}
                        {view === 'alerts' && <AlertsView events={events} executions={executions} readAlerts={readAlerts} onToggleRead={handleToggleAlertRead} onMarkAllRead={handleMarkAllAlertsRead} />}
                        {view === 'reports' && <ReportCenterView events={events} executions={executions} />}
                        {view === 'trash' && <TrashView deletedEvents={deletedEvents} onRestoreEvent={handleRestoreEvent} onPermanentDelete={handlePermanentDelete} />}
                        {view === 'settings' && <SettingsView regulations={regulations} onSaveRegulation={handleSaveRegulation} onDeleteRegulation={handleDeleteRegulation} onBackupJson={handleBackupJson} onBackupCsv={handleBackupCsv} onRestoreJson={handleRestoreJson} lastBackupAt={lastBackupAt} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
