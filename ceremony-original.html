<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경조사 관리대장 Pro</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase (Compat for CDN + Babel) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            overflow-x: hidden;
        }

        /* Animated Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            z-index: -1;
            filter: blur(40px);
            animation: aurora 15s ease infinite alternate;
        }

        @keyframes aurora {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        /* Glassmorphism & Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Print Styles - Layout Optimization */
        @media print {
            body { 
                background: white; 
                color: black; 
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                font-size: 12px;
            }
            .aurora-bg, aside, nav, button, .no-print { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: none !important; }
            
            .glass-panel { 
                box-shadow: none !important; 
                border: 1px solid #ddd !important; 
                break-inside: avoid; 
                background: white !important;
                padding: 1rem !important;
            }
            
            h2 { font-size: 16pt !important; color: black !important; margin-bottom: 10px !important; }
            h3 { font-size: 14pt !important; }
            h4 { font-size: 12pt !important; }
            
            th, td { border-bottom: 1px solid #eee !important; padding: 8px !important; }
            
            .print-grid-4 { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 10px !important; }
            .print-grid-3 { display: grid !important; grid-template-columns: 2fr 1fr !important; gap: 10px !important; }
        }
    </style>
</head>
<body>
    <div class="aurora-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfT58Y9XwjalTk0E0NPBWqkVVVOWN9zFQ",
            authDomain: "officeflow-one.firebaseapp.com",
            projectId: "officeflow-one",
            storageBucket: "officeflow-one.firebasestorage.app",
            messagingSenderId: "1084176732785",
            appId: "1:1084176732785:web:56e241ddcdb69afdf101d0",
            measurementId: "G-SYP4NQMGP7"
        };

        let db = null;
        let auth = null;
        let officeFlowSession = null;
        const resolveSessionUid = () => auth?.currentUser?.uid || officeFlowSession?.uid || '';
        const resolveSessionEmail = () => auth?.currentUser?.email || officeFlowSession?.email || '';
        const resolveSessionRole = () => officeFlowSession?.role || 'member';
        const resolveSessionProvider = () => auth?.currentUser?.providerData?.[0]?.providerId || officeFlowSession?.provider || '';
        const buildOwnedDocKey = (entityId) => {
            const ownerUid = resolveSessionUid();
            return ownerUid ? `${ownerUid}_${entityId}` : String(entityId);
        };
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            if (firebase.analytics) firebase.analytics();
            db = firebase.firestore();
            auth = firebase.auth();
            try {
                const raw = window.parent && window.parent !== window
                    ? window.parent.localStorage.getItem('officeflow-one-mvp-state')
                    : localStorage.getItem('officeflow-one-mvp-state');
                officeFlowSession = raw ? JSON.parse(raw)?.session || null : null;
            } catch (e) {
                officeFlowSession = null;
            }
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }

        // --- Icons ---
        const IconDashboard = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>;
        const IconPlus = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>;
        const IconSettings = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>;
        const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
        const IconFlower = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>;
        const IconTrendingUp = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>;
        const IconSearch = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>;
        const IconDownload = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>;
        const IconEdit = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.586a2 2 0 112.828 2.828L11.828 14H9v-2.828l8.586-8.586z"/></svg>;
        const IconCloud = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 014-4h1a5 5 0 019.7 1.6A3.5 3.5 0 0117.5 20H7a4 4 0 01-4-4z"/></svg>;
        const IconWallet = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-5m0 0h-4a2 2 0 110-4h4m0 4v-4"/></svg>;
        const IconBell = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2a2 2 0 01-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>;
        const IconReport = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-6m3 6V7m3 10v-3M7 3h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>;

        // --- Data Models ---
        const DEFAULT_REGULATIONS = [
            { id: 1, type: '결혼 (본인)', amount: 1000000, days: 5, wreath: true, category: 'happy' },
            { id: 2, type: '결혼 (자녀)', amount: 500000, days: 1, wreath: true, category: 'happy' },
            { id: 3, type: '사망 (부모/배우자)', amount: 500000, days: 5, wreath: true, category: 'sad' },
            { id: 4, type: '사망 (조부모)', amount: 200000, days: 2, wreath: false, category: 'sad' },
            { id: 5, type: '출산', amount: 300000, days: 90, wreath: true, category: 'happy' },
        ];

        // --- Utilities ---
        const formatCurrency = (amount) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(amount);
        const safeJsonParse = (raw, fallback) => {
            try {
                return raw ? JSON.parse(raw) : fallback;
            } catch {
                return fallback;
            }
        };
        const UI_STORAGE_KEYS = {
            historyPresets: 'corp_event_history_presets_v1',
            lastBackupAt: 'corp_event_last_backup_at_v1',
            alertReads: 'corp_event_alert_reads_v1'
        };

        // --- Chart Components (SVG) ---
        const SimpleBarChart = ({ data }) => {
            const max = Math.max(...data.map(d => d.value), 1);
            const chartHeightPx = 120;
            return (
                <div className="flex items-end space-x-2 h-40 pt-4">
                    {data.map((d, i) => {
                        const rawHeightPx = (d.value / max) * chartHeightPx;
                        const barHeightPx = d.value > 0 ? Math.max(rawHeightPx, 14) : 0;
                        return (
                        <div key={i} className="flex-1 flex flex-col items-center group cursor-pointer">
                            <div className="w-full bg-gradient-to-t from-blue-400 to-blue-300 rounded-t-md relative transition-all duration-300 group-hover:from-blue-600 group-hover:to-blue-500 group-hover:scale-y-105 origin-bottom shadow-sm" style={{ height: `${barHeightPx}px` }}>
                                <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded whitespace-nowrap z-10 transition-opacity">
                                    {formatCurrency(d.value)}
                                </div>
                            </div>
                            <span className="text-[10px] text-slate-500 mt-2 font-medium">{d.label}</span>
                        </div>
                    )})}
                </div>
            );
        };

        const SimpleCountBarChart = ({ data }) => {
            const max = Math.max(...data.map(d => d.value), 1);
            const chartHeightPx = 120;
            return (
                <div className="flex items-end space-x-2 h-40 pt-4">
                    {data.map((d, i) => {
                        const rawHeightPx = (d.value / max) * chartHeightPx;
                        const barHeightPx = d.value > 0 ? Math.max(rawHeightPx, 10) : 0;
                        return (
                        <div key={i} className="flex-1 flex flex-col items-center group cursor-pointer">
                            <div className="w-full bg-gradient-to-t from-indigo-400 to-indigo-300 rounded-t-md relative transition-all duration-300 group-hover:from-indigo-600 group-hover:to-indigo-500 group-hover:scale-y-105 origin-bottom shadow-sm" style={{ height: `${barHeightPx}px` }}>
                                <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded whitespace-nowrap z-10 transition-opacity">
                                    {d.value}건
                                </div>
                            </div>
                            <span className="text-[10px] text-slate-500 mt-2 font-medium">{d.label}</span>
                        </div>
                    )})}
                </div>
            );
        };

        const SimpleHorizontalBarChart = ({ data }) => {
            const max = Math.max(...data.map(d => d.value), 1);
            return (
                <div className="space-y-3">
                    {data.length === 0 ? (
                        <div className="text-xs text-slate-400 py-6 text-center">부서 데이터 없음</div>
                    ) : (
                        data.map((d, i) => {
                            const widthPct = (d.value / max) * 100;
                            return (
                                <div key={i}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-xs font-semibold text-slate-600 truncate max-w-[140px]">{d.label}</span>
                                        <span className="text-xs font-bold text-slate-700">{formatCurrency(d.value)}</span>
                                    </div>
                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div
                                            className="h-full rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600"
                                            style={{ width: `${Math.max(widthPct, 4)}%` }}
                                        ></div>
                                    </div>
                                </div>
                            );
                        })
                    )}
                </div>
            );
        };

        const SimpleDonutChart = ({ data }) => {
            let cumulativePercent = 0;
            const total = data.reduce((a, b) => a + b.value, 0);
            
            if(total === 0) return <div className="h-32 flex items-center justify-center text-slate-400 text-xs">데이터 없음</div>;

            const slices = data.map((d, i) => {
                const percent = d.value / total;
                const startX = Math.cos(2 * Math.PI * cumulativePercent);
                const startY = Math.sin(2 * Math.PI * cumulativePercent);
                cumulativePercent += percent;
                const endX = Math.cos(2 * Math.PI * cumulativePercent);
                const endY = Math.sin(2 * Math.PI * cumulativePercent);
                const largeArcFlag = percent > 0.5 ? 1 : 0;
                
                const pathData = `M ${startX} ${startY} A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY} L 0 0`;
                return { path: pathData, color: d.color, label: d.label, percent: (percent * 100).toFixed(1) };
            });

            return (
                <div className="flex items-center justify-center gap-8">
                    <div className="relative w-32 h-32 drop-shadow-lg">
                        <svg viewBox="-1 -1 2 2" className="transform -rotate-90 w-full h-full overflow-visible">
                            {slices.map((s, i) => (
                                <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="0.05" className="hover:opacity-90 transition-opacity cursor-pointer" />
                            ))}
                            <circle cx="0" cy="0" r="0.6" fill="white" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                             <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total</span>
                             <span className="text-sm font-black text-slate-700">{data.length} types</span>
                        </div>
                    </div>
                    <div className="space-y-2">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center text-xs">
                                <span className="w-2.5 h-2.5 rounded-full mr-2 shadow-sm" style={{backgroundColor: d.color}}></span>
                                <span className="text-slate-600 font-medium w-20 truncate">{d.label}</span>
                                <span className="text-slate-400">{((d.value/total)*100).toFixed(0)}%</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Main Components ---

        const DashboardView = ({ events }) => {
            const currentYear = new Date().getFullYear();
            const availableYears = useMemo(() => {
                const years = events
                    .map(e => e.date ? new Date(e.date).getFullYear() : null)
                    .filter(y => Number.isFinite(y));
                if (years.length === 0) return [currentYear];
                const set = new Set(years);
                set.add(currentYear);
                return Array.from(set).sort((a, b) => b - a);
            }, [events, currentYear]);
            const [selectedYear, setSelectedYear] = useState(currentYear);
            const [reportTemplate, setReportTemplate] = useState('yearly');
            const yearFilteredEvents = useMemo(
                () => events.filter(e => e.date && e.date.startsWith(String(selectedYear))),
                [events, selectedYear]
            );
            
            // Analytics Logic
            const analytics = useMemo(() => {
                const thisYearEvents = yearFilteredEvents;
                const totalAmount = thisYearEvents.reduce((sum, e) => sum + Number(e.amount), 0);
                
                // Monthly Data
                const monthlyData = Array.from({length: 12}, (_, i) => {
                    const month = String(i + 1).padStart(2, '0');
                    const monthSum = thisYearEvents
                        .filter(e => e.date.startsWith(`${selectedYear}-${month}`))
                        .reduce((sum, e) => sum + Number(e.amount), 0);
                    return { label: `${i+1}월`, value: monthSum };
                });

                const monthlyCountData = Array.from({length: 12}, (_, i) => {
                    const month = String(i + 1).padStart(2, '0');
                    const monthCount = thisYearEvents.filter(e => e.date.startsWith(`${selectedYear}-${month}`)).length;
                    return { label: `${i+1}월`, value: monthCount };
                });

                // Category Data
                const typeDataRaw = thisYearEvents.reduce((acc, curr) => {
                    acc[curr.type] = (acc[curr.type] || 0) + Number(curr.amount);
                    return acc;
                }, {});
                
                const typeData = Object.keys(typeDataRaw).map((key, index) => ({
                    label: key, 
                    value: typeDataRaw[key],
                    color: ['#3B82F6', '#10B981', '#8B5CF6', '#EC4899', '#F59E0B'][index % 5]
                }));

                const deptDataRaw = thisYearEvents.reduce((acc, curr) => {
                    const dept = curr.deptName || '미지정';
                    acc[dept] = (acc[dept] || 0) + Number(curr.amount);
                    return acc;
                }, {});
                const deptData = Object.keys(deptDataRaw)
                    .map((k) => ({ label: k, value: deptDataRaw[k] }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 8);

                const wreathCount = thisYearEvents.filter(e => e.wreath).length;
                const avgCost = thisYearEvents.length > 0 ? totalAmount / thisYearEvents.length : 0;

                return { totalAmount, count: thisYearEvents.length, monthlyData, monthlyCountData, typeData, deptData, wreathCount, avgCost };
            }, [yearFilteredEvents, selectedYear]);

            const currentMonth = new Date().getMonth() + 1;
            const monthIndexWithData = analytics.monthlyCountData.reduce((lastIdx, m, idx) => (m.value > 0 ? idx : lastIdx), -1);
            const effectiveMonth = monthIndexWithData >= 0 ? (monthIndexWithData + 1) : (selectedYear === currentYear ? currentMonth : 12);
            const effectiveQuarter = Math.ceil(effectiveMonth / 3);
            const reportEvents = useMemo(() => {
                if (reportTemplate === 'yearly') return yearFilteredEvents;
                if (reportTemplate === 'quarterly') {
                    return yearFilteredEvents.filter(e => {
                        const m = Number(String(e.date || '').split('-')[1] || 0);
                        return m >= (effectiveQuarter - 1) * 3 + 1 && m <= effectiveQuarter * 3;
                    });
                }
                return yearFilteredEvents.filter(e => {
                    const m = Number(String(e.date || '').split('-')[1] || 0);
                    return m === effectiveMonth;
                });
            }, [yearFilteredEvents, reportTemplate, effectiveQuarter, effectiveMonth]);

            const reportAmount = reportEvents.reduce((sum, e) => sum + Number(e.amount || 0), 0);
            const reportCount = reportEvents.length;

            useEffect(() => {
                if (!availableYears.includes(selectedYear)) {
                    setSelectedYear(availableYears[0] || currentYear);
                }
            }, [availableYears, selectedYear, currentYear]);

            // Print Functionality
            const handlePrint = () => {
                window.print();
            };

            // CSV Export
            const handleExportCSV = () => {
                if (reportEvents.length === 0) return alert('다운로드할 데이터가 없습니다.');
                
                const headers = "발생일자,부서명,사원명,경조사유형,지원금,휴가일수,화환여부,메모\n";
                const rows = reportEvents.map(e => 
                    `${e.date},${e.deptName || '-'},${e.empName},${e.type},${e.amount},${e.days},${e.wreath ? 'Y':'N'},${(e.memo || '').replace(/,/g, ' ')}`
                ).join("\n");
                
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers + rows;
                const encodedUri = encodeURI(csvContent);

                                                    <td className="px-2 py-1.5">{t.label}</td>

                        <h3 style={{fontSize: '13px', fontWeight: '700', margin: '0 0 6px 0', color: '#1e293b'}}>신청 이력 상세 (선택 템플릿 기준)</h3>
                        <table className="w-full text-left text-sm">

        };

        const HistoryView = ({ events, onEditEvent, onDeleteEvent }) => {
            const currentYear = new Date().getFullYear();
            const availableYears = useMemo(() => {
                const years = events
                    .map(e => e.date ? new Date(e.date).getFullYear() : null)
                    .filter(y => Number.isFinite(y));
                if (years.length === 0) return [currentYear];
                const set = new Set(years);
                set.add(currentYear);
                return Array.from(set).sort((a, b) => b - a);
            }, [events, currentYear]);

            const [selectedYear, setSelectedYear] = useState(currentYear);
            const [searchTerm, setSearchTerm] = useState('');
            const [pageSize, setPageSize] = useState(20);
            const [currentPage, setCurrentPage] = useState(1);
            const [deptFilter, setDeptFilter] = useState('');
            const [typeFilter, setTypeFilter] = useState('');
            const [wreathFilter, setWreathFilter] = useState('all');
            const [minAmount, setMinAmount] = useState('');
            const [maxAmount, setMaxAmount] = useState('');
            const [sortKey, setSortKey] = useState('date_desc');
            const [presetName, setPresetName] = useState('');
            const [presets, setPresets] = useState(() => safeJsonParse(localStorage.getItem(UI_STORAGE_KEYS.historyPresets), []));

            useEffect(() => {
                if (!availableYears.includes(selectedYear)) {
                    setSelectedYear(availableYears[0] || currentYear);
                }
            }, [availableYears, selectedYear, currentYear]);

            const deptOptions = useMemo(
                () => Array.from(new Set(events.map(e => String(e.deptName || '').trim()).filter(Boolean))).sort(),
                [events]
            );
            const typeOptions = useMemo(
                () => Array.from(new Set(events.map(e => String(e.type || '').trim()).filter(Boolean))).sort(),
                [events]
            );

            useEffect(() => {
                localStorage.setItem(UI_STORAGE_KEYS.historyPresets, JSON.stringify(presets));
            }, [presets]);

            const normalizedSearch = searchTerm.trim().toLowerCase();
            const filtered = useMemo(() => {
                return events
                    .filter(e => e.date && e.date.startsWith(String(selectedYear)))
                    .filter(e => {
                        if (!normalizedSearch) return true;
                        return (
                            String(e.empName || '').toLowerCase().includes(normalizedSearch) ||
                            String(e.deptName || '').toLowerCase().includes(normalizedSearch) ||
                            String(e.type || '').toLowerCase().includes(normalizedSearch) ||
                            String(e.date || '').toLowerCase().includes(normalizedSearch) ||
                            String(e.memo || '').toLowerCase().includes(normalizedSearch)
                        );
                    })
                    .filter(e => !deptFilter || e.deptName === deptFilter)
                    .filter(e => !typeFilter || e.type === typeFilter)
                    .filter(e => {
                        if (wreathFilter === 'all') return true;
                        return wreathFilter === 'yes' ? Boolean(e.wreath) : !Boolean(e.wreath);
                    })
                    .filter(e => {
                        const amount = Number(e.amount || 0);
                        if (minAmount !== '' && amount < Number(minAmount)) return false;
                        if (maxAmount !== '' && amount > Number(maxAmount)) return false;
                        return true;
                    })
                    .sort((a, b) => {
                        if (sortKey === 'amount_desc') return Number(b.amount || 0) - Number(a.amount || 0);
                        if (sortKey === 'amount_asc') return Number(a.amount || 0) - Number(b.amount || 0);
                        if (sortKey === 'name_asc') return String(a.empName || '').localeCompare(String(b.empName || ''), 'ko');
                        return new Date(b.date) - new Date(a.date);
                    });
            }, [events, selectedYear, normalizedSearch, deptFilter, typeFilter, wreathFilter, minAmount, maxAmount, sortKey]);

            useEffect(() => { setCurrentPage(1); }, [selectedYear, searchTerm, pageSize, deptFilter, typeFilter, wreathFilter, minAmount, maxAmount, sortKey]);

            const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
            const page = Math.min(currentPage, totalPages);
            const startIdx = (page - 1) * pageSize;
            const pageRows = filtered.slice(startIdx, startIdx + pageSize);

            const saveCurrentPreset = () => {
                const name = presetName.trim();
                if (!name) return alert('프리셋 이름을 입력해주세요.');
                const payload = {
                    name,
                    selectedYear,
                    searchTerm,
                    deptFilter,
                    typeFilter,
                    wreathFilter,
                    minAmount,
                    maxAmount,
                    sortKey,
                    pageSize
                };
                setPresets(prev => [...prev.filter(p => p.name !== name), payload]);
                setPresetName('');
            };

            const applyPreset = (name) => {
                const preset = presets.find(p => p.name === name);
                if (!preset) return;
                setSelectedYear(Number(preset.selectedYear || currentYear));
                setSearchTerm(preset.searchTerm || '');
                setDeptFilter(preset.deptFilter || '');
                setTypeFilter(preset.typeFilter || '');
                setWreathFilter(preset.wreathFilter || 'all');
                setMinAmount(preset.minAmount ?? '');
                setMaxAmount(preset.maxAmount ?? '');
                setSortKey(preset.sortKey || 'date_desc');
                setPageSize(Number(preset.pageSize) || 20);
            };

            const deletePreset = (name) => {
                setPresets(prev => prev.filter(p => p.name !== name));
            };

            return (
                <div className="animate-fade-in space-y-6 pb-24 md:pb-0">

                            <p className="text-sm text-slate-500 mt-1">연도별 신청 내역을 검색하고 페이지 단위로 관리합니다.</p>
                        </div>

                                value={selectedYear}
                                onChange={(e) => setSelectedYear(Number(e.target.value))}
                                className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm text-slate-700"
                            >
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                            <select
                                value={pageSize}
                                onChange={(e) => setPageSize(Number(e.target.value))}
                                className="px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm text-slate-700"
                            >
                                <option value={10}>10개씩</option>
                                <option value={20}>20개씩</option>
                                <option value={50}>50개씩</option>
                            </select>
                        </div>
                    </header>

                    <div className="glass-panel rounded-2xl overflow-hidden shadow-sm">
                        <div className="px-6 py-5 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-white/80">
                            <h4 className="font-bold text-slate-800 text-lg">{selectedYear}년 신청 목록</h4>
                            <div className="relative w-full md:w-72">
                                <input
                                    type="text"
                                    placeholder="사원명, 부서명, 유형, 메모 검색..."
                                    className="w-full pl-10 pr-4 py-2 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <div className="absolute left-3 top-2.5 text-slate-400"><IconSearch /></div>
                            </div>
                        </div>
                        <div className="px-6 py-4 border-b border-slate-100 bg-white/70 grid grid-cols-1 md:grid-cols-4 lg:grid-cols-8 gap-2">

                                {deptOptions.map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                            <select value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-200 text-sm">
                                <option value="">전체 유형</option>
                                {typeOptions.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>

                                <option value="all">화환 전체</option>
                                <option value="yes">화환 있음</option>
                                <option value="no">화환 없음</option>
                            </select>
                            <input type="number" min="0" value={minAmount} onChange={(e) => setMinAmount(e.target.value)} placeholder="최소 금액" className="px-3 py-2 rounded-lg border border-slate-200 text-sm" />
                            <input type="number" min="0" value={maxAmount} onChange={(e) => setMaxAmount(e.target.value)} placeholder="최대 금액" className="px-3 py-2 rounded-lg border border-slate-200 text-sm" />
                            <select value={sortKey} onChange={(e) => setSortKey(e.target.value)} className="px-3 py-2 rounded-lg border border-slate-200 text-sm">
                                <option value="date_desc">최신순</option>
                                <option value="amount_desc">금액 높은순</option>
                                <option value="amount_asc">금액 낮은순</option>
                                <option value="name_asc">사원명순</option>
                            </select>
                            <input value={presetName} onChange={(e) => setPresetName(e.target.value)} placeholder="프리셋 이름" className="px-3 py-2 rounded-lg border border-slate-200 text-sm" />
                            <button onClick={saveCurrentPreset} className="px-3 py-2 rounded-lg bg-slate-800 text-white text-sm font-semibold">프리셋 저장</button>
                        </div>
                        {presets.length > 0 && (
                            <div className="px-6 py-3 border-b border-slate-100 bg-white/70 flex flex-wrap items-center gap-2">
                                {presets.map(p => (
                                    <div key={p.name} className="inline-flex items-center gap-1 bg-slate-100 border border-slate-200 rounded-full px-2.5 py-1">
                                        <button onClick={() => applyPreset(p.name)} className="text-xs font-semibold text-slate-700">{p.name}</button>
                                        <button onClick={() => deletePreset(p.name)} className="text-xs text-slate-400 hover:text-red-500">x</button>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50/80 text-slate-500 text-xs uppercase font-bold tracking-wider">
                                    <tr>
                                        <th className="px-6 py-4">신청일</th>
                                        <th className="px-6 py-4">사원 정보</th>
                                        <th className="px-6 py-4">구분</th>
                                        <th className="px-6 py-4">지원 내용</th>
                                        <th className="px-6 py-4 text-right">금액</th>
                                        <th className="px-6 py-4 text-right">관리</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 bg-white/60">
                                    {pageRows.length === 0 ? (
                                        <tr><td colSpan="6" className="text-center py-12 text-slate-400">검색 결과가 없습니다.</td></tr>
                                    ) : (
                                        pageRows.map(event => (
                                            <tr key={event.id} className="hover:bg-blue-50/50 transition-colors">
                                                <td className="px-6 py-4 text-slate-600 font-mono text-xs">{event.date}</td>
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-slate-800">{event.empName}</div>
                                                    <div className="text-xs text-slate-500">{event.deptName || '-'}</div>
                                                </td>
                                                <td className="px-6 py-4">{event.type}</td>
                                                <td className="px-6 py-4 text-xs text-slate-500">
                                                    <span className="font-medium text-slate-700">휴가 {event.days}일</span>
                                                    {event.wreath && <span className="ml-2 text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded border border-purple-100">화환</span>}
                                                </td>
                                                <td className="px-6 py-4 text-right font-bold text-slate-800 tabular-nums">{formatCurrency(event.amount)}</td>
                                                <td className="px-6 py-4 text-right">
                                                    <div className="flex justify-end gap-2">
                                                        <button onClick={() => onEditEvent(event)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="수정"><IconEdit /></button>
                                                        <button onClick={() => onDeleteEvent(event.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="삭제"><IconTrash /></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                        <div className="px-6 py-4 border-t border-slate-100 bg-white/80 flex flex-col md:flex-row items-center justify-between gap-3">
                            <p className="text-xs text-slate-500">
                                총 {filtered.length}건 중 {filtered.length === 0 ? 0 : startIdx + 1}~{Math.min(startIdx + pageSize, filtered.length)}건 표시
                            </p>
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                    disabled={page <= 1}
                                    className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-40"
                                >
                                    이전
                                </button>
                                <span className="text-xs font-semibold text-slate-600">{page} / {totalPages}</span>
                                <button
                                    onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                    disabled={page >= totalPages}
                                    className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-40"
                                >
                                    다음
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const RegisterView = ({ regulations, events, eventData, onSave, onCancel, recentInput }) => {
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                deptName: '',
                empName: '',
                type: '',
                amount: 0,
                days: 0,
                wreath: false,
                category: '',
                status: '승인대기',
                memo: ''
            });
            const isEditMode = Boolean(eventData);
            const deptOptions = useMemo(
                () => Array.from(new Set(events.map(e => String(e.deptName || '').trim()).filter(Boolean))).sort(),
                [events]
            );
            const empOptions = useMemo(
                () => Array.from(new Set(events.map(e => String(e.empName || '').trim()).filter(Boolean))).sort(),
                [events]
            );

            useEffect(() => {
                if (eventData) {
                    setFormData({
                        date: eventData.date || new Date().toISOString().split('T')[0],
                        deptName: eventData.deptName || '',
                        empName: eventData.empName || '',
                        type: eventData.type || '',
                        amount: Number(eventData.amount) || 0,
                        days: Number(eventData.days) || 0,
                        wreath: Boolean(eventData.wreath),
                        category: eventData.category || '',
                        status: eventData.status || '승인대기',
                        memo: eventData.memo || ''
                    });
                } else {
                    setFormData({
                        date: new Date().toISOString().split('T')[0],
                        deptName: '',
                        empName: '',
                        type: '',
                        amount: 0,
                        days: 0,
                        wreath: false,
                        category: '',
                        status: '승인대기',
                        memo: ''
                    });
                }
            }, [eventData]);

            const handleTypeChange = (e) => {
                const selectedType = e.target.value;
                const rule = regulations.find(r => r.type === selectedType);
                if (rule) {
                    setFormData(prev => ({
                        ...prev,
                        type: selectedType,
                        amount: rule.amount,
                        days: rule.days,
                        wreath: rule.wreath,
                        category: rule.category
                    }));
                } else {
                    setFormData(prev => ({ ...prev, type: selectedType }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!formData.empName.trim() || !formData.deptName.trim() || !formData.type) {
                    alert('필수 항목을 모두 입력해주세요.');
                    return;
                }
                if (Number(formData.amount) < 0 || Number(formData.days) < 0) {
                    alert('금액과 휴가일수는 0 이상이어야 합니다.');
                    return;
                }
                const duplicate = events.some(e =>
                    e.id !== (eventData?.id || null) &&
                    String(e.empName || '').trim() === formData.empName.trim() &&
                    String(e.type || '').trim() === formData.type &&
                    String(e.date || '').trim() === formData.date
                );
                if (duplicate && !confirm('동일 사원/유형/일자의 등록 건이 있습니다. 그래도 저장할까요?')) {
                    return;
                }
                const selectedRule = regulations.find(r => r.type === formData.type);
                if (selectedRule) {
                    const amountGap = Math.abs(Number(formData.amount) - Number(selectedRule.amount));
                    const dayGap = Math.abs(Number(formData.days) - Number(selectedRule.days));
                    if ((amountGap > 200000 || dayGap > 2) && !confirm('규정값 대비 금액/휴가 편차가 큽니다. 저장할까요?')) {
                        return;
                    }
                }
                onSave({ ...formData, id: eventData?.id || Date.now() });
            };

            return (
                <div className="w-full animate-fade-in pb-24 md:pb-0">
                    <header className="mb-6">
                        <h2 className="text-3xl font-bold text-slate-800 tracking-tight">{isEditMode ? '경조사 내역 수정' : '경조사 신규 등록'}</h2>
                        <p className="text-slate-500 text-sm mt-1">사규에 따른 지원금 및 휴가가 자동 계산됩니다.</p>
                        {!isEditMode && recentInput && (
                            <button
                                type="button"
                                onClick={() => setFormData(prev => ({ ...prev, deptName: recentInput.deptName || '', empName: recentInput.empName || '' }))}
                                className="mt-3 px-3 py-1.5 rounded-lg bg-slate-100 text-slate-700 text-xs font-semibold border border-slate-200 hover:bg-slate-200"
                            >
                                최근 입력값 불러오기
                            </button>
                        )}
                    </header>

                    <form onSubmit={handleSubmit} className="glass-panel p-8 rounded-3xl shadow-xl space-y-8 bg-white/80">
                        <datalist id="dept-options">
                            {deptOptions.map(d => <option key={d} value={d} />)}
                        </datalist>
                        <datalist id="emp-options">
                            {empOptions.map(n => <option key={n} value={n} />)}
                        </datalist>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="space-y-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">부서명</label>
                                <input 
                                    type="text" 
                                    required
                                    list="dept-options"
                                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-white"
                                    value={formData.deptName}
                                    onChange={e => setFormData({...formData, deptName: e.target.value})}
                                    placeholder="예: 인사팀"
                                />
                            </div>
                            <div className="space-y-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">사원명</label>
                                <input 
                                    type="text" 
                                    required
                                    list="emp-options"
                                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-white"
                                    value={formData.empName}
                                    onChange={e => setFormData({...formData, empName: e.target.value})}
                                    placeholder="이름"
                                />
                            </div>
                            <div className="space-y-2">
                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">발생일자</label>
                                <input 
                                    type="date" 
                                    required
                                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-white"
                                    value={formData.date}
                                    onChange={e => setFormData({...formData, date: e.target.value})}
                                />
                            </div>
                        </div>

                        <div className="space-y-2">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">경조사 유형</label>
                            <div className="relative">
                                <select 
                                    required
                                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-white appearance-none"
                                    value={formData.type}
                                    onChange={handleTypeChange}
                                >
                                    <option value="">유형을 선택하세요</option>
                                    {regulations.map(reg => (
                                        <option key={reg.id} value={reg.type}>{reg.type}</option>
                                    ))}
                                </select>
                                <div className="absolute right-4 top-3.5 pointer-events-none text-slate-400">▼</div>
                            </div>
                        </div>

                        {/* Auto-calculated Info Card */}
                        <div className="bg-gradient-to-br from-slate-50 to-blue-50/30 border border-slate-200/60 rounded-2xl p-6 grid grid-cols-3 gap-8 shadow-inner">
                            <div className="text-center border-r border-slate-200/50">
                                <p className="text-xs text-slate-500 mb-2 uppercase font-bold">지원금</p>
                                <p className="font-black text-slate-800 text-2xl tracking-tight">{formatCurrency(formData.amount)}</p>
                            </div>
                            <div className="text-center border-r border-slate-200/50">
                                <p className="text-xs text-slate-500 mb-2 uppercase font-bold">휴가</p>
                                <p className="font-black text-slate-800 text-2xl tracking-tight">{formData.days}<span className="text-sm font-medium text-slate-400 ml-1">일</span></p>
                            </div>
                            <div className="text-center flex flex-col items-center justify-center">
                                <p className="text-xs text-slate-500 mb-2 uppercase font-bold">화환 지원</p>
                                {formData.wreath ? (
                                    <span className="inline-flex items-center gap-1.5 text-purple-700 font-bold text-sm bg-purple-100 px-3 py-1 rounded-full shadow-sm">
                                        <IconFlower /> 지원됨
                                    </span>
                                ) : (
                                    <span className="text-slate-300 text-sm font-medium">-</span>
                                )}
                            </div>
                        </div>

                        <div className="space-y-2">
                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">비고 / 메모</label>
                            <textarea 
                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-white h-24 resize-none"
                                value={formData.memo}
                                onChange={e => setFormData({...formData, memo: e.target.value})}
                                placeholder="추가 사항이 있다면 입력해주세요."
                            ></textarea>
                        </div>

                        <div className="flex gap-4 pt-4 border-t border-slate-100">
                            <button 
                                type="button" 
                                onClick={() => onCancel('dashboard')}
                                className="flex-1 py-3.5 border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 transition-all active:scale-95"
                            >
                                취소
                            </button>
                            <button 
                                type="submit" 
                                className="flex-1 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-bold hover:shadow-lg hover:shadow-blue-500/30 transition-all transform hover:-translate-y-0.5 active:scale-95"
                            >
                                {isEditMode ? '수정 저장' : '저장'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const SettingsView = ({ regulations, onSaveRegulation, onDeleteRegulation, onBackupJson, onBackupCsv, onRestoreJson, lastBackupAt }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [editId, setEditId] = useState(null);
            const fileInputRef = useRef(null);
            
            // Form State for Add/Edit
            const [form, setForm] = useState({ type: '', amount: 0, days: 0, wreath: false, category: 'happy' });

            const startAdd = () => {
                setForm({ type: '', amount: 0, days: 0, wreath: false, category: 'happy' });
                setIsAdding(true);
                setEditId(null);
            };

            const startEdit = (reg) => {
                setForm({ ...reg });
                setEditId(reg.id);
                setIsAdding(false);
            };

            const handleDelete = async (id) => {
                if(confirm('정말 이 규정을 삭제하시겠습니까?')) {
                    await onDeleteRegulation(id);
                }
            };

            const handleSave = async () => {
                const normalizedType = String(form.type || '').trim();
                if(!normalizedType) return alert("규정명을 입력하세요.");
                if (Number(form.amount) < 0 || Number(form.days) < 0) return alert("지원금/휴가일수는 0 이상이어야 합니다.");
                const isDuplicate = regulations.some(r => String(r.type).trim() === normalizedType && r.id !== editId);
                if (isDuplicate) return alert("동일한 규정명이 이미 존재합니다.");
                
                const id = isAdding ? Date.now() : editId;
                await onSaveRegulation({ ...form, type: normalizedType, id });
                setIsAdding(false);
                setEditId(null);
            };

            return (
                <div className="animate-fade-in pb-24 md:pb-0">
                    <header className="mb-8 flex justify-between items-center">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight">규정 관리 센터</h2>
                            <p className="text-slate-500 text-sm mt-1">경조사 지급 기준 및 정책을 설정합니다.</p>
                            <p className="text-xs text-slate-400 mt-2">최근 백업: {lastBackupAt || '없음'}</p>
                        </div>
                        <div className="flex flex-wrap items-center gap-2">
                            <button
                                onClick={onBackupJson}
                                className="px-4 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 hover:bg-slate-50"
                            >
                                JSON 백업
                            </button>
                            <button
                                onClick={onBackupCsv}
                                className="px-4 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 hover:bg-slate-50"
                            >
                                CSV 백업
                            </button>
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept=".json,application/json"
                                className="hidden"
                                onChange={(e) => {
                                    const file = e.target.files && e.target.files[0];
                                    if (file) onRestoreJson(file);
                                    e.target.value = '';
                                }}
                            />
                            <button
                                onClick={() => fileInputRef.current && fileInputRef.current.click()}
                                className="px-4 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 bg-white text-slate-700 hover:bg-slate-50"
                            >
                                JSON 복원
                            </button>
                            <button 
                                onClick={startAdd}
                                className="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
                            >
                                <IconPlus /> 규정 추가
                            </button>
                        </div>
                    </header>

                    {/* Add/Edit Form Area */}
                    {(isAdding || editId) && (
                        <div className="bg-white/90 backdrop-blur p-6 rounded-2xl border border-blue-100 shadow-xl mb-8 animate-fade-in ring-4 ring-blue-50/50">
                            <h3 className="font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 text-lg">
                                {isAdding ? '새 규정 등록' : '규정 수정'}
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 items-end">
                                <div className="lg:col-span-2 space-y-2">
                                    <label className="text-xs font-bold text-slate-500 block uppercase">규정명</label>
                                    <input type="text" className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none" value={form.type} onChange={e=>setForm({...form, type: e.target.value})} placeholder="예: 승진 축하" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 block uppercase">지원금</label>
                                    <input type="number" className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none" value={form.amount} onChange={e=>setForm({...form, amount: parseInt(e.target.value)||0})} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-slate-500 block uppercase">휴가(일)</label>
                                    <input type="number" className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none" value={form.days} onChange={e=>setForm({...form, days: parseInt(e.target.value)||0})} />
                                </div>
                                <div className="flex items-center justify-between bg-slate-50 px-4 py-2.5 rounded-lg border border-slate-200 h-[42px]">
                                    <label className="text-sm text-slate-700 font-medium cursor-pointer" htmlFor="wreath_check">화환 지원</label>
                                    <input 
                                        id="wreath_check"
                                        type="checkbox" 
                                        className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer"
                                        checked={form.wreath} 
                                        onChange={e=>setForm({...form, wreath: e.target.checked})} 
                                    />
                                </div>
                            </div>
                            <div className="mt-6 flex justify-end gap-3">
                                <button onClick={() => { setIsAdding(false); setEditId(null); }} className="px-5 py-2.5 text-sm text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition-colors">취소</button>
                                <button onClick={handleSave} className="px-6 py-2.5 text-sm bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-lg shadow-blue-200/50 transition-colors">저장완료</button>
                            </div>
                        </div>
                    )}

                    {/* Regulations Table */}
                    <div className="glass-panel rounded-2xl overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50/80 text-slate-500 text-xs uppercase font-bold tracking-wider">
                                <tr>
                                    <th className="px-6 py-4">규정명</th>
                                    <th className="px-6 py-4">지원금</th>
                                    <th className="px-6 py-4">휴가</th>
                                    <th className="px-6 py-4 text-center">화환</th>
                                    <th className="px-6 py-4 text-right">관리</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 bg-white/60">
                                {regulations.map(reg => (
                                    <tr key={reg.id} className="hover:bg-blue-50/30 transition-colors group">

        const TrashView = ({ deletedEvents, onRestoreEvent, onPermanentDelete }) => {

                    <div className="glass-panel rounded-2xl overflow-hidden">

                                    <tr>
                                        <th className="px-6 py-4">삭제일</th>
