        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // 전역 스코프에 Firebase 함수 노출
        window.firebaseModules = {
            initializeApp, getAuth, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp,
            getStorage, ref, uploadBytes, uploadString, getDownloadURL, deleteObject, getAnalytics
        };
    </script>

    </script>

    <style>

<body class="h-screen overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // ---------------------------------------------------------
        // 1. Core Logic & Setup
        // ---------------------------------------------------------
        const { initializeApp, getAuth, signInWithCustomToken, onAuthStateChanged,
                getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp,
                getStorage, ref, uploadBytes, uploadString, getDownloadURL, deleteObject, getAnalytics } = window.firebaseModules;

        // [수정됨] 하이브리드 설정 적용
        const OFFICEFLOW_STORAGE_KEY = 'officeflow-one-embed-session';
        const LEGACY_OFFICEFLOW_STORAGE_KEY = 'officeflow-one-mvp-state';
        const officeflowFirebaseConfig = {
            apiKey: "AIzaSyBfT58Y9XwjalTk0E0NPBWqkVVVOWN9zFQ",
            authDomain: "officeflow-one.firebaseapp.com",
            projectId: "officeflow-one",
            storageBucket: "officeflow-one.firebasestorage.app",
            messagingSenderId: "1084176732785",
            appId: "1:1084176732785:web:56e241ddcdb69afdf101d0",
            measurementId: "G-SYP4NQMGP7"
        };

        function readOfficeFlowState() {
            try {
                const raw =
                    localStorage.getItem(OFFICEFLOW_STORAGE_KEY) ||
                    localStorage.getItem(LEGACY_OFFICEFLOW_STORAGE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (error) {
                console.warn('OfficeFlow state unavailable', error);
                return null;
            }
        }

        const officeflowState = readOfficeFlowState();
        const officeflowSession = officeflowState?.session?.authenticated ? officeflowState.session : null;
        const officeflowUid = String(officeflowSession?.uid || '').trim();
        const officeflowEmail = String(officeflowSession?.email || '').toLowerCase().trim();
        const travelUserKey = (officeflowUid || officeflowEmail || 'guest').replace(/[^a-z0-9]+/gi, '_');

        let firebaseConfig;
        if (typeof window.__firebase_config !== 'undefined' && window.__firebase_config) {
            firebaseConfig = JSON.parse(window.__firebase_config);
        } else {
            firebaseConfig = officeflowFirebaseConfig;
        }

        const app = initializeApp(firebaseConfig);
        let analytics;
        try { analytics = getAnalytics(app); } catch(e) { console.log("Analytics not supported in this env"); }
        
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        const appId = window.__app_id || `ofw-travel-manager-${travelUserKey}`;

        // Helper: Currency Formatter
        const formatMoney = (amount) => {
            if (!amount) return '0';
            return new Intl.NumberFormat('ko-KR').format(amount);
        };

        const getLocalDateString = (date = new Date()) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const [year, month, day] = dateStr.split('-').map(Number);
            if (!year || !month || !day) return null;
            return new Date(year, month - 1, day);
        };

        // Helper: Date Diff
        const getDaysRemaining = (dateStr) => {
            if (!dateStr) return -999;
            const today = parseLocalDate(getLocalDateString());
            const target = parseLocalDate(dateStr);
            if (!target) return -999;
            const diff = target - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        };

        // Mock City Coords
        const getCityCoords = (city) => {
            const COORDS = {
                'ICN': {top:38,left:82}, 'SEOUL':{top:38,left:82}, 'NRT':{top:38,left:86}, 'TOKYO':{top:38,left:86},
                'PEK':{top:36,left:78}, 'SIN':{top:58,left:76}, 'LHR':{top:26,left:48}, 'CDG':{top:29,left:49},
                'JFK':{top:34,left:26}, 'LAX':{top:39,left:14}, 'SFO':{top:37,left:13}, 'DXB':{top:44,left:63},
                'HAN':{top:45,left:77}, 'SGN':{top:52,left:78}, 'SYD':{top:80,left:89}, 'FRA':{top:28,left:50},
                'MUC':{top:29,left:51}, 'BCN':{top:32,left:48}, 'FCO':{top:33,left:51}, 'IST':{top:34,left:56}
            };
            if (!city) return { top: 45, left: 50 };
            const key = city.toUpperCase().replace(/[^A-Z]/g, '');
            for (const [k, v] of Object.entries(COORDS)) {
                if (key.includes(k) || k.includes(key)) return v;
            }
            return { top: 45, left: 50 };
        };

        const COMMON_AIRPORT_OPTIONS = [
            'ICN - 인천', 'GMP - 김포', 'NRT - 도쿄 나리타', 'HND - 도쿄 하네다', 'KIX - 오사카 간사이',
            'PVG - 상하이 푸동', 'PEK - 베이징', 'CAN - 광저우', 'SIN - 싱가포르', 'BKK - 방콕',
            'HAN - 하노이', 'SGN - 호치민', 'LHR - 런던 히드로', 'CDG - 파리 샤를드골', 'FRA - 프랑크푸르트',
            'JFK - 뉴욕', 'LAX - 로스앤젤레스', 'SFO - 샌프란시스코', 'SEA - 시애틀', 'DXB - 두바이'
        ];

        // Helper: CSV Download
        const downloadCSV = (data, filename) => {
            const escapeCell = (cell) => {
                const value = String(cell ?? '');
                return `"${value.replace(/"/g, '""')}"`;
            };
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
                + data.map(row => row.map(escapeCell).join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // ---------------------------------------------------------
        // 2. UI Components
        // ---------------------------------------------------------
        
        const Badge = ({ children, color = 'gray', className = '' }) => {
            const colors = {
                gray: 'bg-slate-100/90 text-slate-700 border-slate-200/80',
                blue: 'bg-blue-50/90 text-blue-700 border-blue-200/80',
                green: 'bg-emerald-50/90 text-emerald-700 border-emerald-200/80',
                red: 'bg-rose-50/90 text-rose-700 border-rose-200/80',
                yellow: 'bg-amber-50/90 text-amber-700 border-amber-200/80',
                purple: 'bg-purple-50/90 text-purple-700 border-purple-200/80',
                orange: 'bg-orange-50/90 text-orange-700 border-orange-200/80 font-bold'
            };
            return <span className={`px-2.5 py-1 rounded-full text-[11px] border ${colors[color]} ${className}`}>{children}</span>;
        };

        // ---------------------------------------------------------
        // 3. Main Application
        // ---------------------------------------------------------
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('dashboard');
            const [employees, setEmployees] = React.useState([]);
            const [trips, setTrips] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [empModal, setEmpModal] = React.useState({ open: false, data: null });
            const [tripModal, setTripModal] = React.useState({ open: false, data: null });
            const [tripDetail, setTripDetail] = React.useState(null);
            const [dbStatus, setDbStatus] = React.useState('connecting'); // connecting, online, error
            const [employeeVisaRows, setEmployeeVisaRows] = React.useState([]);
            const [densityMode, setDensityMode] = React.useState(localStorage.getItem('travel_density_mode') || 'comfortable');
            const [appSettings, setAppSettings] = React.useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('travel_app_settings') || '{}');
                } catch {
                    return {};
                }
            });
            
            // Year Filter Logic
            const [selectedYear, setSelectedYear] = React.useState(new Date().getFullYear());
            const availableYears = React.useMemo(() => {
                const years = new Set(trips.map(t => t.startDate ? parseInt(t.startDate.split('-')[0]) : null).filter(Boolean));
                years.add(new Date().getFullYear());
                return Array.from(years).sort((a,b) => b-a);
            }, [trips]);

            // Filter Trips by Year
            const filteredTripsByYear = React.useMemo(() => {
                return trips.filter(t => t.startDate && t.startDate.startsWith(selectedYear.toString()));
            }, [trips, selectedYear]);

            const openEmployeeModal = (employee = null) => {
                setEmployeeVisaRows(employee?.visas?.length ? employee.visas : [{ country: '', type: '', expiry: '' }]);
                setEmpModal({ open: true, data: employee });
            };

            const closeEmployeeModal = () => {
                setEmpModal({ open: false, data: null });
                setEmployeeVisaRows([]);
            };

            React.useEffect(() => {
                let unsubEmp = null;
                let unsubTrip = null;
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    if (unsubEmp) { unsubEmp(); unsubEmp = null; }
                    if (unsubTrip) { unsubTrip(); unsubTrip = null; }

                    setUser(u);
                    if (!u) {
                        setEmployees([]);
                        setTrips([]);
                        setLoading(false);
                        return;
                    }

                    const qEmp = query(collection(db, 'artifacts', appId, 'public', 'data', 'employees_pro'));
                    const qTrip = query(collection(db, 'artifacts', appId, 'public', 'data', 'trips_pro'));

                    unsubEmp = onSnapshot(qEmp, 
                        (s) => {
                            const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                            data.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                            setEmployees(data);
                            setDbStatus('online');
                        }, 
                        (err) => {
                            console.error("Employee Load Error:", err);
                            setDbStatus('error');
                        }
                    );
                    
                    unsubTrip = onSnapshot(qTrip, 
                        (s) => {
                            const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                            data.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));
                            setTrips(data);
                            setLoading(false);
                            setDbStatus('online');
                        },
                        (err) => {
                            console.error("Trip Load Error:", err);
                            setDbStatus('error');
                        }
                    );
                });

                const initAuth = async () => {
                    try {
                        if(typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, window.__initial_auth_token);
                                return;
                            } catch (err) {
                                console.warn("Token mismatch, OfficeFlow session reuse failed:", err);
                            }
                        }
                        if (officeflowEmail) {
                            window.setTimeout(() => {
                                if (!auth.currentUser) {
                                    setDbStatus('connecting');
                                    setLoading(false);
                                }
                            }, 2500);
                        } else if (!auth.currentUser) {
                            setDbStatus('error');
                            setLoading(false);
                            setEmployees([]);
                            setTrips([]);
                        }
                    } catch (err) {
                        console.error("Auth init failed:", err);
                        setDbStatus('error');
                        setLoading(false);
                    }
                };
                initAuth();

                return () => {
                    if (unsubEmp) unsubEmp();
                    if (unsubTrip) unsubTrip();
                    unsubscribeAuth();
                };
            }, []);

            React.useEffect(() => {
                localStorage.setItem('travel_density_mode', densityMode);
            }, [densityMode]);

            React.useEffect(() => {
                localStorage.setItem('travel_app_settings', JSON.stringify(appSettings));
            }, [appSettings]);

            // --- Handlers (CRUD) ---
            const handleSaveEmployee = async (e) => {
                e.preventDefault();
                const form = new FormData(e.target);
                const visasRaw = employeeVisaRows
                    .map(v => ({
                        country: (v.country || '').trim().toUpperCase(),
                        type: (v.type || '').trim(),
                        expiry: v.expiry || ''
                    }))
                    .filter(v => v.country || v.type || v.expiry);
                
                const data = {
                    name: form.get('name'), empId: form.get('empId'), dept: form.get('dept'), position: form.get('position'),
                    profile: {
                        englishName: form.get('englishName'),
                        nationality: form.get('nationality'),
                        emergencyContact: form.get('emergencyContact'),
                        frequentCountries: (form.get('frequentCountries') || '').split(',').map(v => v.trim()).filter(Boolean)
                    },
                    passport: { number: form.get('pp_number'), expiry: form.get('pp_expiry'), country: form.get('pp_country') },
                    visas: visasRaw, updatedAt: serverTimestamp()
                };

                // [수정됨] Try-Catch 추가로 저장 버튼 무반응 방지
                try {
                    if(empModal.data?.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees_pro', empModal.data.id), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'employees_pro'), data);
                    
                    closeEmployeeModal();
                    // 성공 메시지는 선택사항 (너무 잦으면 방해될 수 있음)
                } catch (err) {
                    console.error("저장 실패:", err);
                    alert("저장에 실패했습니다.\n\n원인: " + err.message + "\n\nFirebase 연결 상태와 Firestore 보안 규칙을 확인해주세요.");
                }
            };

            const handleDeleteEmployee = async (employee) => {
                if (!employee?.id) return;

                const linkedTrips = trips.filter(trip => trip.empId === employee.id || trip.empName === employee.name);
                if (linkedTrips.length > 0) {
                    alert("이 임직원은 연결된 출장 데이터가 있어 삭제할 수 없습니다.\n먼저 출장 데이터를 정리해주세요.");
                    return;
                }

                if (!confirm(`'${employee.name}' 임직원 정보를 삭제하시겠습니까?`)) return;

                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees_pro', employee.id));
                    closeEmployeeModal();
                } catch (err) {
                    alert("삭제 실패: " + err.message);
                }
            };

            const handleSaveTripData = async (data, id) => {
                const previousTrip = id ? trips.find(t => t.id === id) : null;
                const normalizedTrip = normalizeTripForSave(data, previousTrip);
                const autoLogs = buildAutoChangeLogs(normalizedTrip, previousTrip);
                const payload = {
                    ...normalizedTrip,
                    changes: [...(normalizedTrip.changes || []), ...autoLogs],
                    updatedAt: serverTimestamp()
                };
                try {
                    if(id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_pro', id), payload);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'trips_pro'), payload);
                    setTripModal({ open: false, data: null });
                } catch (err) { 
                    console.error("저장 실패:", err);
                    alert("저장에 실패했습니다.\n\n원인: " + err.message + "\n\nFirebase 연결 상태와 Firestore 보안 규칙을 확인해주세요.");
                }
            };

            const deleteItem = async (col, id, documents = []) => {
                if(confirm('데이터를 영구 삭제하시겠습니까?')) {
                    try {
                        await Promise.all(
                            (documents || [])
                                .filter(d => d?.storagePath)
                                .map(d => deleteObject(ref(storage, d.storagePath)).catch(() => null))
                        );
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                    } catch(err) {
                        alert("삭제 실패: " + err.message);
                    }
                }
            };

            const updateTripStatus = async (trip, nextStatus) => {
                const autoLogs = [
                    ...(trip.changes || []),
                    { date: getLocalDateString(), type: '자동기록', note: `상태가 ${getTripStatus(trip).label}에서 ${STATUS_META[nextStatus]?.label || nextStatus}(으)로 변경되었습니다.` }
                ];
                const currentHistory = getReticketingHistory(trip);
                const latestReticketing = getLatestReticketing(trip);
                const nextReticketing = latestReticketing || trip.originalItinerary ? {
                    ...(latestReticketing || {}),
                    status: RETICKETING_FLOW.includes(nextStatus) ? nextStatus : (latestReticketing?.status || ''),
                    completedAt: nextStatus === 'reticketed' ? (latestReticketing?.completedAt || getLocalDateString()) : (latestReticketing?.completedAt || '')
                } : null;
                const nextHistory = nextReticketing
                    ? [...currentHistory.slice(0, Math.max(currentHistory.length - 1, 0)), nextReticketing]
                    : currentHistory;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips_pro', trip.id), {
                        ticketingStatus: nextStatus,
                        reticketingHistory: nextHistory,
                        reticketing: nextReticketing,
                        changes: autoLogs,
                        updatedAt: serverTimestamp()
                    });
                    setTripDetail(prev => prev?.id === trip.id ? { ...prev, ticketingStatus: nextStatus, reticketingHistory: nextHistory, reticketing: nextReticketing, changes: autoLogs } : prev);
                } catch (err) {
                    alert("상태 변경 실패: " + err.message);
                }
            };

            const STATUS_META = {
                planned: { label: '계획', color: 'blue', stage: 1 },
                requested: { label: '발권 요청', color: 'yellow', stage: 2 },
                reserved: { label: '예약 완료', color: 'blue', stage: 3 },
                ticketed: { label: '발권 완료', color: 'green', stage: 4 },
                change_req: { label: '변경 요청', color: 'orange', stage: 5 },
                rebooking: { label: '재예약 중', color: 'orange', stage: 6 },
                reticketed: { label: '재발권 완료', color: 'green', stage: 7 },
                in_trip: { label: '출장 중', color: 'green', stage: 8 },
                completed: { label: '완료', color: 'gray', stage: 9 },
                cancelled: { label: '취소', color: 'gray', stage: 10 }
            };

            const RETICKETING_FLOW = ['change_req', 'rebooking', 'reticketed'];
            const ISSUED_STATUSES = ['ticketed', 'reticketed', 'in_trip', 'completed', 'change_req', 'rebooking'];
            const getEmployeeById = (id) => employees.find(e => e.id === id);
            const getPrimaryDestination = (trip) => trip.segments?.find(seg => seg.arr)?.arr || trip.destination || '미정';
            const getTripCostTotal = (trip) => {
                const breakdown = trip.costBreakdown || {};
                const breakdownSum = ['flight', 'hotel', 'transport', 'daily', 'misc']
                    .reduce((sum, key) => sum + Number(breakdown[key] || 0), 0);
                return Number(trip.cost?.actual || breakdownSum || 0);
            };
            const getTripCurrency = (trip) => trip.cost?.currency || 'KRW';
            const getTripStatus = (trip) => STATUS_META[trip.ticketingStatus] || { label: trip.ticketingStatus || '미정', color: 'gray', stage: 99 };
            const buildItinerarySnapshot = (trip) => ({
                startDate: trip?.startDate || '',
                endDate: trip?.endDate || '',
                ticketNo: trip?.ticketNo || '',
                segments: (trip?.segments || []).map(({ dep, arr, date, airline, flightNo, pnr }) => ({ dep, arr, date, airline, flightNo, pnr }))
            });
            const hasScheduleChanged = (a, b) => !!a && !!b && (a.startDate !== b.startDate || a.endDate !== b.endDate);
            const getReticketingHistory = (trip) => {
                if (Array.isArray(trip?.reticketingHistory) && trip.reticketingHistory.length) return trip.reticketingHistory;
                if (trip?.reticketing) return [trip.reticketing];
                return [];
            };
            const getLatestReticketing = (trip) => {
                const history = getReticketingHistory(trip);
                return history.length ? history[history.length - 1] : null;
            };
            const hasReticketingFlow = (trip) => !!(trip?.originalItinerary || getReticketingHistory(trip).length || RETICKETING_FLOW.includes(trip?.ticketingStatus));
            const getQuickNextStatus = (trip) => {
                const current = trip.ticketingStatus;
                if (current === 'planned') return 'requested';
                if (current === 'requested') return 'reserved';
                if (current === 'reserved') return 'ticketed';
                if (current === 'ticketed') return 'in_trip';
                if (current === 'change_req') return 'rebooking';
                if (current === 'rebooking') return 'reticketed';
                if (current === 'reticketed') return 'in_trip';
                if (current === 'in_trip') return 'completed';
                return 'completed';
            };
            const normalizeTripForSave = (tripData, previousTrip) => {
                const scheduleChangedAfterIssue = previousTrip && ISSUED_STATUSES.includes(previousTrip.ticketingStatus) && hasScheduleChanged(previousTrip, tripData);
                let ticketingStatus = tripData.ticketingStatus;
                let originalItinerary = tripData.originalItinerary || previousTrip?.originalItinerary || null;
                const previousHistory = getReticketingHistory(previousTrip);
                let reticketingHistory = Array.isArray(tripData.reticketingHistory) ? tripData.reticketingHistory : previousHistory.slice();
                const incomingReticketing = tripData.reticketing || getLatestReticketing(tripData) || null;
                const latestHistory = reticketingHistory.length ? reticketingHistory[reticketingHistory.length - 1] : null;
                const hasOpenCycle = latestHistory && latestHistory.status !== 'reticketed' && latestHistory.status !== 'completed';

                if (scheduleChangedAfterIssue && !originalItinerary) {
                    originalItinerary = buildItinerarySnapshot(previousTrip);
                }

                const shouldManageReticketing = !!incomingReticketing || scheduleChangedAfterIssue || RETICKETING_FLOW.includes(ticketingStatus);
                if (shouldManageReticketing && !originalItinerary && previousTrip && ISSUED_STATUSES.includes(previousTrip.ticketingStatus)) {
                    originalItinerary = buildItinerarySnapshot(previousTrip);
                }
                if (scheduleChangedAfterIssue && !RETICKETING_FLOW.includes(ticketingStatus) && ['ticketed', 'reticketed', 'in_trip'].includes(previousTrip?.ticketingStatus)) {
                    ticketingStatus = 'change_req';
                }
                if (shouldManageReticketing) {
                    const baseEntry = {
                        id: latestHistory?.id || `rt-${Date.now()}`,
                        previousStartDate: incomingReticketing?.previousStartDate || (scheduleChangedAfterIssue && !hasOpenCycle ? previousTrip?.startDate : latestHistory?.previousStartDate) || previousTrip?.startDate || originalItinerary?.startDate || '',
                        previousEndDate: incomingReticketing?.previousEndDate || (scheduleChangedAfterIssue && !hasOpenCycle ? previousTrip?.endDate : latestHistory?.previousEndDate) || previousTrip?.endDate || originalItinerary?.endDate || '',
                        requestedStartDate: incomingReticketing?.requestedStartDate || tripData.startDate || '',
                        requestedEndDate: incomingReticketing?.requestedEndDate || tripData.endDate || '',
                        requestedAt: incomingReticketing?.requestedAt || latestHistory?.requestedAt || getLocalDateString(),
                        reason: incomingReticketing?.reason || latestHistory?.reason || (scheduleChangedAfterIssue ? '발권 이후 일정 변경' : '일정 변경 요청'),
                        extraCost: Number(incomingReticketing?.extraCost ?? latestHistory?.extraCost ?? 0),
                        note: incomingReticketing?.note || latestHistory?.note || '',
                        status: RETICKETING_FLOW.includes(ticketingStatus) ? ticketingStatus : (incomingReticketing?.status || latestHistory?.status || ''),
                        completedAt: ticketingStatus === 'reticketed' ? (incomingReticketing?.completedAt || latestHistory?.completedAt || getLocalDateString()) : (incomingReticketing?.completedAt || latestHistory?.completedAt || '')
                    };
                    const shouldAppendNewCycle = scheduleChangedAfterIssue && (!hasOpenCycle || latestHistory?.status === 'reticketed');
                    if (!reticketingHistory.length || shouldAppendNewCycle) {
                        reticketingHistory = [...reticketingHistory, baseEntry];
                    } else {
                        reticketingHistory = [...reticketingHistory.slice(0, -1), { ...latestHistory, ...baseEntry }];
                    }
                }

                if (!hasReticketingFlow({ originalItinerary, reticketingHistory, ticketingStatus })) {
                    reticketingHistory = [];
                }

                const reticketing = reticketingHistory.length ? reticketingHistory[reticketingHistory.length - 1] : null;

                return {
                    ...tripData,
                    ticketingStatus,
                    originalItinerary,
                    reticketingHistory,
                    reticketing
                };
            };
            const getTripAlerts = (trip) => {
                const alerts = [];
                const employee = getEmployeeById(trip.empId);
                const daysToStart = getDaysRemaining(trip.startDate);
                const passportDays = getDaysRemaining(employee?.passport?.expiry);
                const latestReticketing = getLatestReticketing(trip);
                if (daysToStart <= 3 && daysToStart >= 0 && !trip.ticketNo) alerts.push('출국 임박인데 티켓번호가 없습니다.');
                if (trip.ticketingStatus === 'change_req') alerts.push('재발권 변경 요청이 접수되었습니다.');
                if (trip.ticketingStatus === 'rebooking') alerts.push('재예약 진행 중입니다.');
                if (trip.originalItinerary && trip.originalItinerary.endDate !== trip.endDate) alerts.push(`최초 귀국일 ${trip.originalItinerary.endDate || '-'}에서 ${trip.endDate || '-'}(으)로 변경되었습니다.`);
                if (getReticketingHistory(trip).length > 1) alerts.push(`누적 일정변경 ${getReticketingHistory(trip).length}회가 기록되어 있습니다.`);
                if (latestReticketing?.requestedEndDate && latestReticketing.requestedEndDate !== trip.endDate) alerts.push('재발권 요청 일정과 현재 운영 일정이 다릅니다.');
                if (passportDays < 180) alerts.push('여권 만료가 6개월 이내입니다.');
                if (trip.endDate && trip.endDate < getLocalDateString() && trip.ticketingStatus !== 'completed' && trip.ticketingStatus !== 'cancelled') alerts.push('귀국일이 지났는데 상태가 완료되지 않았습니다.');
                if (!trip.documents?.length) alerts.push('첨부 문서가 없습니다.');
                return alerts;
            };
            const getRecentOptions = (field, max = 8) => {
                const values = trips.map(t => t[field]).filter(Boolean);
                return [...new Set(values)].slice(-max).reverse();
            };
            const getRecentAirports = () => {
                const codes = trips.flatMap(t => t.segments || []).flatMap(seg => [seg.dep, seg.arr]).filter(Boolean);
                return [...new Set([...codes.map(code => code.toUpperCase()), ...COMMON_AIRPORT_OPTIONS])].slice(0, 24);
            };
            const tripTemplates = React.useMemo(() => {
                return trips.slice(0, 5).map(t => ({
                    id: t.id,
                    label: `${t.project || '프로젝트'} / ${t.purpose || '목적'} / ${getPrimaryDestination(t)}`
                }));
            }, [trips]);
            const getEmployeeName = (trip) => getEmployeeById(trip.empId)?.name || '미지정';
            const buildAutoChangeLogs = (nextTrip, previousTrip) => {
                const autoLogs = [];
                const today = getLocalDateString();
                if (!previousTrip) {
                    autoLogs.push({ date: today, type: '자동기록', note: '출장 데이터가 신규 등록되었습니다.' });
                    return autoLogs;
                }
                if (previousTrip.ticketingStatus !== nextTrip.ticketingStatus) autoLogs.push({ date: today, type: '자동기록', note: `상태가 ${getTripStatus(previousTrip).label}에서 ${getTripStatus(nextTrip).label}(으)로 변경되었습니다.` });
                if (previousTrip.startDate !== nextTrip.startDate || previousTrip.endDate !== nextTrip.endDate) autoLogs.push({ date: today, type: '자동기록', note: `출장 기간이 ${previousTrip.startDate || '-'}~${previousTrip.endDate || '-'} 에서 ${nextTrip.startDate || '-'}~${nextTrip.endDate || '-'} 로 변경되었습니다.` });
                if (!previousTrip.originalItinerary && nextTrip.originalItinerary) autoLogs.push({ date: today, type: '자동기록', note: `최초 발권 일정 ${nextTrip.originalItinerary.startDate || '-'}~${nextTrip.originalItinerary.endDate || '-'} 이 기준 일정으로 보관되었습니다.` });
                if (previousTrip.endDate !== nextTrip.endDate && ISSUED_STATUSES.includes(previousTrip.ticketingStatus)) autoLogs.push({ date: today, type: '재발권관리', note: `귀국일 변경 요청이 ${previousTrip.endDate || '-'} 에서 ${nextTrip.endDate || '-'} 로 접수되었습니다.` });
                const prevLatestReticketing = getLatestReticketing(previousTrip);
                const nextLatestReticketing = getLatestReticketing(nextTrip);
                if (getReticketingHistory(nextTrip).length > getReticketingHistory(previousTrip).length) autoLogs.push({ date: today, type: '재발권관리', note: `${getReticketingHistory(nextTrip).length}차 일정 변경/재발권 건이 추가되었습니다.` });
                if ((prevLatestReticketing?.status || '') !== (nextLatestReticketing?.status || '')) autoLogs.push({ date: today, type: '재발권관리', note: `재발권 상태가 ${(STATUS_META[prevLatestReticketing?.status]?.label || '미정')}에서 ${(STATUS_META[nextLatestReticketing?.status]?.label || '미정')}(으)로 변경되었습니다.` });
                if (Number(prevLatestReticketing?.extraCost || 0) !== Number(nextLatestReticketing?.extraCost || 0)) autoLogs.push({ date: today, type: '재발권관리', note: `재발권 추가 비용이 ${formatMoney(prevLatestReticketing?.extraCost || 0)}에서 ${formatMoney(nextLatestReticketing?.extraCost || 0)}(으)로 변경되었습니다.` });
                if ((previousTrip.documents?.length || 0) !== (nextTrip.documents?.length || 0)) autoLogs.push({ date: today, type: '자동기록', note: `첨부 문서 수가 ${(previousTrip.documents?.length || 0)}건에서 ${(nextTrip.documents?.length || 0)}건으로 변경되었습니다.` });
                if (getTripCostTotal(previousTrip) !== getTripCostTotal(nextTrip)) autoLogs.push({ date: today, type: '자동기록', note: `총 비용이 ${formatMoney(getTripCostTotal(previousTrip))}에서 ${formatMoney(getTripCostTotal(nextTrip))}(으)로 변경되었습니다.` });
                return autoLogs;
            };

            // --- Views ---

            const Dashboard = () => {
                const totalActual = filteredTripsByYear.reduce((acc, t) => acc + getTripCostTotal(t), 0);
                const activeTrips = trips.filter(t => t.startDate <= getLocalDateString() && t.endDate >= getLocalDateString() && t.ticketingStatus !== 'cancelled');
                const urgentChanges = trips.filter(t => ['change_req', 'rebooking'].includes(t.ticketingStatus));
                const warningEmps = employees.filter(e => getDaysRemaining(e.passport?.expiry) < 180);
                const upcomingTrips = trips.filter(t => {
                    const days = getDaysRemaining(t.startDate);
                    return days >= 0 && days <= 7 && t.ticketingStatus !== 'cancelled';
                });
                const missingDocs = trips.filter(t => !t.documents?.length && t.ticketingStatus !== 'cancelled');
                const actionQueues = [
                    { title: '이번 주 출국', count: upcomingTrips.length, color: 'blue', icon: 'fa-plane-departure', badge: 'blue', iconClass: 'bg-blue-50 text-blue-600', action: () => setView('trips') },
                    { title: '재발권 필요', count: urgentChanges.length, color: 'orange', icon: 'fa-arrows-rotate', badge: 'orange', iconClass: 'bg-orange-50 text-orange-600', action: () => setView('trips') },
                    { title: '여권 갱신 필요', count: warningEmps.length, color: 'red', icon: 'fa-passport', badge: 'red', iconClass: 'bg-red-50 text-red-600', action: () => setView('employees') },
                    { title: '첨부 누락 출장', count: missingDocs.length, color: 'yellow', icon: 'fa-paperclip', badge: 'yellow', iconClass: 'bg-amber-50 text-amber-600', action: () => setView('trips') }
                ];
                const monthlyData = filteredTripsByYear.reduce((acc, t) => {
                    if (!t.startDate) return acc;
                    const m = t.startDate.split('-')[1];
                    acc[m] = (acc[m] || 0) + getTripCostTotal(t);
                    return acc;
                }, {});
                const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
                const maxMonthVal = Math.max(...Object.values(monthlyData), 1);
                const recentAlerts = filteredTripsByYear
                    .flatMap(t => getTripAlerts(t).slice(0, 2).map(text => ({ trip: t, text })))
                    .slice(0, 6);

                return (
                    <div className="p-6 space-y-6 animate-fade-in max-w-[1600px] mx-auto">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="section-shell p-5 rounded-2xl flex items-center justify-between">
                                <div><div className="text-xs text-slate-500 font-bold uppercase mb-1">{selectedYear}년 총 지출</div><div className="text-2xl font-bold text-slate-800">₩ {formatMoney(totalActual)}</div></div>
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-lg"><i className="fas fa-coins text-xl"></i></div>
                            </div>
                            <div className="section-shell p-5 rounded-2xl flex items-center justify-between">
                                <div><div className="text-xs text-slate-500 font-bold uppercase mb-1">현재 해외 체류</div><div className="text-2xl font-bold text-slate-800">{activeTrips.length}명</div></div>
                                <div className="p-3 bg-green-50 text-green-600 rounded-lg"><i className="fas fa-globe-americas text-xl"></i></div>
                            </div>
                            <div className="section-shell p-5 rounded-2xl flex items-center justify-between">
                                <div><div className="text-xs text-slate-500 font-bold uppercase mb-1">평균 출장비</div><div className="text-2xl font-bold text-slate-800">₩ {formatMoney(filteredTripsByYear.length ? totalActual / filteredTripsByYear.length : 0)}</div></div>
                                <div className="p-3 bg-violet-50 text-violet-600 rounded-lg"><i className="fas fa-chart-column text-xl"></i></div>
                            </div>
                            <div className="section-shell p-5 rounded-2xl flex items-center justify-between">
                                <div><div className="text-xs text-slate-500 font-bold uppercase mb-1">자동 경고</div><div className="text-2xl font-bold text-red-600">{recentAlerts.length}건</div></div>
                                <div className="p-3 bg-red-50 text-red-600 rounded-lg"><i className="fas fa-triangle-exclamation text-xl"></i></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                            {actionQueues.map(queue => (
                                <button key={queue.title} onClick={queue.action} className="bg-white text-left p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition">
                                    <div className="flex items-center justify-between mb-3">
                                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${queue.iconClass}`}><i className={`fas ${queue.icon}`}></i></div>
                                        <Badge color={queue.badge}>{queue.count}건</Badge>
                                    </div>
                                    <div className="font-bold text-slate-800">{queue.title}</div>
                                    <div className="text-xs text-slate-500 mt-1">클릭해서 관련 화면으로 이동</div>
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 section-shell rounded-2xl p-6 flex flex-col">
                                <div className="flex items-center justify-between mb-6">
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center"><i className="fas fa-chart-line text-blue-500 mr-2"></i>{selectedYear}년 월별 지출 추이</h3>
                                    <button onClick={() => setView('trips')} className="text-xs bg-slate-100 px-3 py-1.5 rounded">출장 목록 열기</button>
                                </div>
                                <div className="flex-1 flex items-end justify-between space-x-4 px-4 pb-2 relative">
                                    <div className="absolute inset-0 border-b border-l border-slate-100 -z-10"></div>
                                    {months.map(month => {
                                        const val = monthlyData[month] || 0;
                                        return (
                                            <div key={month} className="flex flex-col items-center flex-1 group">
                                                <div className="relative w-full flex justify-center items-end h-[280px]">
                                                    <div className="w-8 md:w-12 bg-blue-500 rounded-t-sm bar-grow hover:bg-blue-600 transition-colors relative" style={{ height: `${maxMonthVal > 0 ? (val / maxMonthVal) * 80 : 0}%` }}>
                                                        {val > 0 && <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap z-10 transition-opacity">₩ {formatMoney(val)}</div>}
                                                    </div>
                                                </div>
                                                <div className="mt-3 text-xs font-medium text-slate-500">{month}월</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="section-shell rounded-2xl p-5">
                                <h3 className="text-sm font-bold text-slate-700 mb-4 uppercase tracking-wide">자동 경고 피드</h3>
                                <div className="space-y-3">
                                    {recentAlerts.length === 0 && <div className="text-sm text-slate-400 bg-slate-50 border border-dashed rounded-lg p-4">현재 표시할 경고가 없습니다.</div>}
                                    {recentAlerts.map((item, idx) => {
                                        const emp = getEmployeeById(item.trip.empId);
                                        return (
                                            <button key={`${item.trip.id}-${idx}`} onClick={() => { setView('trips'); setTripDetail(item.trip); }} className="w-full text-left p-3 rounded-lg border border-orange-100 bg-orange-50 hover:bg-orange-100 transition">
                                                <div className="text-xs font-bold text-orange-700 mb-1">{emp?.name || '미지정'} / {item.trip.project || '프로젝트 없음'}</div>
                                                <div className="text-sm text-slate-700">{item.text}</div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const GlobalMap = () => {
                const activeTrips = trips.filter(t => t.startDate <= getLocalDateString() && t.endDate >= getLocalDateString() && t.ticketingStatus !== 'cancelled');
                const countrySummary = activeTrips.reduce((acc, trip) => {
                    const key = getPrimaryDestination(trip);
                    acc[key] = (acc[key] || 0) + 1;
                    return acc;
                }, {});
                return (
                    <div className="p-6 h-full flex flex-col animate-fade-in max-w-7xl mx-auto w-full">
                        <div className="grid grid-cols-1 xl:grid-cols-[1fr_320px] gap-6 flex-1 min-h-0">
                            <div className="bg-[#102a43] rounded-xl shadow-lg relative overflow-hidden border border-slate-700 min-h-[520px]">
                                <div className="absolute top-4 left-4 z-10 bg-white/90 px-4 py-2 rounded-lg text-sm border border-white/60">출장 중 {activeTrips.length}명</div>
                                <div className="absolute inset-0 bg-[url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg')] bg-cover bg-center opacity-30 mix-blend-overlay"></div>
                                {activeTrips.map(t => {
                                    const emp = getEmployeeById(t.empId);
                                    const dest = getPrimaryDestination(t);
                                    const coords = getCityCoords(dest);
                                    return (
                                        <button key={t.id} onClick={() => { setView('trips'); setTripDetail(t); }} className="absolute map-dot group cursor-pointer" style={{ top: `${coords.top}%`, left: `${coords.left}%` }}>
                                            <div className="relative">

            const ReportsView = () => {
                const yearTrips = filteredTripsByYear;

                    acc[emp.dept || '미지정'] = yearTrips.filter(t => t.empId === emp.id).reduce((sum, t) => sum + getTripCostTotal(t), 0) + (acc[emp.dept || '미지정'] || 0);
                    return acc;

                const topDepts = Object.entries(byDept).sort((a, b) => b[1] - a[1]).slice(0, 5);

                        const rows = yearTrips.map(t => {
                            const emp = getEmployeeById(t.empId);
                            return [emp?.name || "", emp?.dept || "", t.project || "", t.purpose || "", t.startDate || "", t.endDate || "", getTripCostTotal(t), getTripStatus(t).label, t.ticketNo || "", t.coordinator || ""];
                        });
                        return downloadCSV([headers, ...rows], `출장전체리포트_${selectedYear}.csv`);

                        const headers = ["이름", "프로젝트", "상태", "경고"];

                });

                    try { return JSON.parse(localStorage.getItem('travel_custom_templates') || '[]'); }

                    setAppSettings(settingsDraft);
                    alert('설정을 저장했습니다.');
                };

                const removeTemplate = (id) => {
                    const next = savedTemplates.filter(t => t.id !== id);
