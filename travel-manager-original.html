                                <div><label className="text-xs font-bold text-slate-500 uppercase">기본 통화</label><select value={settingsDraft.defaultCurrency} onChange={e => setSettingsDraft(prev => ({ ...prev, defaultCurrency: e.target.value }))} className="w-full border rounded-lg p-2 mt-1"><option value="KRW">KRW</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="JPY">JPY</option><option value="CNY">CNY</option></select></div>
                                <div><label className="text-xs font-bold text-slate-500 uppercase">기본 출발 공항</label><input value={settingsDraft.defaultAirport} onChange={e => setSettingsDraft(prev => ({ ...prev, defaultAirport: e.target.value.toUpperCase() }))} className="w-full border rounded-lg p-2 mt-1" /></div>
                                <div><label className="text-xs font-bold text-slate-500 uppercase">기본 부서</label><input value={settingsDraft.defaultDepartment} onChange={e => setSettingsDraft(prev => ({ ...prev, defaultDepartment: e.target.value }))} className="w-full border rounded-lg p-2 mt-1" /></div>
                                <div><label className="text-xs font-bold text-slate-500 uppercase">운영자 이름</label><input value={settingsDraft.operatorName} onChange={e => setSettingsDraft(prev => ({ ...prev, operatorName: e.target.value }))} className="w-full border rounded-lg p-2 mt-1" /></div>
                                <button onClick={saveSettings} className="bg-blue-600 text-white px-4 py-2 rounded-lg">설정 저장</button>
                            </div>
                            <div className="section-shell rounded-2xl p-5 space-y-4">
                                <h3 className="font-bold text-slate-800">저장된 템플릿</h3>
                                <div className="space-y-3">
                                    {savedTemplates.length === 0 && <div className="text-sm text-slate-400 bg-slate-50 border border-dashed rounded-lg p-4">저장된 개인 템플릿이 없습니다.</div>}
                                    {savedTemplates.map(template => (
                                        <div key={template.id} className="flex items-center justify-between gap-3 p-3 rounded-lg border border-slate-100 bg-slate-50">
                                            <div>
                                                <div className="font-medium text-slate-800">{template.label}</div>
                                                <div className="text-xs text-slate-500 mt-1">{template.project || '-'} / {template.purpose || '-'}</div>
                                            </div>
                                            <button onClick={() => removeTemplate(template.id)} className="text-red-500 hover:text-red-700"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const TripFormModal = ({ onClose, onSave, data, employees }) => {
                const [step, setStep] = React.useState(0);
                const latestReticketing = getLatestReticketing(data);
                const [customTemplates, setCustomTemplates] = React.useState(() => {
                    try { return JSON.parse(localStorage.getItem('travel_custom_templates') || '[]'); }
                    catch { return []; }
                });
                const [formState, setFormState] = React.useState({
                    empId: data?.empId || '',
                    project: data?.project || '',
                    purpose: data?.purpose || '',
                    requester: data?.requester || '',
                    coordinator: data?.coordinator || '',
                    startDate: data?.startDate || '',
                    endDate: data?.endDate || '',
                    ticketingStatus: data?.ticketingStatus || 'planned',
                    ticketNo: data?.ticketNo || '',
                    currency: data?.cost?.currency || 'KRW',
                    costBreakdown: {
                        flight: Number(data?.costBreakdown?.flight || 0),
                        hotel: Number(data?.costBreakdown?.hotel || 0),
                        transport: Number(data?.costBreakdown?.transport || 0),
                        daily: Number(data?.costBreakdown?.daily || 0),
                        misc: Number(data?.costBreakdown?.misc || 0)
                    },
                    reticketing: {
                        enabled: hasReticketingFlow(data || {}),
                        reason: latestReticketing?.reason || '',
                        requestedAt: latestReticketing?.requestedAt || '',
                        previousStartDate: latestReticketing?.previousStartDate || data?.originalItinerary?.startDate || '',
                        previousEndDate: latestReticketing?.previousEndDate || data?.originalItinerary?.endDate || '',
                        requestedStartDate: latestReticketing?.requestedStartDate || data?.startDate || '',
                        requestedEndDate: latestReticketing?.requestedEndDate || data?.endDate || '',
                        extraCost: Number(latestReticketing?.extraCost || 0),
                        completedAt: latestReticketing?.completedAt || '',
                        note: latestReticketing?.note || ''
                    },
                    originalItinerary: data?.originalItinerary || null
                });
                const [segments, setSegments] = React.useState(data?.segments?.map(s => ({...s, id: Math.random().toString(36).slice(2)})) || [{ id: 'init', dep: '', arr: '', date: '', airline: '', flightNo: '', pnr: '' }]);
                const [changeLogs, setChangeLogs] = React.useState(data?.changes || []);
                const [documents, setDocuments] = React.useState(data?.documents || []);
                const [removedDocuments, setRemovedDocuments] = React.useState([]);
                const [newChange, setNewChange] = React.useState({date: '', type: '일정변경', note: ''});
                const costTotal = ['flight', 'hotel', 'transport', 'daily', 'misc'].reduce((sum, key) => sum + Number(formState.costBreakdown[key] || 0), 0);
                const stepTitles = ['기본정보', '여정/비용', '문서/검토'];

                const patchForm = (key, value) => setFormState(prev => ({ ...prev, [key]: value }));
                const patchCost = (key, value) => setFormState(prev => ({ ...prev, costBreakdown: { ...prev.costBreakdown, [key]: Number(value || 0) } }));
                const patchReticketing = (key, value) => setFormState(prev => ({ ...prev, reticketing: { ...prev.reticketing, [key]: value } }));
                const updateSegment = (id, field, value) => setSegments(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));
                const addSeg = () => setSegments(prev => [...prev, { id: Math.random().toString(36).slice(2), dep: '', arr: '', date: '', airline: '', flightNo: '', pnr: '' }]);
                const removeSeg = (id) => setSegments(prev => prev.filter(s => s.id !== id));
                const removeDocument = (docItem) => {
                    setDocuments(prev => prev.filter(x => x.id !== docItem.id));
                    if (docItem.storagePath) setRemovedDocuments(prev => [...prev, docItem]);
                };
                React.useEffect(() => {
                    localStorage.setItem('travel_custom_templates', JSON.stringify(customTemplates));
                }, [customTemplates]);
                React.useEffect(() => {
                    if (!formState.reticketing.enabled) return;
                    setFormState(prev => ({
                        ...prev,
                        reticketing: {
                            ...prev.reticketing,
                            requestedStartDate: prev.startDate || '',
                            requestedEndDate: prev.endDate || ''
                        }
                    }));
                }, [formState.startDate, formState.endDate, formState.reticketing.enabled]);
                const loadTemplate = (templateId) => {
                    const template = customTemplates.find(t => t.id === templateId) || trips.find(t => t.id === templateId);
                    if (!template) return;
                    setFormState(prev => ({
                        ...prev,
                        project: template.project || '',
                        purpose: template.purpose || '',
                        coordinator: template.coordinator || '',
                        currency: template.cost?.currency || 'KRW',
                        costBreakdown: {
                            flight: Number(template.costBreakdown?.flight || 0),
                            hotel: Number(template.costBreakdown?.hotel || 0),
                            transport: Number(template.costBreakdown?.transport || 0),
                            daily: Number(template.costBreakdown?.daily || 0),
                            misc: Number(template.costBreakdown?.misc || 0)
                        },
                        reticketing: {
                            ...prev.reticketing,
                            requestedStartDate: prev.reticketing.enabled ? (prev.reticketing.requestedStartDate || prev.startDate || '') : '',
                            requestedEndDate: prev.reticketing.enabled ? (prev.reticketing.requestedEndDate || prev.endDate || '') : ''
                        }
                    }));
                    setSegments(template.segments?.map(s => ({ ...s, id: Math.random().toString(36).slice(2) })) || segments);
                };
                const saveCurrentTemplate = () => {
                    const template = {
                        id: `custom-${Date.now()}`,
                        project: formState.project,
                        purpose: formState.purpose,
                        coordinator: formState.coordinator,
                        cost: { currency: formState.currency },
                        costBreakdown: formState.costBreakdown,
                        segments: segments.map(({id, ...rest}) => rest),
                        label: `${formState.project || '프로젝트'} / ${formState.purpose || '목적'} / ${segments[0]?.arr || '목적지'}`
                    };
                    setCustomTemplates(prev => [template, ...prev].slice(0, 8));
                };
                const handleFileChange = (e) => {
                    const file = e.target.files[0];
                    if(!file) return;
                    if(file.size > 5 * 1024 * 1024) return alert("5MB 이하만 업로드 가능");
                    setDocuments(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, type: 'E-Ticket', date: getLocalDateString(), file }]);
                    e.target.value = '';
                };
                const addChangeLog = () => {
                    if(!newChange.date || !newChange.note) return alert("입력 필요");
                    setChangeLogs(prev => [...prev, newChange]);
                    setNewChange({date: '', type: '일정변경', note: ''});
                };
                const nextStep = () => {
                    if (step === 0 && (!formState.empId || !formState.project || !formState.purpose || !formState.startDate || !formState.endDate)) return alert("기본 정보를 먼저 입력하세요.");
                    if (step === 0 && formState.startDate > formState.endDate) return alert("종료일은 시작일보다 빠를 수 없습니다.");
                    if (step === 1 && !segments.some(seg => seg.dep && seg.arr)) return alert("최소 1개의 항공 여정을 입력하세요.");
                    setStep(prev => Math.min(prev + 1, 2));
                };

                const handleSubmit = async (e) => {
                    e.preventDefault();
                    try {
                        const uploadedDocuments = await Promise.all(documents.map(async (docItem) => {
                            const storagePath = `artifacts/${appId}/trip_docs/${data?.id || 'draft'}/${Date.now()}_${docItem.name}`;
                            const storageRef = ref(storage, storagePath);
                            if (docItem.file) await uploadBytes(storageRef, docItem.file);
                            else if (docItem.data && !docItem.url) await uploadString(storageRef, docItem.data, 'data_url');
                            else return docItem;
                            const url = await getDownloadURL(storageRef);
                            return { id: docItem.id, name: docItem.name, type: docItem.type, date: docItem.date, url, storagePath };
                        }));
                        await Promise.all(removedDocuments.filter(d => d?.storagePath).map(d => deleteObject(ref(storage, d.storagePath)).catch(() => null)));
                        await onSave({
                            empId: formState.empId,
                            project: formState.project,
                            purpose: formState.purpose,
                            requester: formState.requester,
                            coordinator: formState.coordinator,
                            startDate: formState.startDate,
                            endDate: formState.endDate,
                            ticketingStatus: formState.ticketingStatus,
                            ticketNo: formState.ticketNo,
                            cost: { actual: costTotal, currency: formState.currency },
                            costBreakdown: formState.costBreakdown,
                            segments: segments.map(({id, ...rest}) => rest),
                            changes: changeLogs,
                            documents: uploadedDocuments,
                            originalItinerary: formState.originalItinerary,
                            reticketing: formState.reticketing.enabled ? {
                                reason: formState.reticketing.reason,
                                requestedAt: formState.reticketing.requestedAt,
                                previousStartDate: formState.reticketing.previousStartDate,
                                previousEndDate: formState.reticketing.previousEndDate,
                                requestedStartDate: formState.reticketing.requestedStartDate || formState.startDate,
                                requestedEndDate: formState.reticketing.requestedEndDate || formState.endDate,
                                extraCost: Number(formState.reticketing.extraCost || 0),
                                completedAt: formState.reticketing.completedAt,
                                note: formState.reticketing.note,
                                status: RETICKETING_FLOW.includes(formState.ticketingStatus) ? formState.ticketingStatus : ''
                            } : null
                        }, data?.id);
                    } catch (err) {
                        console.error("문서 업로드 실패:", err);
                        alert("문서 업로드 또는 저장에 실패했습니다.\n\n원인: " + err.message);
                    }
                };

                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[95vh] overflow-y-auto">
                            <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl sticky top-0 z-10">
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800">출장 및 항공권 통합 관리</h3>
                                    <div className="text-xs text-slate-500 mt-1">{stepTitles[step]} 단계</div>
                                </div>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="fas fa-times text-xl"></i></button>
                            </div>
                            <div className="px-6 pt-5 grid grid-cols-3 gap-2">
                                {stepTitles.map((title, index) => <div key={title} className={`rounded-full h-2 ${index <= step ? 'bg-blue-600' : 'bg-slate-200'}`}></div>)}
                            </div>
                            <form onSubmit={handleSubmit} className="p-6 space-y-6">
                                <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="text-xs font-bold text-slate-500 uppercase">최근 템플릿</div>
                                        <button type="button" onClick={saveCurrentTemplate} className="px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-xs hover:bg-slate-100">현재 입력을 템플릿 저장</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {customTemplates.map(template => <button key={template.id} type="button" onClick={() => loadTemplate(template.id)} className="px-3 py-2 rounded-lg border border-emerald-200 bg-emerald-50 text-sm hover:bg-emerald-100">{template.label}</button>)}
                                        {tripTemplates.length === 0 && customTemplates.length === 0 && <span className="text-sm text-slate-400">저장된 출장 템플릿이 없습니다.</span>}
                                        {tripTemplates.map(template => <button key={template.id} type="button" onClick={() => loadTemplate(template.id)} className="px-3 py-2 rounded-lg border border-slate-200 bg-white text-sm hover:bg-slate-100">{template.label}</button>)}
                                    </div>
                                </div>

                                {step === 0 && (
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="space-y-4">
                                            <div><label className="text-xs font-bold text-gray-500 uppercase">출장자</label><select required value={formState.empId} onChange={e => patchForm('empId', e.target.value)} className="w-full border rounded p-2 mt-1"><option value="">선택</option>{employees.map(e => <option key={e.id} value={e.id}>{e.name} ({e.dept})</option>)}</select></div>
                                            <div><label className="text-xs font-bold text-gray-500 uppercase">프로젝트</label><input required value={formState.project} list="project-options" onChange={e => patchForm('project', e.target.value)} className="w-full border rounded p-2 mt-1" /><datalist id="project-options">{getRecentOptions('project').map(item => <option key={item} value={item} />)}</datalist></div>
                                            <div><label className="text-xs font-bold text-gray-500 uppercase">출장 목적</label><input required value={formState.purpose} list="purpose-options" onChange={e => patchForm('purpose', e.target.value)} className="w-full border rounded p-2 mt-1" /><datalist id="purpose-options">{getRecentOptions('purpose').map(item => <option key={item} value={item} />)}</datalist></div>
                                            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-bold text-gray-500 uppercase">출국일</label><input required type="date" value={formState.startDate} onChange={e => patchForm('startDate', e.target.value)} className="w-full border rounded p-2 mt-1" /></div><div><label className="text-xs font-bold text-gray-500 uppercase">귀국일</label><input required type="date" value={formState.endDate} onChange={e => patchForm('endDate', e.target.value)} className="w-full border rounded p-2 mt-1" /></div></div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-3"><div><label className="text-xs font-bold text-gray-500 uppercase">요청 메모</label><input value={formState.requester} onChange={e => patchForm('requester', e.target.value)} className="w-full border rounded p-2 mt-1" /></div><div><label className="text-xs font-bold text-gray-500 uppercase">처리 메모</label><input value={formState.coordinator} onChange={e => patchForm('coordinator', e.target.value)} className="w-full border rounded p-2 mt-1" /></div></div>
                                            <div><label className="text-xs font-bold text-gray-500 uppercase">상태</label><select value={formState.ticketingStatus} onChange={e => patchForm('ticketingStatus', e.target.value)} className="w-full border rounded p-2 mt-1">{Object.entries(STATUS_META).map(([key, meta]) => <option key={key} value={key}>{meta.label}</option>)}</select></div>
                                            <div><label className="text-xs font-bold text-gray-500 uppercase">티켓번호</label><input value={formState.ticketNo} onChange={e => patchForm('ticketNo', e.target.value)} className="w-full border rounded p-2 mt-1 font-mono" /></div>
                                            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4"><div className="text-xs text-blue-700 font-bold uppercase mb-2">자동 체크</div><div className="text-sm text-slate-700">{formState.startDate && formState.endDate ? `${formState.startDate} ~ ${formState.endDate}` : '기간 입력 전'} / {segments.length}개 여정 / 현재 총액 {formState.currency} {formatMoney(costTotal)}</div></div>
                                            <div className="bg-orange-50 border border-orange-100 rounded-xl p-4 space-y-3">
                                                <label className="flex items-center gap-2 text-sm font-semibold text-orange-800">
                                                    <input type="checkbox" checked={formState.reticketing.enabled} onChange={e => setFormState(prev => ({
                                                        ...prev,
                                                        reticketing: {
                                                            ...prev.reticketing,
                                                            enabled: e.target.checked,
                                                            previousStartDate: prev.reticketing.previousStartDate || prev.originalItinerary?.startDate || data?.startDate || '',
                                                            previousEndDate: prev.reticketing.previousEndDate || prev.originalItinerary?.endDate || data?.endDate || '',
                                                            requestedStartDate: prev.startDate || '',
                                                            requestedEndDate: prev.endDate || '',
                                                            requestedAt: prev.reticketing.requestedAt || getLocalDateString()
                                                        }
                                                    }))} />
                                                    최초 발권 이후 일정변경/재발권 관리 사용
                                                </label>
                                                {formState.reticketing.enabled && (
                                                    <div className="grid grid-cols-1 gap-3">
                                                        <div className="grid grid-cols-2 gap-3">
                                                            <div><label className="text-xs font-bold text-orange-700 uppercase">최초 출국일</label><input type="date" value={formState.reticketing.previousStartDate} onChange={e => patchReticketing('previousStartDate', e.target.value)} className="w-full border rounded p-2 mt-1" /></div>
                                                            <div><label className="text-xs font-bold text-orange-700 uppercase">최초 귀국일</label><input type="date" value={formState.reticketing.previousEndDate} onChange={e => patchReticketing('previousEndDate', e.target.value)} className="w-full border rounded p-2 mt-1" /></div>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-3">
                                                            <div><label className="text-xs font-bold text-orange-700 uppercase">변경 요청일</label><input type="date" value={formState.reticketing.requestedAt} onChange={e => patchReticketing('requestedAt', e.target.value)} className="w-full border rounded p-2 mt-1" /></div>
                                                            <div><label className="text-xs font-bold text-orange-700 uppercase">재발권 완료일</label><input type="date" value={formState.reticketing.completedAt} onChange={e => patchReticketing('completedAt', e.target.value)} className="w-full border rounded p-2 mt-1" /></div>
                                                        </div>
                                                        <div><label className="text-xs font-bold text-orange-700 uppercase">변경 사유</label><input value={formState.reticketing.reason} onChange={e => patchReticketing('reason', e.target.value)} placeholder="예: 고객 요청으로 귀국일 2일 연장" className="w-full border rounded p-2 mt-1" /></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {step === 1 && (
                                    <div className="grid grid-cols-1 xl:grid-cols-[1.2fr_0.8fr] gap-6">
                                        <div>
                                            <div className="flex justify-between items-center mb-3"><h4 className="font-bold text-gray-800">항공 여정</h4><button type="button" onClick={addSeg} className="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded font-bold">+ 추가</button></div>
                                            <div className="space-y-3">
                                                {segments.map((s) => (
                                                    <div key={s.id} className="bg-gray-50 border border-gray-200 rounded-xl p-4 relative">
                                                        <div className="grid grid-cols-1 md:grid-cols-6 gap-2">
                                                            <input value={s.dep} list="airport-options" onChange={e=>updateSegment(s.id, 'dep', e.target.value.toUpperCase())} placeholder="출발(ICN)" className="border rounded p-2 text-sm font-bold uppercase" />
                                                            <input value={s.arr} list="airport-options" onChange={e=>updateSegment(s.id, 'arr', e.target.value.toUpperCase())} placeholder="도착(JFK)" className="border rounded p-2 text-sm font-bold uppercase" />
                                                            <input type="date" value={s.date} onChange={e=>updateSegment(s.id, 'date', e.target.value)} className="border rounded p-2 text-sm md:col-span-2" />
                                                            <input value={s.airline} onChange={e=>updateSegment(s.id, 'airline', e.target.value.toUpperCase())} placeholder="항공사(KE)" className="border rounded p-2 text-sm uppercase" />
                                                            <input value={s.flightNo} onChange={e=>updateSegment(s.id, 'flightNo', e.target.value.toUpperCase())} placeholder="편명" className="border rounded p-2 text-sm uppercase" />
                                                        </div>
                                                        <input value={s.pnr} onChange={e=>updateSegment(s.id, 'pnr', e.target.value)} placeholder="예약번호 (PNR)" className="w-full border rounded p-2 text-sm mt-2 text-blue-600 font-mono" />
                                                        {segments.length > 1 && <button type="button" onClick={() => removeSeg(s.id)} className="absolute top-3 right-3 text-red-500"><i className="fas fa-trash"></i></button>}
                                                    </div>
                                                ))}
                                            </div>
                                            <datalist id="airport-options">{getRecentAirports().map(item => <option key={item} value={item} />)}</datalist>
                                        </div>
                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                                            <h4 className="font-bold text-slate-800 mb-3">비용 구조</h4>
                                            <div className="space-y-3">
                                                {[
                                                    ['flight', '항공'],
                                                    ['hotel', '숙박'],
                                                    ['transport', '교통'],
                                                    ['daily', '일비'],
                                                    ['misc', '기타']
                                                ].map(([key, label]) => <div key={key}><label className="text-xs font-bold text-slate-500 uppercase">{label}</label><input type="number" value={formState.costBreakdown[key]} onChange={e => patchCost(key, e.target.value)} className="w-full border rounded p-2 mt-1 text-right" /></div>)}
                                                {formState.reticketing.enabled && <div><label className="text-xs font-bold text-orange-700 uppercase">재발권 추가 비용</label><input type="number" value={formState.reticketing.extraCost} onChange={e => patchReticketing('extraCost', Number(e.target.value || 0))} className="w-full border rounded p-2 mt-1 text-right" /></div>}
                                                <div><label className="text-xs font-bold text-slate-500 uppercase">통화</label><select value={formState.currency} onChange={e => patchForm('currency', e.target.value)} className="w-full border rounded p-2 mt-1"><option value="KRW">KRW</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="JPY">JPY</option><option value="CNY">CNY</option></select></div>
                                                <div className="rounded-lg bg-blue-600 text-white p-4"><div className="text-xs uppercase text-blue-100">자동 합계</div><div className="text-2xl font-bold mt-1">{formState.currency} {formatMoney(costTotal)}</div></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="grid grid-cols-1 xl:grid-cols-[1fr_320px] gap-6">
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 rounded-lg border border-slate-200 p-4 flex flex-col">
                                                <div className="flex justify-between items-center mb-3"><h4 className="font-bold text-slate-700"><i className="fas fa-folder-open mr-2"></i> 문서 보관함</h4><label className="cursor-pointer bg-slate-200 px-3 py-1 rounded text-xs font-bold"><i className="fas fa-upload mr-1"></i> 파일 선택<input type="file" className="hidden" onChange={handleFileChange} /></label></div>
                                                <div className="space-y-2 min-h-[120px]">{documents.map(d=><div key={d.id} className="bg-white border rounded p-2 flex justify-between items-center"><div className="flex items-center overflow-hidden"><i className={`fas ${d.name.toLowerCase().endsWith('.pdf')?'fa-file-pdf':'fa-file-image'} text-red-500 mr-2`}></i><span className="text-xs truncate">{d.name}</span>{d.file && <span className="ml-2 text-xxs text-amber-600 font-bold">업로드 대기</span>}</div><div className="flex gap-2">{(d.url || d.data) && <a href={d.url || d.data} download={d.name} className="text-blue-500"><i className="fas fa-download"></i></a>}<button type="button" onClick={()=>removeDocument(d)} className="text-red-400"><i className="fas fa-trash"></i></button></div></div>)}</div>
                                            </div>
                                            <div className="bg-orange-50 border border-orange-100 rounded-xl p-4">
                                                <div className="font-bold text-orange-800 mb-3">변경 이력</div>
                                                <div className="space-y-2 mb-3">{changeLogs.map((l,i)=><div key={i} className="bg-white border p-2 text-xs rounded"><b>{l.date}</b> <span className="text-orange-600">{l.type}</span><div className="text-gray-600">{l.note}</div></div>)}</div>
                                                <div className="grid gap-2"><div className="grid grid-cols-2 gap-2"><input type="date" value={newChange.date} onChange={e=>setNewChange({...newChange,date:e.target.value})} className="border text-xs p-2 rounded"/><select value={newChange.type} onChange={e=>setNewChange({...newChange,type:e.target.value})} className="border text-xs p-2 rounded"><option>일정변경</option><option>재발권</option><option>단순메모</option></select></div><input value={newChange.note} onChange={e=>setNewChange({...newChange,note:e.target.value})} className="border text-xs p-2 rounded" placeholder="내용"/><button type="button" onClick={addChangeLog} className="bg-orange-100 text-orange-700 text-xs font-bold py-2 rounded">추가</button></div>
                                            </div>
                                            {formState.reticketing.enabled && (
                                                <div className="bg-orange-50 border border-orange-100 rounded-xl p-4">
                                                    <div className="font-bold text-orange-800 mb-3">재발권 비교</div>
                                                    <div className="grid grid-cols-2 gap-3 text-sm">
                                                        <div className="bg-white border rounded-lg p-3">
                                                            <div className="text-xs text-slate-500 uppercase mb-1">최초 발권 일정</div>
                                                            <div className="font-semibold">{formState.reticketing.previousStartDate || '-'} ~ {formState.reticketing.previousEndDate || '-'}</div>
                                                        </div>
                                                        <div className="bg-white border rounded-lg p-3">
                                                            <div className="text-xs text-slate-500 uppercase mb-1">변경 후 일정</div>
                                                            <div className="font-semibold">{formState.startDate || '-'} ~ {formState.endDate || '-'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="mt-3 text-xs text-slate-600">귀국일만 변경돼도 최초 발권 일정과 현재 운영 일정을 함께 저장합니다.</div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="bg-white border border-slate-200 rounded-xl p-5 space-y-4 shadow-sm">
                                            <h4 className="font-bold text-slate-800">최종 검토</h4>
                                            <div className="text-sm text-slate-600 space-y-2">
                                                <div><b>출장자</b> {getEmployeeById(formState.empId)?.name || '-'}</div>
                                                <div><b>프로젝트</b> {formState.project || '-'}</div>
                                                <div><b>기간</b> {formState.startDate || '-'} ~ {formState.endDate || '-'}</div>
                                                <div><b>상태</b> {STATUS_META[formState.ticketingStatus]?.label || '-'}</div>
                                                <div><b>비용</b> {formState.currency} {formatMoney(costTotal)}</div>
                                                <div><b>재발권 추가비용</b> {formState.reticketing.enabled ? `${formState.currency} ${formatMoney(formState.reticketing.extraCost || 0)}` : '-'}</div>
                                                <div><b>첨부</b> {documents.length}건</div>
                                            </div>
                                            <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-500">저장 후에는 작업 보드, 캘린더, 상세 패널에서 바로 관리할 수 있습니다.</div>
                                        </div>
                                    </div>
                                )}

                                <div className="flex justify-between pt-4 border-t gap-3">
                                    <div>{step > 0 && <button type="button" onClick={() => setStep(prev => prev - 1)} className="px-6 py-2 rounded border">이전</button>}</div>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={onClose} className="px-6 py-2 rounded border">취소</button>
                                        {step < 2 ? <button type="button" onClick={nextStep} className="bg-blue-600 text-white px-8 py-2 rounded font-bold">다음</button> : <button type="submit" className="bg-blue-600 text-white px-8 py-2 rounded font-bold">완료</button>}
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex min-h-screen bg-transparent">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-white hidden md:flex flex-col h-screen fixed left-0 top-0 z-20 shadow-2xl">
                        <div className="p-8">
                            <h1 className="text-2xl font-black text-white tracking-tighter flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-cyan-500 flex items-center justify-center text-sm shadow-lg">
                                    <i className="fas fa-plane-departure text-white text-xs"></i>
                                </div>
                                출장관리<span className="text-blue-400">.Pro</span>
                            </h1>
                            <p className="text-slate-500 text-[10px] mt-1 uppercase tracking-widest font-bold">
                                Enterprise Solution
                            </p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 overflow-y-auto sidebar-scroll-hidden">
                            {[
                                {id:'dashboard',icon:'fas fa-chart-line',label:'경영진 대시보드'},
                                {id:'workqueue',icon:'fas fa-inbox',label:'작업함'},
                                {id:'map',icon:'fas fa-globe-americas',label:'실시간 위치 관제'},
                                {id:'trips',icon:'fas fa-plane',label:'출장 및 항공권'},
                                {id:'reports',icon:'fas fa-file-lines',label:'리포트'},
                                {id:'employees',icon:'fas fa-users',label:'임직원 관리'},
                                {id:'settings',icon:'fas fa-gear',label:'설정'}
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setView(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-200 group ${
                                        view === item.id
                                            ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50 translate-x-1'
                                            : 'text-slate-400 hover:bg-slate-800 hover:text-white hover:translate-x-1'
                                    }`}
                                >
                                    <i className={`${item.icon} w-5 text-center text-base`}></i>
                                    <span>{item.label}</span>
                                    {view === item.id && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-blue-300"></div>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-6 border-t border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-cyan-500 flex items-center justify-center font-bold text-sm shadow-lg">
                                    {(officeflowSession?.name || appSettings.operatorName || '관리자').charAt(0)}
                                </div>
                                <div className="leading-tight">
                                    <div className="text-sm font-bold">{officeflowSession?.name || appSettings.operatorName || '관리자'}</div>
                                    <div className="text-xs text-slate-500">시스템 마스터</div>
                                </div>
                            </div>
                            <div
                                className={`mt-4 flex items-center gap-2 text-[11px] font-semibold px-2.5 py-2 rounded-lg border ${
                                    dbStatus === 'error'
                                        ? 'text-red-300 bg-red-900/30 border-red-900/40'
                                        : dbStatus === 'online'
                                            ? 'text-emerald-300 bg-emerald-900/20 border-emerald-900/40'
                                            : 'text-amber-300 bg-amber-900/20 border-amber-900/40'
                                }`}
                            >
                                <i className={`fas ${dbStatus === 'error' ? 'fa-cloud-slash' : 'fa-cloud'} ${dbStatus === 'error' ? 'text-red-300' : dbStatus === 'online' ? 'text-emerald-300' : 'text-amber-300'}`}></i>
                                <span>{dbStatus === 'error' ? '클라우드 오류' : dbStatus === 'online' ? '클라우드 연동됨' : '클라우드 연결중'}</span>
                                <span className="ml-auto">{dbStatus === 'error' ? '확인 필요' : '정상'}</span>
                            </div>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative rounded-[30px] glass-panel mt-3 mr-3 mb-3 lg:mt-4 lg:mr-4 lg:mb-4 md:ml-[272px]">
                        <header className="h-[84px] flex items-center justify-between px-5 lg:px-8 z-10 border-b border-slate-200/70 bg-white/65 backdrop-blur-xl">
                            <div>
                                <div className="hero-chip mb-2 hidden md:inline-flex"><i className="fas fa-sparkles text-blue-600"></i> Travel Operations Center</div>
                                <h1 className="text-xl lg:text-2xl font-bold text-gray-800 flex items-center">
                                {view === 'dashboard' && <><i className="fas fa-chart-pie mr-2 text-gray-400"></i> 경영진 대시보드</>}
                                {view === 'workqueue' && <><i className="fas fa-inbox mr-2 text-gray-400"></i> 작업함</>}
                                {view === 'map' && <><i className="fas fa-satellite-dish mr-2 text-gray-400"></i> 실시간 위치 관제 센터</>}
                                {view === 'trips' && <><i className="fas fa-list-alt mr-2 text-gray-400"></i> 출장 및 항공권 관리</>}
                                {view === 'reports' && <><i className="fas fa-file-lines mr-2 text-gray-400"></i> 리포트</>}
                                {view === 'employees' && <><i className="fas fa-address-card mr-2 text-gray-400"></i> 임직원 여권/비자 관리</>}
                                {view === 'settings' && <><i className="fas fa-gear mr-2 text-gray-400"></i> 설정</>}
                                </h1>
                            </div>
                            <div className="flex items-center space-x-3 lg:space-x-5">
                                <div className="hidden lg:flex items-center gap-2">
                                    <select value={densityMode} onChange={e => setDensityMode(e.target.value)} className="bg-white/80 border border-slate-200 text-gray-900 text-sm rounded-xl px-3 py-2.5 shadow-sm">
                                        <option value="comfortable">여유 보기</option>
                                        <option value="compact">조밀 보기</option>
                                    </select>
                                </div>
                                {/* Year Filter */}
                                <div className="flex items-center rounded-2xl border border-slate-200 bg-white/80 px-3 py-2 shadow-sm">
                                    <span className="text-[11px] font-bold text-gray-500 mr-2 uppercase tracking-[0.16em]">조회 연도</span>
                                    <select value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))} className="bg-transparent text-gray-900 text-sm focus:ring-0 focus:border-transparent block p-0 border-0">
                                        {availableYears.map(year => (
                                            <option key={year} value={year}>{year}년</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="text-right hidden md:block"><div className="text-sm font-bold text-gray-800">{officeflowSession?.name || '관리자'}</div><div className="text-xs text-gray-500">Travel Manager</div></div>
                                <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-slate-900 to-slate-700 text-white flex items-center justify-center font-bold shadow-sm">{String((officeflowSession?.name || officeflowSession?.email || 'A')).charAt(0).toUpperCase()}</div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-auto bg-pattern rounded-b-[30px]">
                            {view === 'dashboard' && <Dashboard />}
                            {view === 'workqueue' && <WorkQueue />}
                            {view === 'map' && <GlobalMap />}
                            {view === 'trips' && <TripManager />}
                            {view === 'reports' && <ReportsView />}
                            {view === 'employees' && <EmployeeManager />}
                            {view === 'settings' && <SettingsView />}
                        </div>
                        
                        {/* Modals Implemented Inline */}
                        {empModal.open && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl sticky top-0 z-10">
                                        <h3 className="font-bold text-lg text-gray-800">임직원 상세 정보</h3>
                                        <button onClick={closeEmployeeModal} className="text-gray-400 hover:text-gray-600"><i className="fas fa-times text-xl"></i></button>
                                    </div>
                                    <form onSubmit={handleSaveEmployee} className="p-6 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">성명</label><input required name="name" defaultValue={empModal.data?.name} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">사번</label><input name="empId" defaultValue={empModal.data?.empId} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">부서</label><input name="dept" defaultValue={empModal.data?.dept} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">직급</label><input name="position" defaultValue={empModal.data?.position} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">영문명</label><input name="englishName" defaultValue={empModal.data?.profile?.englishName} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">국적</label><input name="nationality" defaultValue={empModal.data?.profile?.nationality} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">긴급 연락처</label><input name="emergencyContact" defaultValue={empModal.data?.profile?.emergencyContact} className="w-full border rounded p-2" /></div>
                                            <div className="space-y-1"><label className="text-xs font-bold text-gray-500 uppercase">자주 방문 국가</label><input name="frequentCountries" defaultValue={(empModal.data?.profile?.frequentCountries || []).join(', ')} className="w-full border rounded p-2" placeholder="US, JP, VN" /></div>
                                        </div>
                                        <div className="border-t pt-4">
                                            <h4 className="font-bold text-blue-800 mb-3 text-sm"><i className="fas fa-passport mr-2"></i> 여권 정보</h4>
                                            <div className="grid grid-cols-3 gap-4 bg-blue-50 p-4 rounded-lg">
                                                <div><label className="text-xs font-bold text-blue-600">번호</label><input required name="pp_number" defaultValue={empModal.data?.passport?.number} className="w-full border rounded p-2" /></div>
                                                <div><label className="text-xs font-bold text-blue-600">국가</label><input name="pp_country" defaultValue={empModal.data?.passport?.country || 'KR'} className="w-full border rounded p-2" /></div>
                                                <div><label className="text-xs font-bold text-blue-600">만료일</label><input required type="date" name="pp_expiry" defaultValue={empModal.data?.passport?.expiry} className="w-full border rounded p-2" /></div>
                                            </div>
                                        </div>
                                        <div className="border-t pt-4">
                                            <div className="flex items-center justify-between mb-3">
                                                <h4 className="font-bold text-emerald-800 text-sm"><i className="fas fa-stamp mr-2"></i> 비자 정보</h4>
                                                <button type="button" onClick={() => setEmployeeVisaRows(prev => [...prev, { country: '', type: '', expiry: '' }])} className="text-xs bg-emerald-50 text-emerald-700 px-3 py-1 rounded font-bold">+ 비자 추가</button>
                                            </div>
                                            <div className="space-y-2">
                                                {employeeVisaRows.length === 0 && <div className="text-sm text-slate-400 bg-slate-50 border border-dashed rounded p-3">등록된 비자 정보가 없습니다.</div>}
                                                {employeeVisaRows.map((visa, idx) => (
                                                    <div key={idx} className="grid grid-cols-12 gap-2 bg-emerald-50 p-3 rounded border border-emerald-100 items-end">
                                                        <div className="col-span-3"><label className="text-xs font-bold text-emerald-700">국가</label><input value={visa.country} onChange={e => setEmployeeVisaRows(prev => prev.map((v, i) => i === idx ? { ...v, country: e.target.value } : v))} className="w-full border rounded p-2 uppercase" placeholder="US" /></div>
                                                        <div className="col-span-4"><label className="text-xs font-bold text-emerald-700">종류</label><input value={visa.type} onChange={e => setEmployeeVisaRows(prev => prev.map((v, i) => i === idx ? { ...v, type: e.target.value } : v))} className="w-full border rounded p-2" placeholder="B1/B2" /></div>
                                                        <div className="col-span-4"><label className="text-xs font-bold text-emerald-700">만료일</label><input type="date" value={visa.expiry} onChange={e => setEmployeeVisaRows(prev => prev.map((v, i) => i === idx ? { ...v, expiry: e.target.value } : v))} className="w-full border rounded p-2" /></div>
                                                        <div className="col-span-1"><button type="button" onClick={() => setEmployeeVisaRows(prev => prev.filter((_, i) => i !== idx))} className="w-full h-10 rounded bg-red-50 text-red-500 border border-red-100"><i className="fas fa-trash"></i></button></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex justify-between pt-4 border-t gap-3">
                                            <div>
                                                {empModal.data?.id && (
                                                    <button
                                                        type="button"
                                                        onClick={() => handleDeleteEmployee(empModal.data)}
                                                        className="px-6 py-2 rounded border border-red-200 text-red-600 hover:bg-red-50 font-bold"
                                                    >
                                                        삭제
                                                    </button>
                                                )}
                                            </div>
                                            <div className="flex gap-3">
                                            <button type="button" onClick={closeEmployeeModal} className="px-6 py-2 rounded border hover:bg-gray-50">취소</button>
                                            <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold">저장</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                        {tripModal.open && <TripFormModal onClose={() => setTripModal({open: false, data: null})} onSave={handleSaveTripData} data={tripModal.data} employees={employees} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
