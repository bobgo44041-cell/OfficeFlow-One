        async function ensureAdminUsersLoaded(force = false) {
          if (state.session.role !== "owner") return;
          if (!force && (state.apps.adminUsersLoading || state.apps.adminUsersLoaded)) return;
          setState((prev) => ({
            ...prev,
            apps: {
              ...prev.apps,
              adminUsersLoading: true,
              adminUsersLoaded: false,
              admin: {
                ...prev.apps.admin,
                usersError: "",
              },
            },
          }));
          if (!firebaseServices.db) {
            setState((prev) => ({
              ...prev,
              apps: {
                ...prev.apps,
                adminUsersLoading: false,
                adminUsersLoaded: true,
                admin: {
                  ...prev.apps.admin,
                  usersError: "Firestore가 연결되지 않아 로컬 사용자 목록만 표시합니다.",
                },
              },
            }));
            return;
          }
          try {
            const snapshot = await firebaseServices.db.collection(USER_PROFILES_COLLECTION).get();
            const rows = snapshot.docs.map((doc) => {
              const data = doc.data() || {};
              return {
                uid: data.uid || "",
                email: doc.id,
                name: data.name || "",
                contact: data.contact || "",
                provider: data.provider || "",
                role: resolveRole(doc.id),
              };
            });
            setState((prev) => ({
              ...prev,
              apps: {
                ...prev.apps,
                adminUsers: rows,
                adminUsersLoading: false,
                adminUsersLoaded: true,
                admin: {
                  ...prev.apps.admin,
                  usersError: "",
                },
              },
            }));
          } catch (error) {
            console.error("Failed to load admin users:", error);
            setState((prev) => ({
              ...prev,
              apps: {
                ...prev.apps,
                adminUsersLoading: false,
                adminUsersLoaded: true,
                admin: {
                  ...prev.apps.admin,
                  usersError: "클라우드 사용자 목록을 불러오지 못했습니다. 규칙 또는 연결 상태를 확인하세요.",

            }));
          }
        }

        async function ensureAdminAnalyticsLoaded(force = false) {
          if (state.session.role !== "owner") return;
          if (!force && (state.apps.admin.analyticsLoading || state.apps.admin.analyticsLoaded)) return;
          setState((prev) => ({
            ...prev,
            apps: {
              ...prev.apps,
              admin: {
                ...prev.apps.admin,
                analyticsLoading: true,
                analyticsError: "",
              },
            },
          }));
          if (!firebaseServices.db) {
            setState((prev) => ({
              ...prev,
              apps: {
                ...prev.apps,
                admin: {
                  ...prev.apps.admin,
                  analyticsLoading: false,
                  analyticsLoaded: true,
                  analyticsError: "Firestore가 연결되지 않아 방문 통계를 불러올 수 없습니다.",
                },
              },
            }));
            return;
          }
          try {
            const doc = await firebaseServices.db.collection("ofw_admin_config").doc("usage_analytics").get();
            const data = doc.exists ? doc.data() || {} : {};
            const dailyVisits =
              data.dailyVisits ||
              Object.fromEntries(
                Object.entries(data)
                  .filter(([key]) => key.startsWith("dailyVisits."))
                  .map(([key, value]) => [key.slice("dailyVisits.".length), value])
              );
            const appOpens =
              data.appOpens ||
              Object.fromEntries(
                Object.entries(data)
                  .filter(([key]) => key.startsWith("appOpens."))
                  .map(([key, value]) => [key.slice("appOpens.".length), value])
              );

        async function trackAdminAnalytics(type, appId = "") {
          if (!firebaseServices.db || !state.session.authenticated || !window.firebase?.firestore?.FieldValue) return;
          const todayKey = getTodayKey();
          try {
            const ref = firebaseServices.db.collection("ofw_admin_config").doc("usage_analytics");
            await ref.set(
              {
                lastTrackedAt: new Date().toISOString(),
              },
              { merge: true }
            );
            const updates = {};
            if (type === "visit") {
              updates.totalVisits = window.firebase.firestore.FieldValue.increment(1);
              updates[`dailyVisits.${todayKey}`] = window.firebase.firestore.FieldValue.increment(1);
            }
            if (type === "app_open" && appId) {
              updates[`appOpens.${appId}`] = window.firebase.firestore.FieldValue.increment(1);
            }
            if (Object.keys(updates).length) {
              await ref.update(updates);
            }
            if (state.session.role === "owner") {
              ensureAdminAnalyticsLoaded(true);
            }
          } catch (error) {
            console.error("Failed to track analytics:", error);
          }
        }

        function getTodayKey() {
          const now = new Date();
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, "0");
          const d = String(now.getDate()).padStart(2, "0");
          return `${y}-${m}-${d}`;
        }

        function getRecent7DaysVisits(dailyVisits) {
          let total = 0;
          for (let i = 0; i < 7; i += 1) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            total += Number(dailyVisits[`${y}-${m}-${d}`] || 0);
          }
          return total;
        }

        async function handleSocialLogin(provider) {
          if (provider !== "google") return;
          if (window.location.protocol === "file:") {
            pushToast(
              "Google 로그인 불가",
              "file://에서는 Google 로그인이 동작하지 않습니다. http://127.0.0.1:5500/office-saas-mvp.html 로 열어주세요."
            );
            return;
          }
          if (!firebaseServices.enabled || !firebaseServices.auth || !window.firebase?.auth) {
            pushToast("Google 로그인 불가", "Firebase Auth 초기화에 실패했습니다.");
            return;
          }

          const isSignup = state.authMode === "signup";
          const providerInstance = new window.firebase.auth.GoogleAuthProvider();
          providerInstance.setCustomParameters({ prompt: "select_account" });

          try {
            const result = await firebaseServices.auth.signInWithPopup(providerInstance);
            const user = result.user;
            if (!user?.email) {
              pushToast("Google 로그인 실패", "Google 계정 이메일을 확인할 수 없습니다.");
              return;
            }

            const nextEmail = user.email.toLowerCase();
            const existingAccount = getStoredAccountByEmail(nextEmail);
            const cloudProfile = await getCloudUserProfileByEmail(nextEmail);
            const nextName =
              user.displayName ||
              existingAccount?.name ||
              cloudProfile?.name ||
              "";
            const nextContact =
              user.phoneNumber ||
              existingAccount?.contact ||
              cloudProfile?.contact ||
              "";
            setState((prev) => ({
              ...prev,
              authMode: "signin",
              accounts: Array.isArray(prev.accounts) && prev.accounts.some((account) => account.email === nextEmail)
                ? prev.accounts.map((account) =>
                    account.email === nextEmail
                      ? {
                          ...account,
                          uid: user.uid || account.uid || "",
                          name: nextName,
                          contact: nextContact,
                          provider: "google",
                        }
                      : account
                  )
                : [
                    ...(Array.isArray(prev.accounts) ? prev.accounts : []),
                    {
                      uid: user.uid || "",
                      name: nextName,
                      contact: nextContact,
                      email: nextEmail,
                      password: "",
                      provider: "google",
                    },
                  ],
              session: {
                authenticated: true,
                uid: user.uid || "",
                name: nextName,
                contact: nextContact,
                email: nextEmail,
                provider: "Google OAuth",
                role: resolveRole(nextEmail),
              },
              navigation: {
                current: "dashboard",
              },
            }));
            updateHash("dashboard");
            pushToast(isSignup ? "Google 회원가입 완료" : "Google 로그인 완료", nextEmail + " 계정으로 연결되었습니다.");
          } catch (error) {
            console.error("Google sign-in error:", {
              code: error?.code,
              message: error?.message,
              origin: window.location.origin,
              href: window.location.href,
            });
            const message = error?.code === "auth/popup-closed-by-user"
              ? "팝업이 닫혀 로그인하지 못했습니다."
              : error?.code === "auth/popup-blocked"
                ? "브라우저가 로그인 팝업을 차단했습니다. 팝업 차단을 해제하고 다시 시도하세요."
              : error?.code === "auth/operation-not-supported-in-this-environment"
                ? "현재 주소가 http/https가 아니어서 로그인할 수 없습니다. 로컬 서버로 열어주세요."
                : error?.code === "auth/unauthorized-domain"
                  ? "Firebase Authorized Domains에 127.0.0.1 또는 localhost를 추가해야 합니다."
                  : error?.code === "auth/operation-not-allowed"
                    ? "Firebase Authentication에서 Google 로그인 제공업체가 비활성화되어 있습니다."
                    : error?.code === "auth/invalid-api-key"
                      ? "Firebase API 키 설정이 올바르지 않습니다."
                      : error?.code === "auth/configuration-not-found"
                        ? "Firebase 프로젝트의 Google 로그인 설정이 완료되지 않았습니다."
                        : error?.code === "auth/account-exists-with-different-credential"
                          ? "같은 이메일이 다른 로그인 방식으로 이미 가입되어 있습니다."
                  : error?.code === "auth/network-request-failed"
                    ? "네트워크 요청이 실패했습니다. 브라우저 확장 프로그램이나 방화벽을 확인하세요."
                    : "Firebase Google 로그인 설정을 다시 확인해야 합니다. " + (error?.code || "unknown-error");
            pushToast("Google 로그인 실패", message + (error?.code ? " (" + error.code + ")" : ""));
          }
        }

        function extractActions(notes) {
          if (!notes) return [];
          const lines = notes
            .split(/\n+/)
            .map((line) => line.trim())
            .filter(Boolean);

          const actions = [];
          lines.forEach((line, index) => {
            const normalized = line.toLowerCase();
            const looksAction =
              normalized.startsWith("action") ||
              normalized.startsWith("todo") ||
              normalized.startsWith("[ ]") ||
              normalized.includes("담당:") ||
              normalized.includes("해야") ||
              normalized.includes("확인");
            if (!looksAction) return;

            const ownerMatch = line.match(/담당[:\s]+([^\-\/,]+)/);
            const owner = ownerMatch ? ownerMatch[1].trim() : "미지정";
            const cleanText = line
              .replace(/^action[:\s-]*/i, "")
              .replace(/^todo[:\s-]*/i, "")
              .replace(/^\[\s?\]\s*/, "")
              .replace(/담당[:\s]+([^\-\/,]+)/, "")
              .replace(/\s{2,}/g, " ")
              .trim();
            const dueDate = new Date(Date.now() + (index + 1) * 86400000).toISOString().slice(0, 10);
            actions.push({
              id: "act-" + index + "-" + Date.now(),
              text: cleanText || "후속 작업",
              owner,
              dueDate,
              dueLabel: formatDate(dueDate),
            });
          });
          return actions;
        }

          const chip = document.createElement("span");
          chip.className = "chip";

          if (lower.includes("high") || lower.includes("높음")) chip.classList.add("high");
          if (lower.includes("medium") || lower.includes("보통")) chip.classList.add("medium");
          if (lower.includes("low") || lower.includes("낮음")) chip.classList.add("low");
          chip.textContent = text;
          return chip;

            maximumFractionDigits: 0,
          }).format(Number(amount || 0));
        }

        function formatDate(value) {
          if (!value) return "미정";
          const [year, month, day] = value.split("-");
          return year + "." + month + "." + day;
        }

        function minutesToHourLabel(minutes) {
          const hour = Math.floor(minutes / 60);
          const remain = minutes % 60;
          if (hour && remain) return hour + "시간 " + remain + "분";
          if (hour) return hour + "시간";
          return remain + "분";
        }

          const [sh, sm] = start.split(":").map(Number);
          const [eh, em] = end.split(":").map(Number);
          return Math.max((eh * 60 + em) - (sh * 60 + sm), 0);
        }

          text.textContent = message;
