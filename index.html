<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfficeFlow One MVP</title>
    <style>
      :root {
        --bg: #f4f7fd;
        --bg-strong: #eaf0fb;
        --surface: rgba(255, 255, 255, 0.88);
        --surface-strong: #ffffff;
        --surface-dark: #14203a;
        --line: rgba(20, 32, 58, 0.1);
        --line-strong: rgba(20, 32, 58, 0.18);
        --text: #172033;
        --muted: #66728a;
        --primary: #2f67e8;
        --primary-strong: #1f4fc8;
        --primary-soft: #e7efff;
        --accent: #e39b3a;
        --accent-soft: #fff0db;
        --danger: #be5b55;
        --danger-soft: #fce9e7;
        --info: #2f67e8;
        --info-soft: #e8f0ff;
        --success: #2b78d0;
        --success-soft: #e9f1ff;
        --warning: #b56a1a;
        --warning-soft: #fff1de;
        --shadow-lg: 0 26px 70px rgba(20, 32, 58, 0.14);
        --shadow-md: 0 14px 34px rgba(20, 32, 58, 0.09);
        --shadow-sm: 0 8px 18px rgba(20, 32, 58, 0.06);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --max-width: 1280px;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(47, 103, 232, 0.14), transparent 24%),
          radial-gradient(circle at right 16%, rgba(139, 92, 246, 0.11), transparent 22%),
          linear-gradient(180deg, #f8fbff 0%, #eff4fd 48%, #e8eef9 100%);
        font-family: "Pretendard Variable", "Pretendard", "SUIT", "Noto Sans KR",
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html.ceremony-active,
      body.ceremony-active {
        overflow: hidden;
      }

      img,
      svg {
        display: block;
        max-width: 100%;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
        background: none;
        color: inherit;
      }

      a {
        color: inherit;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .skip-link {
        position: absolute;
        left: 16px;
        top: 12px;
        z-index: 1000;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--surface-dark);
        color: white;
        transform: translateY(-160%);
        transition: transform 160ms ease;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      .shell {
        width: min(calc(100% - 24px), var(--max-width));
        margin: 0 auto;
        padding: 18px 0 32px;
      }

      .shell.auth-active {
        width: 100%;
        max-width: none;
        padding: 0;
      }

      .shell.app-active {
        width: 100%;
        max-width: none;
        padding: 18px 0 32px;
      }

      .shell.ceremony-active {
        width: 100%;
        max-width: none;
        padding: 18px 0 0;
      }

      .shell.board-active {
        width: 100%;
        max-width: none;
        padding: 18px 0 32px;
      }

      .button,
      .button-secondary,
      .button-ghost,
      .button-danger {
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: -0.02em;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background-color 180ms ease,
          border-color 180ms ease,
          color 180ms ease;
      }

      .button {
        background: linear-gradient(135deg, var(--primary) 0%, #5a7df0 100%);
        color: #fff;
        box-shadow: 0 12px 24px rgba(47, 103, 232, 0.24);
      }

      .button-secondary {
        background: var(--surface-strong);
        border: 1px solid var(--line);
        box-shadow: var(--shadow-sm);
      }

      .button-ghost {
        border: 1px dashed var(--line-strong);
        background: rgba(255, 255, 255, 0.55);
      }

      .button-danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .button:hover,
      .button-secondary:hover,
      .button-ghost:hover,
      .button-danger:hover,
      .button:focus-visible,
      .button-secondary:focus-visible,
      .button-ghost:focus-visible,
      .button-danger:focus-visible {
        transform: translateY(-1px);
        outline: none;
      }

      .button:focus-visible,
      .button-secondary:focus-visible,
      .button-ghost:focus-visible,
      .button-danger:focus-visible,
      .nav-link:focus-visible,
      .app-card:focus-visible,
      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        box-shadow: 0 0 0 4px rgba(47, 103, 232, 0.16);
      }

      .button:disabled,
      .button-secondary:disabled,
      .button-ghost:disabled,
      .button-danger:disabled {
        cursor: not-allowed;
        opacity: 0.56;
        transform: none;
        box-shadow: none;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
        width: 100vw;
        margin-left: calc(50% - 50vw);
        padding: 12px 24px 22px;
        box-sizing: border-box;
        position: relative;
        z-index: 120;
        overflow: visible;
      }

      .brand-line {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .topbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        position: relative;
        overflow: visible;
        z-index: 121;
      }

      .topbar-icon-button {
        min-height: 48px;
        padding: 0 16px 0 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow-sm);
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .topbar-icon-button:hover,
      .topbar-icon-button:focus-visible {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
        outline: none;
      }

      .topbar-icon-button svg {
        width: 20px;
        height: 20px;
      }

      .topbar-icon-label {
        font-size: 0.94rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .topbar-menu {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        width: 320px;
        padding: 14px;
        border-radius: 22px;
        border: 1px solid rgba(47, 103, 232, 0.12);
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 24px 50px rgba(34, 53, 103, 0.18);
        display: grid;
        gap: 10px;
        z-index: 999;
      }

      .topbar-menu[hidden] {
        display: none;
      }

      .topbar-menu-header {
        display: grid;
        gap: 6px;
        padding: 6px 4px 10px;
        border-bottom: 1px solid var(--line);
      }

      .topbar-menu-header strong {
        font-size: 1rem;
        letter-spacing: -0.03em;
      }

      .topbar-menu-header span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .topbar-menu-button {
        width: 100%;
        min-height: 46px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-align: left;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .topbar-menu-button:hover,
      .topbar-menu-button:focus-visible {
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
        outline: none;
      }

      .topbar-menu-button.danger {
        border-color: rgba(190, 91, 85, 0.18);
        color: var(--danger);
        background: rgba(252, 233, 231, 0.62);
      }

      .topbar-menu-danger-zone {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(190, 91, 85, 0.16);
        background: rgba(252, 233, 231, 0.5);
      }

      .topbar-menu-danger-zone p {
        margin: 0;
        color: #8d4b46;
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .account-modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(16, 24, 40, 0.42);
        backdrop-filter: blur(8px);
        z-index: 200;
      }

      .account-modal-panel {
        width: min(100%, 460px);
        padding: 24px;
        border-radius: 28px;
        border: 1px solid rgba(47, 103, 232, 0.12);
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 28px 60px rgba(34, 53, 103, 0.2);
        display: grid;
        gap: 16px;
      }

      .account-modal-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
      }

      .account-modal-header h3 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: -0.04em;
      }

      .account-modal-header p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .account-modal-info {
        display: grid;
        gap: 10px;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(244, 247, 255, 0.82);
      }

      .account-modal-info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .profile-completion-form {
        display: grid;
        gap: 14px;
      }

      .profile-completion-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .screen {
        display: block;
      }

      .screen[hidden] {
        display: none;
      }

      .auth-layout {
        min-height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        padding: 32px 20px;
      }

      .hero-panel,
      .auth-panel,
      .surface-card,
      .dashboard-section,
      .app-panel,
      .subscription-banner,
      .metric-card,
      .list-card,
      .timeline-card {
        border-radius: var(--radius-xl);
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow-lg);
      }

      .hero-badge,
      .plan-badge,
      .pill,
      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .hero-badge,
      .pill {
        color: var(--primary-strong);
        background: var(--primary-soft);
      }

      .plan-badge {
        color: #7a4a0f;
        background: var(--accent-soft);
      }

      .status-chip {
        background: var(--success-soft);
        color: var(--success);
      }

      .status-chip.warning {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .status-chip.info {
        background: var(--info-soft);
        color: var(--info);
      }

      .status-chip.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .auth-panel {
        position: relative;
        z-index: 2;
        width: min(100%, 460px);
        padding: 32px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.44);
        box-shadow:
          0 30px 80px rgba(12, 24, 20, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .auth-backdrop {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .auth-glow,
      .auth-orb,
      .auth-grid {
        position: absolute;
      }

      .auth-glow {
        inset: 8% 18% auto 18%;
        height: 280px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(90, 125, 240, 0.26), rgba(90, 125, 240, 0) 68%);
        filter: blur(24px);
        opacity: 0.8;
      }

      .auth-orb {
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.78), rgba(47,103,232,.14) 44%, rgba(47,103,232,0) 72%);
        filter: blur(10px);
        opacity: 0.9;
      }

      .auth-orb.left {
        left: -80px;
        bottom: 4%;
      }

      .auth-orb.right {
        right: -70px;
        top: 2%;
        background: radial-gradient(circle at 45% 45%, rgba(255,255,255,.74), rgba(139,92,246,.12) 42%, rgba(139,92,246,0) 70%);
      }

      .auth-grid {
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,.7) 18%, rgba(0,0,0,.9) 80%, transparent);
        opacity: 0.32;
      }

      .auth-panel::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.45);
        pointer-events: none;
      }

      .auth-panel h3 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.2rem);
        letter-spacing: -0.06em;
      }

      .auth-panel p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .form-grid {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 700;
      }

      .field-note {
        color: var(--muted);
        font-size: 0.87rem;
        font-weight: 500;
      }

      .auth-summary {
        margin-top: 12px;
        font-size: 0.96rem;
        line-height: 1.65;
      }

      .auth-switch {
        display: inline-flex;
        gap: 8px;
        margin-top: 18px;
        padding: 6px;
        border-radius: 999px;
        background: rgba(20, 33, 28, 0.05);
      }

      .auth-switch button {
        min-height: 38px;
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        color: var(--muted);
      }

      .auth-switch button.active {
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
        box-shadow: 0 8px 18px rgba(20, 33, 28, 0.08);
      }

      .auth-field[hidden] {
        display: none;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(20, 33, 28, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
        padding: 15px 16px;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      .input-row,
      .button-row,
      .meta-row,
      .section-head,
      .banner-actions,
      .metric-row,
      .app-grid,
      .dashboard-grid,
      .app-shell,
      .tool-grid,
      .stats-row,
      .list-row {
        display: grid;
        gap: 14px;
      }

      .social-stack {
        margin-top: 20px;
        display: grid;
        gap: 10px;
      }

      .social-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 52px;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(20, 33, 28, 0.08);
        box-shadow: 0 10px 24px rgba(20, 33, 28, 0.05);
      }

      .social-button svg {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
      }

      .social-button:hover,
      .social-button:focus-visible {
        transform: translateY(-1px);
        outline: none;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 18px 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: var(--line);
        flex: 1 1 auto;
      }

      .helper-note,
      .empty-state {
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 1px dashed var(--line-strong);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.6);
      }

      .workspace-main {
        width: min(100%, 1380px);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .workspace-main.ceremony-active {
        width: 100%;
        max-width: none;
        margin: 0;
        gap: 0;
      }

      .workspace-main.app-active {
        width: min(calc(100% - 32px), 1760px);
        max-width: 1760px;
        margin: 0 auto;
      }

      .workspace-main.board-active {
        width: min(calc(100% - 32px), 1760px);
        max-width: 1760px;
        margin: 0 auto;
      }

      .dashboard-section,
      .app-panel,
      .subscription-banner {
        padding: 22px;
      }

      .dashboard-section.ceremony-view {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        min-height: calc(100vh - 92px);
      }

      .dashboard-section.app-view {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .dashboard-section.board-view {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .dashboard-section.dashboard-view {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .ceremony-embed-shell {
        display: grid;
        gap: 12px;
        height: calc(100vh - 92px);
        justify-items: stretch;
      }

      .ceremony-embed-topbar {
        display: flex;
        justify-content: flex-end;
      }

      .ceremony-embed-frame {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        border-radius: 0;
        background: #fff;
        display: block;
      }

      .hero-strip {
        display: grid;
        gap: 16px;
      }

      .hero-strip h2,
      .section-title {
        margin: 0;
        letter-spacing: -0.04em;
      }

      .hero-strip h2 {
        font-size: clamp(1.8rem, 2.6vw, 2.5rem);
      }

      .hero-strip p,
      .section-subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .metric-row {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric-card {
        padding: 18px;
        box-shadow: var(--shadow-md);
      }

      .metric-card h3 {
        margin: 16px 0 4px;
        font-size: 1.8rem;
        letter-spacing: -0.05em;
      }

      .metric-card p {
        margin: 0;
        color: var(--muted);
      }

      .metric-card .metric-icon {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: var(--primary-strong);
        background: var(--primary-soft);
      }

      .dashboard-grid {
        grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
      }

      .section-head {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .app-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .launcher-wrap {
        min-height: calc(100vh - 150px);
        display: grid;
        align-content: start;
        gap: 18px;
        padding-top: 8px;
      }

      .launcher-panel {
        width: 100%;
        max-width: 1320px;
        margin: 0 auto;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .launcher-header {
        text-align: center;
        width: 100%;
        max-width: 1320px;
        margin: 0 auto;
        padding-top: 4px;
      }

      .launcher-header h2 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        letter-spacing: -0.05em;
      }

      .launcher-header p {
        margin: 0;
        color: var(--muted);
      }

      .owner-banner {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid rgba(47, 103, 232, 0.18);
        background:
          radial-gradient(circle at right top, rgba(139, 92, 246, 0.18), transparent 34%),
          linear-gradient(135deg, rgba(231, 239, 255, 0.96), rgba(245, 248, 255, 0.96));
        box-shadow: var(--shadow-sm);
      }

      .owner-banner strong {
        font-size: 1.05rem;
        letter-spacing: -0.03em;
      }

      .owner-banner p {
        margin: 0;
        color: #274aa8;
        line-height: 1.6;
      }

      .launcher-section {
        display: grid;
        gap: 14px;
      }

      .dashboard-ad-rail {
        position: fixed;
        top: 120px;
        width: 260px;
        z-index: 20;
        display: none;
      }

      .dashboard-ad-rail.left {
        left: 24px;
      }

      .dashboard-ad-rail.right {
        right: 24px;
      }

      .promo-panel {
        padding: 18px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background:

        place-items: center;

        color: var(--muted);
        font-size: 0.92rem;

        padding: 18px;

      .list-card h3,
      .timeline-card h3 {
        margin: 0 0 12px;
      }

      .info-list,
      .simple-list {
        display: grid;
        gap: 10px;
      }

      .info-item,
      .simple-item,
      .approval-item,
      .task-item,
      .action-item,
      .timeline-item {
        display: grid;
        gap: 8px;
        padding: 14px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
      }

      .info-item strong,
      .simple-item strong {
        font-size: 0.98rem;
      }

      .muted {
        color: var(--muted);
      }

      .app-toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .app-toolbar h2 {
        margin: 0;
        font-size: clamp(1.5rem, 2vw, 2rem);
        letter-spacing: -0.04em;

      .tool-grid {

        align-items: start;

        margin-top: 2px;

      .task-title {

        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        background: var(--bg-strong);
        color: var(--muted);
      }

        background: #ffe1dc;
        color: #a63b32;
      }

      .chip.medium {
        background: #fff1da;
        color: #966214;
      }

      .chip.low {
        background: #e6f6ec;
        color: #1c7a50;
      }

      .task-actions,
      .approval-actions,
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .small-button {
        min-height: 36px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);

      }

        align-items: start;
      }

      .approval-title {
        margin: 0;
        font-weight: 700;
      }

        padding: 18px;
        white-space: pre-wrap;
        line-height: 1.75;
      }

      .timeline-item {
        grid-template-columns: 84px 1fr auto;
        align-items: center;
      }

      .timeline-time {
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .toast-wrap {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 120;
        display: grid;
        gap: 10px;
      }

      .toast {
        min-width: 260px;
        max-width: 340px;
        padding: 14px 16px;
        border-radius: 18px;
        color: #fff;
        background: rgba(20, 33, 28, 0.92);
        box-shadow: var(--shadow-lg);

        display: block;
        margin-bottom: 4px;
      }

      .runtime-note {
        margin-top: 14px;
        font-size: 0.82rem;
        line-height: 1.55;
        color: var(--muted);

      .runtime-note strong {
        color: var(--text);
      }

          grid-template-columns: 1fr;

            why: "원본 툴 구성이 완성돼 있고, 사용자별 자산 데이터를 분리해 쓰기 좋습니다.",
            premium: false,
            statLabel: "자산",
            icon: createIcon("assets"),
          },
          {
            id: "ceremony",
            title: "경조사 관리",
            summary: "경조사 신청, 집행 기준, 이력 관리를 한 화면에서 처리하는 운영 앱",
            why: "총무와 인사 운영에서 반복 발생하는 경조사 업무를 표준화하기 좋습니다.",
            premium: false,
            statLabel: "경조사",
            icon: createIcon("ceremony"),
          },
          {
            id: "admin",
            title: "운영자 콘솔",
            summary: "사용자와 운영 상태를 점검하는 운영자 전용 관리 화면",
            why: "운영자는 일반 사용자와 달리 계정과 운영 현황을 관리할 수 있어야 합니다.",
            premium: false,
            ownerOnly: true,
            statLabel: "관리",
            icon: createIcon("admin"),
          },
        ];

        const routeMap = new Map(appCatalog.map((app) => [app.id, app]));

        const elements = {
          shell: document.querySelector(".shell"),
          authScreen: document.getElementById("authScreen"),
          workspaceScreen: document.getElementById("workspaceScreen"),
          globalActions: document.getElementById("globalActions"),
          emailLoginForm: document.getElementById("emailLoginForm"),
          signInTab: document.getElementById("signInTab"),
          signUpTab: document.getElementById("signUpTab"),
          emailSubmitButton: document.getElementById("emailSubmitButton"),
          signupNameInput: document.getElementById("signupNameInput"),
          signupContactInput: document.getElementById("signupContactInput"),
          signupNameLabel: document.getElementById("signupNameLabel"),
          signupContactLabel: document.getElementById("signupContactLabel"),
          emailInput: document.getElementById("emailInput"),
          passwordInput: document.getElementById("passwordInput"),
          confirmPasswordInput: document.getElementById("confirmPasswordInput"),
          confirmPasswordLabel: document.getElementById("confirmPasswordLabel"),
          socialButtons: Array.from(document.querySelectorAll("[data-provider]")),
          socialLabels: Array.from(document.querySelectorAll("[data-social-label]")),
          workspaceMain: document.querySelector(".workspace-main"),
          viewContainer: document.getElementById("viewContainer"),
          subscriptionBanner: document.getElementById("subscriptionBanner"),
          toastWrap: document.getElementById("toastWrap"),
        };

        let state = loadState();
        const firebaseServices = initFirebaseServices();
        let boardSyncPromise = null;
        let accountMenuOpen = false;
        let accountDangerOpen = false;
        let authStateInitialized = false;
        let profileCompletionOpen = false;
        let profileCompletionChecking = false;
        let profileCompletionProbeEmail = "";
        let visitTrackedForSession = false;

        elements.emailLoginForm.addEventListener("submit", handleEmailLogin);
        elements.signInTab.addEventListener("click", () => switchAuthMode("signin"));
        elements.signUpTab.addEventListener("click", () => switchAuthMode("signup"));
        elements.socialButtons.forEach((button) => {
          button.addEventListener("click", () => handleSocialLogin(button.dataset.provider));
        });
        window.addEventListener("hashchange", syncRouteFromHash);
        document.addEventListener("click", handleDocumentClickForMenus);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeAccountMenu();
            closeAccountModal();
          }
        });

        bindFirebaseAuthState();

        syncRouteFromHash();
        render();

        function loadState() {
          try {
            const raw = localStorage.getItem(storageKey);
            if (!raw) return structuredClone(defaultState);
            const parsed = JSON.parse(raw);
            const nextSession = { ...defaultState.session, ...(parsed.session || {}) };
            nextSession.role = resolveRole(nextSession.email);
            return {
              ...structuredClone(defaultState),
              ...parsed,
              session: nextSession,
              authMode: parsed.authMode || defaultState.authMode,
              accounts: Array.isArray(parsed.accounts) ? parsed.accounts : defaultState.accounts,
              navigation: { ...defaultState.navigation, ...(parsed.navigation || {}) },
              apps: {
                ...defaultState.apps,
                ...(parsed.apps || {}),
                board: {
                  ...defaultState.apps.board,
                  ...((parsed.apps && parsed.apps.board) || {}),
                },
                docInputs: {
                  ...defaultState.apps.docInputs,
                  ...((parsed.apps && parsed.apps.docInputs) || {}),
                },
              },
            };
          } catch (error) {
            console.error("Failed to load state:", error);
            return structuredClone(defaultState);
          }
        }

        function saveState() {
          localStorage.setItem(
            storageKey,
            JSON.stringify({
              session: state.session,
              authMode: state.authMode,
              navigation: state.navigation,
            })
          );
        }

        function resolveRole(email) {
          return adminEmails.includes(String(email || "").toLowerCase()) ? "owner" : "member";
        }

        function getStoredAccountByEmail(email) {
          const nextEmail = String(email || "").toLowerCase();
          if (!nextEmail || !Array.isArray(state.accounts)) return null;
          return state.accounts.find((account) => String(account.email || "").toLowerCase() === nextEmail) || null;
        }

        async function getCloudUserProfileByEmail(email) {
          const nextEmail = String(email || "").toLowerCase();
          if (!firebaseServices.db || !nextEmail) return null;
          try {
            const snapshot = await firebaseServices.db.collection(USER_PROFILES_COLLECTION).doc(nextEmail).get();
            return snapshot.exists ? snapshot.data() || null : null;
          } catch (error) {
            console.error("Failed to load cloud user profile:", error);
            return null;
          }
        }

        function initFirebaseServices() {
          if (!window.firebase) {
            return { enabled: false, auth: null, db: null };
          }
          const app = window.firebase.apps?.length
            ? window.firebase.app()
            : window.firebase.initializeApp(firebaseConfig);
          return {
            enabled: true,
            auth: window.firebase.auth(app),
            db: window.firebase.firestore ? window.firebase.firestore(app) : null,
          };
        }

        function bindFirebaseAuthState() {
          if (!firebaseServices.auth || !window.firebase?.auth?.GoogleAuthProvider) return;
          firebaseServices.auth.onAuthStateChanged(async (user) => {
            if (user?.email) {
              const nextEmail = user.email.toLowerCase();
              const existingAccount = getStoredAccountByEmail(nextEmail);
              const cloudProfile = await getCloudUserProfileByEmail(nextEmail);
              const nextName =
                user.displayName ||
                existingAccount?.name ||
                cloudProfile?.name ||
                (state.session.email === nextEmail ? state.session.name : "") ||
                "";
              const nextContact =
                user.phoneNumber ||
                existingAccount?.contact ||
                cloudProfile?.contact ||
                (state.session.email === nextEmail ? state.session.contact : "") ||
                "";
              const nextProvider = "Google OAuth";

              state = {
                ...state,
                authMode: "signin",
                accounts: Array.isArray(state.accounts) && state.accounts.some((account) => account.email === nextEmail)
                  ? state.accounts.map((account) =>
                      account.email === nextEmail
                        ? {
                            ...account,
                            uid: user.uid || account.uid || "",
                            name: nextName,
                            contact: nextContact,
                            provider: "google",
                          }
                        : account
                    )
                  : [
                      ...(Array.isArray(state.accounts) ? state.accounts : []),
                      {
                        uid: user.uid || "",
                        name: nextName,
                        contact: nextContact,
                        email: nextEmail,
                        password: "",
                        provider: "google",
                      },
                    ],
                session: {
                  authenticated: true,
                  uid: user.uid || "",
                  name: nextName,
                  contact: nextContact,
                  email: nextEmail,
                  provider: nextProvider,
                  role: resolveRole(nextEmail),
                },
                navigation: {
                  current: state.navigation.current || "dashboard",
                },
              };
              saveState();
              syncCurrentUserProfile({
                uid: user.uid || "",
                email: nextEmail,
                name: nextName,
                contact: nextContact,
                provider: nextProvider,
              });
              if (!authStateInitialized && window.location.hash === "") {
                updateHash("dashboard");
              } else {
                render();
              }
              authStateInitialized = true;
              return;
            }

            authStateInitialized = true;
          });
        }

        function setState(updater) {
          state = updater(state);
          saveState();
          render();
        }

        async function syncCurrentUserProfile(override = null) {
          const payload = override || {
            uid: state.session.uid || "",
            email: state.session.email,
            name: state.session.name || "",
            contact: state.session.contact || "",
            provider: state.session.provider || "",
          };
          if (!firebaseServices.db || !payload.email) return;
          try {
            await firebaseServices.db.collection(USER_PROFILES_COLLECTION).doc(String(payload.email).toLowerCase()).set(
              {
                uid: payload.uid || "",
                email: String(payload.email).toLowerCase(),
                name: payload.name || "",
                contact: payload.contact || "",
                provider: payload.provider || "",
                role: resolveRole(payload.email),
                updatedAt: new Date().toISOString(),
              },
              { merge: true }
            );
          } catch (error) {
            console.error("Failed to sync user profile:", error);
          }
        }

        function syncRouteFromHash() {
          const hash = window.location.hash.replace(/^#\/?/, "");
          if (!hash) {
            render();
            return;
          }

          const parts = hash.split("/");
          if (parts[0] === "app" && routeMap.has(parts[1])) {
            state.navigation.current = parts[1];
          } else if (parts[0] === "dashboard") {
            state.navigation.current = "dashboard";
          }

          render();
        }

        function updateHash(target) {
          const hash = target === "dashboard" ? "#/dashboard" : "#/app/" + target;
          if (target !== "dashboard") {
            trackAdminAnalytics("app_open", target);
          }
          if (window.location.hash !== hash) {
            window.location.hash = hash;
          } else {
            render();
          }
        }

        function canAccess(appId) {
          const app = routeMap.get(appId);
          if (!app) return false;
          if (app.ownerOnly && state.session.role !== "owner") return false;
          return true;
        }

        function render() {
          state.session.role = resolveRole(state.session.email);
          const authenticated = state.session.authenticated;
          elements.shell.classList.toggle("auth-active", !authenticated);
          elements.authScreen.hidden = authenticated;
          elements.workspaceScreen.hidden = !authenticated;

          renderGlobalActions();
          renderAuthMode();
          closeAccountModal();
          renderProfileCompletionModal();

          if (!authenticated) {
            return;
          }

          if (!visitTrackedForSession) {
            visitTrackedForSession = true;
            trackAdminAnalytics("visit");
          }

          if (state.navigation.current !== "dashboard" && !canAccess(state.navigation.current)) {
            state.navigation.current = "dashboard";
          }

          elements.subscriptionBanner.replaceChildren();
          elements.subscriptionBanner.hidden = true;
          renderCurrentView();
        }

        function renderGlobalActions() {
          elements.globalActions.replaceChildren();

          if (!state.session.authenticated) {
            accountMenuOpen = false;
            accountDangerOpen = false;
            accountMenuOpen = false;
            return;
          }

          const userChip = document.createElement("button");
          userChip.type = "button";
          userChip.className = state.session.role === "owner" ? "button" : "button-secondary";
          userChip.textContent =
            state.session.email +
            " · " +
            (state.session.role === "owner" ? "운영자" : "일반 사용자");
          userChip.addEventListener("click", () => {
            pushToast("로그인 상태", state.session.provider + " 계정으로 로그인되어 있습니다.");
          });

          const accountButton = document.createElement("button");
          accountButton.type = "button";
          accountButton.className = "topbar-icon-button";
          accountButton.setAttribute("aria-label", "계정 메뉴 열기");
          accountButton.setAttribute("aria-expanded", String(accountMenuOpen));
          accountButton.appendChild(createIcon("admin"));
          const accountLabel = document.createElement("span");
          accountLabel.className = "topbar-icon-label";
          accountLabel.textContent = "계정관리";
          accountButton.appendChild(accountLabel);
          accountButton.addEventListener("click", (event) => {
            event.stopPropagation();
            accountMenuOpen = !accountMenuOpen;
            if (!accountMenuOpen) {
              accountDangerOpen = false;
            }
            renderGlobalActions();
          });

          const showDashboardShortcut = state.navigation.current !== "dashboard";
          let dashboardButton = null;
          if (showDashboardShortcut) {
            dashboardButton = document.createElement("button");
            dashboardButton.type = "button";
            dashboardButton.className = "button-secondary";
            dashboardButton.textContent = "대시보드로";
            dashboardButton.addEventListener("click", () => updateHash("dashboard"));
          }

          if (dashboardButton) {
            elements.globalActions.append(accountButton, dashboardButton, userChip);
          } else {
            elements.globalActions.append(accountButton, userChip);
          }

          if (accountMenuOpen) {
            elements.globalActions.appendChild(createAccountMenu());
          }

        }

        function createAccountMenu() {
          const menu = document.createElement("div");
          menu.className = "topbar-menu";

          const header = document.createElement("div");
          header.className = "topbar-menu-header";
          const title = document.createElement("strong");
          title.textContent = state.session.name || "계정 정보";
          const subtitle = document.createElement("span");
          subtitle.textContent = state.session.email + " · " + state.session.provider;
          header.append(title, subtitle);

          menu.appendChild(header);
          menu.appendChild(createAccountMenuButton("계정 정보", state.session.role === "owner" ? "운영자" : "일반 사용자", () => {
            pushToast(
              "계정 정보",
              (state.session.name || "이름 미입력") + " · " + (state.session.contact || "연락처 미입력")
            );
            closeAccountMenu();
          }));

          if (state.session.role === "owner") {
            menu.appendChild(createAccountMenuButton("운영자 콘솔", "이동", () => {
              closeAccountMenu();
              updateHash("admin");
            }));
          }

          menu.appendChild(createAccountMenuButton("로그아웃", "세션 종료", async () => {
            closeAccountMenu();
            await logout();
          }));

          menu.appendChild(createAccountMenuButton("계정 관리", accountDangerOpen ? "접기" : "열기", () => {
            accountDangerOpen = !accountDangerOpen;
            renderGlobalActions();
          }, accountDangerOpen));

          if (accountDangerOpen) {
            const dangerZone = document.createElement("div");
            dangerZone.className = "topbar-menu-danger-zone";
            const note = document.createElement("p");
            note.textContent = "회원 탈퇴는 프로필과 인증 계정을 삭제하는 작업입니다. 실수 방지를 위해 이 영역 안에서만 진행할 수 있습니다.";
            const deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "topbar-menu-button danger";
            deleteButton.innerHTML = "<span>회원 탈퇴 진행</span><span>영구 삭제</span>";
            deleteButton.addEventListener("click", async () => {
              closeAccountMenu();
              await deleteCurrentAccount();
            });
            dangerZone.append(note, deleteButton);
            menu.appendChild(dangerZone);
          }

          return menu;
        }

        function createAccountMenuButton(label, meta, onClick, danger = false) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "topbar-menu-button" + (danger ? " danger" : "");
          const labelNode = document.createElement("span");
          labelNode.textContent = label;
          const metaNode = document.createElement("span");
          metaNode.textContent = meta;
          button.append(labelNode, metaNode);
          button.addEventListener("click", onClick);
          return button;
        }

        function closeAccountMenu() {
          if (!accountMenuOpen) return;
          accountMenuOpen = false;
          accountDangerOpen = false;
          renderGlobalActions();
        }

        function renderAccountModal() {
          const existing = document.getElementById("accountModalRoot");
          if (existing) existing.remove();
          if (!state.session.authenticated) return;

          const backdrop = document.createElement("div");
          backdrop.id = "accountModalRoot";
          backdrop.className = "account-modal-backdrop";
          backdrop.addEventListener("click", (event) => {
            if (event.target === backdrop) closeAccountModal();
          });

          const panel = document.createElement("div");
          panel.className = "account-modal-panel";
          panel.addEventListener("click", (event) => event.stopPropagation());

          const header = document.createElement("div");
          header.className = "account-modal-header";
          const copy = document.createElement("div");
          const title = document.createElement("h3");
          title.textContent = "계정 관리";
          const desc = document.createElement("p");
          desc.textContent = "로그아웃, 운영자 콘솔 이동, 탈퇴 같은 계정 관련 작업을 여기서 처리합니다.";
          copy.append(title, desc);
          const closeButton = document.createElement("button");
          closeButton.type = "button";
          closeButton.className = "button-secondary";
          closeButton.textContent = "닫기";
          closeButton.addEventListener("click", closeAccountModal);
          header.append(copy, closeButton);

          const info = document.createElement("div");
          info.className = "account-modal-info";
          [
            ["이메일", state.session.email || "-"],
            ["권한", state.session.role === "owner" ? "운영자" : "일반 사용자"],
            ["가입 방식", state.session.provider || "-"],
            ["연락처", state.session.contact || "미입력"],
          ].forEach(([label, value]) => {
            const row = document.createElement("div");
            row.className = "account-modal-info-row";
            const left = document.createElement("strong");
            left.textContent = label;
            const right = document.createElement("span");
            right.textContent = value;
            row.append(left, right);
            info.appendChild(row);
          });

          panel.append(header, info);
          panel.appendChild(createAccountMenuButton("로그아웃", "세션 종료", async () => {
            closeAccountModal();
            await logout();
          }));

          if (state.session.role === "owner") {
            panel.appendChild(createAccountMenuButton("운영자 콘솔", "이동", () => {
              closeAccountModal();
              updateHash("admin");
            }));
          }

          panel.appendChild(createAccountMenuButton("계정 관리", accountDangerOpen ? "접기" : "열기", () => {
            accountDangerOpen = !accountDangerOpen;
            render();
          }, accountDangerOpen));

          if (accountDangerOpen) {
            const dangerZone = document.createElement("div");
            dangerZone.className = "topbar-menu-danger-zone";
            const note = document.createElement("p");
            note.textContent = "회원 탈퇴는 프로필과 인증 계정을 삭제하는 작업입니다. 이 작업은 되돌릴 수 없습니다.";
            const deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "topbar-menu-button danger";
            deleteButton.innerHTML = "<span>회원 탈퇴 진행</span><span>영구 삭제</span>";
            deleteButton.addEventListener("click", async () => {
              closeAccountModal();
              await deleteCurrentAccount();
            });
            dangerZone.append(note, deleteButton);
            panel.appendChild(dangerZone);
          }

          backdrop.appendChild(panel);
          document.body.appendChild(backdrop);
        }

        function closeAccountModal() {
          const existing = document.getElementById("accountModalRoot");
          if (existing) existing.remove();
        }

        function needsProfileCompletion() {
          return Boolean(
            state.session.authenticated &&
            String(state.session.provider || "").toLowerCase().includes("google") &&
            !String(state.session.contact || "").trim()
          );
        }

        function renderProfileCompletionModal() {
          const existing = document.getElementById("profileCompletionModal");
          if (existing) existing.remove();
          const shouldCompleteProfile = needsProfileCompletion();
          if (
            shouldCompleteProfile &&
            !profileCompletionChecking &&
            firebaseServices.db &&
            state.session.email &&
            profileCompletionProbeEmail !== String(state.session.email).toLowerCase()
          ) {
            profileCompletionChecking = true;
            profileCompletionProbeEmail = String(state.session.email).toLowerCase();
            getCloudUserProfileByEmail(state.session.email)
              .then((cloudProfile) => {
                if (cloudProfile?.contact || cloudProfile?.name) {
                  setState((prev) => ({
                    ...prev,
                    accounts: (prev.accounts || []).map((account) =>
                      String(account.email || "").toLowerCase() === String(prev.session.email || "").toLowerCase()
                        ? {
                            ...account,
                            name: cloudProfile.name || account.name || "",
                            contact: cloudProfile.contact || account.contact || "",
                          }
                        : account
                    ),
                    session: {
                      ...prev.session,
                      name: cloudProfile.name || prev.session.name || "",
                      contact: cloudProfile.contact || prev.session.contact || "",
                    },
                  }));
                  return;
                }
                render();
              })
              .finally(() => {
                profileCompletionChecking = false;
                render();
              });
            return;
          }
          profileCompletionOpen = shouldCompleteProfile && !profileCompletionChecking;
          if (!profileCompletionOpen) return;

          const backdrop = document.createElement("div");
          backdrop.id = "profileCompletionModal";
          backdrop.className = "account-modal-backdrop";

          const panel = document.createElement("div");
          panel.className = "account-modal-panel";
          panel.addEventListener("click", (event) => event.stopPropagation());

          const header = document.createElement("div");
          header.className = "account-modal-header";
          const copy = document.createElement("div");
          const title = document.createElement("h3");
          title.textContent = "프로필 보완";
          const desc = document.createElement("p");
          desc.textContent = "Google 로그인은 연락처를 자동으로 가져오지 못하는 경우가 많습니다. 운영 화면과 사용자 목록에 반영할 연락처를 입력하세요.";
          copy.append(title, desc);
          header.append(copy);

          const info = document.createElement("div");
          info.className = "account-modal-info";
          [
            ["이메일", state.session.email || "-"],
            ["이름", state.session.name || "미입력"],
            ["연락처", "필수 입력"],
          ].forEach(([label, value]) => {
            const row = document.createElement("div");
            row.className = "account-modal-info-row";
            const left = document.createElement("strong");
            left.textContent = label;
            const right = document.createElement("span");
            right.textContent = value;
            row.append(left, right);
            info.appendChild(row);
          });

          const form = document.createElement("form");
          form.className = "profile-completion-form";

          const nameLabel = document.createElement("label");
          nameLabel.textContent = "이름";
          const nameInput = document.createElement("input");
          nameInput.value = state.session.name || "";
          nameInput.placeholder = "예: 김지원";
          nameLabel.appendChild(nameInput);

          const contactLabel = document.createElement("label");
          contactLabel.textContent = "연락처";
          const contactInput = document.createElement("input");
          contactInput.required = true;
          contactInput.value = state.session.contact || "";
          contactInput.placeholder = "예: 010-1234-5678";
          contactLabel.appendChild(contactInput);

          const note = document.createElement("p");
          note.className = "profile-completion-note";
          note.textContent = "저장 후 운영자 콘솔과 사용자 현황에 바로 반영됩니다.";

          const actions = document.createElement("div");
          actions.className = "inline-actions";
          const saveButton = document.createElement("button");
          saveButton.type = "submit";
          saveButton.className = "button";
          saveButton.textContent = "저장";
          actions.appendChild(saveButton);

          form.append(nameLabel, contactLabel, note, actions);
          form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const nextName = nameInput.value.trim();
            const nextContact = contactInput.value.trim();
            if (!nextContact) {

        function getBoardFilteredPosts() {
          const board = state.apps.board;
          return [...board.posts]
            .filter((post) => (board.category === "all" ? true : post.category === board.category))
            .filter((post) => {
              const keyword = board.searchTerm.trim().toLowerCase();
              if (!keyword) return true;
              return [post.title, post.content, post.author, post.category]
                .join(" ")
                .toLowerCase()
                .includes(keyword);
            })
            .sort((a, b) => {
              if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
              return Number(b.createdAtMs || 0) - Number(a.createdAtMs || 0);
            });
        }

        async function syncBoardPostsFromCloud() {
          if (boardSyncPromise || !firebaseServices.db || !state.session.authenticated) return;

          setState((prev) => ({
            ...prev,
            apps: {
              ...prev.apps,
              board: {
                ...prev.apps.board,
                loading: true,
                error: "",
              },
            },
          }));

          boardSyncPromise = firebaseServices.db
            .collection(BOARD_COLLECTION)
            .orderBy("createdAtMs", "desc")
            .get()
            .then((snapshot) => {
              const posts = snapshot.docs.map((doc) => {
                const data = doc.data() || {};
                return {
                  id: doc.id,
                  category: data.category || "일반",
                  title: data.title || "제목 없음",
                  content: data.content || "",
                  author: data.author || data.authorEmail || "익명",
                  authorEmail: data.authorEmail || "",
                  createdAt: data.createdAt || "-",
                  createdAtMs: Number(data.createdAtMs || 0),
                  pinned: Boolean(data.pinned),
                  isPrivate: Boolean(data.isPrivate),
                  privatePassword: data.privatePassword || "",
                };
              });

              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  board: {
                    ...prev.apps.board,
                    posts,
                    initialized: true,
                    loading: false,
                    error: "",
                  },
                },
              }));
            })
            .catch((error) => {
              console.error("Board sync failed:", error);
              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  board: {
                    ...prev.apps.board,
                    initialized: true,
                    loading: false,
                    error: "게시판 데이터를 불러오지 못했습니다.",
                  },
                },
              }));
            })
            .finally(() => {
              boardSyncPromise = null;
            });

          await boardSyncPromise;
        }

        function getBoardAuthorName() {
          if (state.session.role === "owner") return "운영자";
          if (state.session.name) return state.session.name;
          const matched = state.accounts.find(

          );
          if (matched?.name) return matched.name;
          return state.session.email || "익명";
        }

        function canOpenBoardPost(post) {

          if (state.session.role === "owner") return true;
          if (post.authorEmail && post.authorEmail === state.session.email) return true;

          if (entered === null) return false;
          if (String(entered) !== String(post.privatePassword || "")) {
            pushToast("자유게시판", "비밀번호가 올바르지 않습니다.");

        function createBoardListView(filteredPosts) {
          const card = document.createElement("section");
          card.className = "app-panel board-list-card";

          const board = state.apps.board;
          const totalPages = Math.max(1, Math.ceil(filteredPosts.length / board.pageSize));
          const safePage = Math.min(board.page, totalPages);
          const startIndex = (safePage - 1) * board.pageSize;
          const pageRows = filteredPosts.slice(startIndex, startIndex + board.pageSize);

          const tableWrap = document.createElement("div");
          tableWrap.className = "board-table-wrap";

          if (filteredPosts.length === 0) {
            const empty = document.createElement("div");
            empty.className = "board-empty";
            empty.textContent = board.loading
              ? "게시글을 불러오는 중입니다."
              : board.error || "조건에 맞는 게시글이 없습니다.";
            tableWrap.appendChild(empty);
            card.appendChild(tableWrap);
            return card;
          }

          const table = document.createElement("table");
          table.className = "board-table";

          const thead = document.createElement("thead");
          const headRow = document.createElement("tr");
          [
            ["번호", "board-col-number"],
            ["카테고리", "board-col-category"],
            ["제목", ""],
            ["작성자", "board-col-author"],
            ["작성일", "board-col-date"],
          ].forEach(([label, className]) => {
            const th = document.createElement("th");
            th.textContent = label;
            if (className) th.className = className;
            headRow.appendChild(th);
          });
          thead.appendChild(headRow);

          const tbody = document.createElement("tbody");
          const normalCount = filteredPosts.filter((post) => !post.pinned).length - startIndex;
          let normalIndex = normalCount;

          pageRows.forEach((post) => {
            const tr = document.createElement("tr");

            const numberTd = document.createElement("td");
            numberTd.className = "board-col-number";
            numberTd.textContent = post.pinned ? "공지" : String(normalIndex--);

            const categoryTd = document.createElement("td");
            categoryTd.className = "board-col-category";
            categoryTd.appendChild(createBoardCategoryBadge(post.category));

            const titleTd = document.createElement("td");
            const titleButton = document.createElement("button");
            titleButton.type = "button";
            titleButton.className = "board-title-button";
            titleButton.textContent = post.title;
            if (post.isPrivate) {
              titleButton.prepend(document.createTextNode("[비공개] "));
            }
            titleButton.addEventListener("click", () => {
              if (!canOpenBoardPost(post)) return;
              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  board: {
                    ...prev.apps.board,
                    currentPostId: post.id,
                    composeOpen: false,
                  },
                },
              }));
            });
            titleTd.appendChild(titleButton);

            const authorTd = document.createElement("td");
            authorTd.className = "board-col-author";
            authorTd.textContent = post.author;

            const dateTd = document.createElement("td");
            dateTd.className = "board-col-date";
            dateTd.textContent = post.createdAt;

            tr.append(numberTd, categoryTd, titleTd, authorTd, dateTd);
            tbody.appendChild(tr);
          });

          table.append(thead, tbody);
          tableWrap.appendChild(table);
          card.appendChild(tableWrap);

          const footer = document.createElement("div");
          footer.className = "board-footer";
          const count = document.createElement("p");
          count.className = "board-count";
          count.textContent =
            "총 " +
            filteredPosts.length +
            "건 중 " +
            (filteredPosts.length ? startIndex + 1 : 0) +
            "~" +
            Math.min(startIndex + board.pageSize, filteredPosts.length) +
            "건 표시";
          const pager = document.createElement("div");
          pager.className = "inline-actions";
          const prev = document.createElement("button");
          prev.type = "button";
          prev.className = "button-secondary";
          prev.textContent = "이전";
          prev.disabled = safePage <= 1;
          prev.addEventListener("click", () => {
            setState((prevState) => ({
              ...prevState,
              apps: {
                ...prevState.apps,
                board: {
                  ...prevState.apps.board,
                  page: safePage - 1,
                },
              },
            }));
          });
          const page = document.createElement("span");
          page.className = "pill";
          page.textContent = safePage + " / " + totalPages;
          const next = document.createElement("button");
          next.type = "button";
          next.className = "button-secondary";
          next.textContent = "다음";
          next.disabled = safePage >= totalPages;
          next.addEventListener("click", () => {
            setState((prevState) => ({
              ...prevState,
              apps: {
                ...prevState.apps,
                board: {
                  ...prevState.apps.board,
                  page: safePage + 1,
                },
              },
            }));
          });
          pager.append(prev, page, next);
          footer.append(count, pager);
          card.appendChild(footer);
          return card;

            event.preventDefault();
            if (!titleInput.value.trim() || !contentInput.value.trim()) return;
            if (categorySelect.value === "공지" && state.session.role !== "owner") {
              pushToast("자유게시판", "공지는 운영자만 작성할 수 있습니다.");
              return;
            }
            if (categorySelect.value === "질문" && privateInput.checked && privatePasswordInput.value.trim().length < 4) {
              pushToast("자유게시판", "비공개 질문은 4자 이상 비밀번호를 입력하세요.");
              return;
            }
            const now = new Date();
            const createdAt =
              now.getFullYear() +
              "-" +
              String(now.getMonth() + 1).padStart(2, "0") +
              "-" +
              String(now.getDate()).padStart(2, "0") +
              " " +
              String(now.getHours()).padStart(2, "0") +
              ":" +
              String(now.getMinutes()).padStart(2, "0");
            const nextPost = {
              id: "board-" + Date.now(),
              category: categorySelect.value,
              title: titleInput.value.trim(),
              content: contentInput.value.trim(),
              author: getBoardAuthorName(),
              authorEmail: state.session.email || "",
              createdAt,
              createdAtMs: now.getTime(),
              pinned: state.session.role === "owner" ? pinInput.checked : false,
              isPrivate: categorySelect.value === "질문" ? privateInput.checked : false,
              privatePassword:
                categorySelect.value === "질문" && privateInput.checked
                  ? privatePasswordInput.value.trim()
                  : "",
            };

            if (firebaseServices.db && firebaseServices.auth?.currentUser) {
              try {
                await firebaseServices.db.collection(BOARD_COLLECTION).doc(nextPost.id).set(nextPost);
                await syncBoardPostsFromCloud();
              } catch (error) {
                console.error("Board post save failed:", error);
                pushToast("자유게시판", "게시글 저장에 실패했습니다. Firestore 규칙을 확인하세요.");
                return;
              }
            } else {
              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  board: {
                    ...prev.apps.board,
                    composeOpen: false,
                    currentPostId: null,
                    page: 1,
                    posts: [nextPost, ...prev.apps.board.posts],
                  },
                },
              }));
            }

            setState((prev) => ({
              ...prev,
              apps: {
                ...prev.apps,
                board: {
                  ...prev.apps.board,
                  composeOpen: false,
                  currentPostId: null,
                  page: 1,
                },
              },
            }));
            pushToast("자유게시판", "게시글을 등록했습니다.");
          });

          card.append(title, form);
          return card;
        }

          check.type = "checkbox";

          check.addEventListener("change", () => toggleTask(task.id));

          const content = document.createElement("div");
          const title = document.createElement("p");
          title.className = "task-title" + (task.done ? " done" : "");
          title.textContent = task.title;
          const meta = document.createElement("div");
          meta.className = "task-meta";
          meta.append(
            createChip(task.priority),
            createChip("마감 " + formatDate(task.dueDate)),
            createChip(task.done ? "완료" : "진행중")

          actions.className = "task-actions";
          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "small-button";
          deleteButton.textContent = "삭제";
          deleteButton.addEventListener("click", () => deleteTask(task.id));
          actions.appendChild(deleteButton);

          item.append(check, content, actions);
          return item;
        }

        function createCeremonyDashboard() {
          const ceremony = state.apps.ceremony;
          const selectedYear = Number(ceremony.selectedYear || currentYear);
          const availableYears = getCeremonyYears();
          const reportTemplate = ceremony.reportTemplate || "yearly";
          const yearFilteredEvents = ceremony.events.filter((event) =>
            String(event.date || "").startsWith(String(selectedYear))
          );
          const totalAmount = yearFilteredEvents.reduce((sum, event) => sum + Number(event.amount || 0), 0);
          const monthlyData = Array.from({ length: 12 }, (_, index) => {
            const month = String(index + 1).padStart(2, "0");
            const rows = yearFilteredEvents.filter((event) =>
              String(event.date || "").startsWith(selectedYear + "-" + month)
            );
            return {
              label: index + 1 + "월",
              amount: rows.reduce((sum, event) => sum + Number(event.amount || 0), 0),
              count: rows.length,
            };
          });
          const typeMap = yearFilteredEvents.reduce((acc, event) => {
            const key = event.type || "미지정";
            acc[key] = (acc[key] || 0) + Number(event.amount || 0);
            return acc;
          }, {});
          const typeRows = Object.entries(typeMap)
            .map(([type, amount]) => ({ type, amount }))
            .sort((a, b) => b.amount - a.amount);
          const deptMap = yearFilteredEvents.reduce((acc, event) => {
            const key = event.deptName || "미지정";
            acc[key] = (acc[key] || 0) + Number(event.amount || 0);
            return acc;
          }, {});
          const deptRows = Object.entries(deptMap)
            .map(([dept, amount]) => ({ dept, amount }))
            .sort((a, b) => b.amount - a.amount)
            .slice(0, 8);
          const wreathCount = yearFilteredEvents.filter((event) => event.wreath).length;
          const avgAmount = yearFilteredEvents.length ? Math.round(totalAmount / yearFilteredEvents.length) : 0;
          const latestMonthWithData = [...monthlyData].reverse().find((item) => item.count > 0);
          const effectiveMonth = latestMonthWithData
            ? Number(String(latestMonthWithData.label).replace("월", ""))
            : new Date().getMonth() + 1;
          const effectiveQuarter = Math.ceil(effectiveMonth / 3);
          const reportEvents = yearFilteredEvents.filter((event) => {
            const month = Number(String(event.date || "").split("-")[1] || 0);
            if (reportTemplate === "monthly") return month === effectiveMonth;
            if (reportTemplate === "quarterly") {
              return month >= (effectiveQuarter - 1) * 3 + 1 && month <= effectiveQuarter * 3;
            }
            return true;
          });

          [

        function createCeremonyHistory() {
          const ceremony = state.apps.ceremony;
          const selectedYear = Number(ceremony.selectedYear || currentYear);
          const searchTerm = String(ceremony.searchTerm || "");
          const deptFilter = ceremony.deptFilter || "";
          const typeFilter = ceremony.typeFilter || "";
          const wreathFilter = ceremony.wreathFilter || "all";
          const minAmount = ceremony.minAmount || "";
          const maxAmount = ceremony.maxAmount || "";
          const sortKey = ceremony.sortKey || "date_desc";
          const currentPage = Number(ceremony.historyPage || 1);
          const pageSize = 10;

          const deptOptions = Array.from(
            new Set(ceremony.events.map((event) => String(event.deptName || "").trim()).filter(Boolean))
          ).sort();
          const typeOptions = Array.from(
            new Set(ceremony.events.map((event) => String(event.type || "").trim()).filter(Boolean))
          ).sort();
          const keyword = searchTerm.trim().toLowerCase();
          const filtered = ceremony.events
            .filter((event) => String(event.date || "").startsWith(String(selectedYear)))
            .filter((event) => (!deptFilter ? true : event.deptName === deptFilter))
            .filter((event) => (!typeFilter ? true : event.type === typeFilter))
            .filter((event) => {
              if (wreathFilter === "yes") return !!event.wreath;
              if (wreathFilter === "no") return !event.wreath;
              return true;
            })
            .filter((event) => (!minAmount ? true : Number(event.amount || 0) >= Number(minAmount)))
            .filter((event) => (!maxAmount ? true : Number(event.amount || 0) <= Number(maxAmount)))
            .filter((event) => {
              if (!keyword) return true;
              return [event.empName, event.deptName, event.type, event.memo]
                .join(" ")
                .toLowerCase()
                .includes(keyword);
            })
            .sort((a, b) => {
              if (sortKey === "amount_desc") return Number(b.amount || 0) - Number(a.amount || 0);
              if (sortKey === "amount_asc") return Number(a.amount || 0) - Number(b.amount || 0);
              if (sortKey === "name_asc") return String(a.empName || "").localeCompare(String(b.empName || ""));
              return String(b.date || "").localeCompare(String(a.date || ""));
            });
          const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
          const safePage = Math.min(currentPage, totalPages);
          const startIndex = (safePage - 1) * pageSize;
          const pageRows = filtered.slice(startIndex, startIndex + pageSize);
          const presetKey = getCeremonyPresetKey();
          const presets = safeJsonParse(localStorage.getItem(presetKey), []);

          const wrap = document.createElement("div");
          wrap.className = "planner-layout";

          const card = document.createElement("section");
          card.className = "ceremony-card";

          desc.textContent = "원본 앱처럼 조건 필터, 검색, 프리셋, 표 중심 관리 흐름으로 조회합니다.";
          headCopy.append(title, desc);
          head.appendChild(headCopy);

          const searchWrap = document.createElement("div");
          searchWrap.className = "ceremony-toolbar";
          const searchInput = document.createElement("input");
          searchInput.value = searchTerm;
          searchInput.placeholder = "사원명, 부서명, 유형, 메모 검색...";
          searchInput.addEventListener("input", (event) =>
            updateCeremonyFilters({ searchTerm: event.target.value, historyPage: 1 })

          searchWrap.appendChild(searchInput);

          const primaryFilters = document.createElement("div");

          const deptSelect = createCeremonySelect(

        function exportCeremonyCsv(reportEvents, selectedYear, reportTemplate) {
          if (!reportEvents.length) {
            pushToast("Excel 다운로드", "내보낼 데이터가 없습니다.");
            return;
          }
          const headers = "발생일자,부서명,사원명,경조사유형,지원금,휴가일수,화환여부,메모\n";
          const rows = reportEvents.map((event) =>
            [
              event.date || "",
              event.deptName || "",
              event.empName || "",
              event.type || "",
              Number(event.amount || 0),
              Number(event.days || 0),
              event.wreath ? "Y" : "N",
              String(event.memo || "").replace(/,/g, " "),
            ].join(",")
          );
          const blob = new Blob(["\uFEFF" + headers + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "경조사관리대장_" + selectedYear + "_" + reportTemplate + ".csv";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        }

        async function loadCeremonyData() {
          const localEvents = safeJsonParse(localStorage.getItem(getCeremonyStorageKey()), []);
          const canUseCloud = Boolean(firebaseServices.db && firebaseServices.auth?.currentUser && state.session.email);
          if (!canUseCloud) {
            return { source: "local", events: Array.isArray(localEvents) ? localEvents : [], error: "" };
          }

          try {
            const snapshot = await firebaseServices.db
              .collection("ofw_ceremony_events")
              .where("ownerEmail", "==", state.session.email)
              .get();
            const events = snapshot.docs
              .map((doc) => ({ id: doc.id, ...doc.data() }))
              .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
            localStorage.setItem(getCeremonyStorageKey(), JSON.stringify(events));
            return { source: "cloud", events, error: "" };
          } catch (error) {
            console.error("Ceremony load failed:", error);
            return {
              source: "local",
              events: Array.isArray(localEvents) ? localEvents : [],
              error: "클라우드 저장소 연결에 실패해 로컬 데이터로 표시합니다.",
            };
          }
        }

        async function upsertCeremonyEvent(event) {
          const nextEvents = [
            event,
            ...state.apps.ceremony.events.filter((item) => item.id !== event.id),
          ].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));

          setState((prev) => ({
            ...prev,
            apps: {
              ...prev.apps,
              ceremony: {
                ...prev.apps.ceremony,
                events: nextEvents,
                initialized: true,
              },
            },
          }));
          localStorage.setItem(getCeremonyStorageKey(), JSON.stringify(nextEvents));

          if (firebaseServices.db && firebaseServices.auth?.currentUser && state.session.email) {
            try {
              await firebaseServices.db.collection("ofw_ceremony_events").doc(String(event.id)).set({
                ...event,
                ownerEmail: state.session.email,
                ownerName: state.session.name || "",
                updatedAt: window.firebase.firestore.FieldValue.serverTimestamp(),
              }, { merge: true });
              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  ceremony: {
                    ...prev.apps.ceremony,
                    source: "cloud",
                    error: "",
                  },
                },
              }));
            } catch (error) {
              console.error("Ceremony save failed:", error);
              setState((prev) => ({
                ...prev,
                apps: {
                  ...prev.apps,
                  ceremony: {
                    ...prev.apps.ceremony,
                    source: "local",
                    error: "클라우드 저장에 실패해 현재 브라우저에만 저장되었습니다.",
                  },
                },
              }));
            }
          }
        }

        async function deleteCeremonyEvent(eventId) {

          const nextEvents = state.apps.ceremony.events.filter((item) => item.id !== eventId);

              }));
            }
          }
        }
