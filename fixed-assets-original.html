<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>AssetGuard Pro - 기업용 고정자산 관리 시스템</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->

    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, getDocs, setDoc, onSnapshot, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseModules = {
            initializeApp, getAuth, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, getDocs, setDoc, onSnapshot, serverTimestamp, writeBatch
        };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a', secondary: '#334155', accent: '#2563eb',
                        success: '#10b981', warning: '#f59e0b', danger: '#ef4444',
                        background: '#f1f5f9', surface: '#ffffff',
                    },
                    animation: {
                        'slide-in-top': 'slideInTop 0.3s ease-out forwards',
                        'fade-out': 'fadeOut 0.3s ease-in forwards',

                    keyframes: {
                        slideInTop: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @media print {
            @page { size: A4; margin: 0; }
            body { background-color: white; -webkit-print-color-adjust: exact; margin: 0; }
            aside, header, .no-print { display: none !important; } 
            .print-area { display: block !important; width: 210mm; height: 297mm; overflow: hidden; page-break-after: always; }
            
            .sheet-3107 { padding-top: 12.9mm; padding-left: 5.9mm; padding-right: 5.9mm; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(8, 1fr); column-gap: 2.5mm; row-gap: 0mm; height: 100%; }
            .sheet-3107 .label-item { height: 33.9mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 3mm; box-sizing: border-box; }
            .sheet-3105 { padding-top: 15.1mm; padding-left: 7.2mm; padding-right: 7.2mm; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(7, 1fr); column-gap: 2.5mm; row-gap: 0mm; height: 100%; }
            .sheet-3105 .label-item { height: 38.1mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 3mm; font-size: 0.8rem; }
            .sheet-3102 { padding-top: 21mm; padding-left: 9mm; padding-right: 9mm; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(10, 1fr); column-gap: 2mm; row-gap: 0mm; height: 100%; }
            .sheet-3102 .label-item { height: 26.9mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 2mm; font-size: 0.7rem; }
            .sheet-3104 { padding-top: 13mm; padding-left: 9mm; padding-right: 9mm; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(9, 1fr); column-gap: 3mm; row-gap: 0mm; height: 100%; }
            .sheet-3104 .label-item { height: 30.1mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 2mm; font-size: 0.75rem; }
            .sheet-3109 { padding-top: 13.5mm; padding-left: 5mm; padding-right: 5mm; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(9, 1fr); column-gap: 0mm; row-gap: 0mm; height: 100%; }
            .sheet-3109 .label-item { height: 30mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 3mm; font-size: 0.8rem; }
            .sheet-3212 { padding-top: 13.5mm; padding-left: 5mm; padding-right: 5mm; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, 1fr); column-gap: 0mm; row-gap: 0mm; height: 100%; }
            .sheet-3212 .label-item { height: 45mm; border: none; display: flex; flex-direction: column; justify-content: center; padding: 4mm; font-size: 0.9rem; }
            
            /* Print mode empty cell */
            .label-item.empty-cell { visibility: hidden; }
        }
        .print-area { display: none; }
        
        .preview-sheet { background: white; width: 210mm; height: 297mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); margin: 0 auto; transform-origin: top center; transform: scale(0.65); overflow: hidden; }
        .preview-sheet.sheet-3107 { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(8, 33.9mm); padding: 12.9mm 5.9mm; column-gap: 2.5mm; }
        .preview-sheet.sheet-3105 { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(7, 38.1mm); padding: 15.1mm 7.2mm; column-gap: 3mm; }
        .preview-sheet.sheet-3102 { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(10, 26.9mm); padding: 21mm 9mm; column-gap: 2mm; }
        .preview-sheet.sheet-3104 { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(9, 30.1mm); padding: 13mm 9mm; column-gap: 3mm; }
        .preview-sheet.sheet-3109 { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(9, 30mm); padding: 13.5mm 5mm; column-gap: 0mm; }
        .preview-sheet.sheet-3212 { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, 45mm); padding: 13.5mm 5mm; column-gap: 0mm; }
        
        .preview-item { border: 1px dashed #e2e8f0; padding: 2mm; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .preview-item.empty { visibility: hidden; }
        
        /* Preview mode empty cell styling */
        .preview-sheet .label-item.empty-cell { 
            background-color: #f1f5f9; 
            border: 1px dashed #cbd5e1; 
            opacity: 0.5;
            background-image: repeating-linear-gradient(45deg, #f1f5f9 0, #f1f5f9 10px, #e2e8f0 10px, #e2e8f0 20px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const safeSearch = (target, term) => {
            try {
                if (target === null || target === undefined) return false;
                if (term === null || term === undefined || term === '') return true;
                const t = String(target).toLowerCase();
                const s = String(term).toLowerCase();
                return t.indexOf(s) !== -1;
            } catch(e) { return false; }
        };

        const waitForFirebase = () => new Promise((resolve, reject) => {
            let attempts = 0;
            const check = () => {
                if (window.FirebaseModules) resolve(window.FirebaseModules);
                else if (attempts > 50) reject(new Error("Firebase SDK Load Failed")); 
                else { attempts++; setTimeout(check, 100); }
            };
            check();
        });

        const OFFICEFLOW_STORAGE_KEY = 'officeflow-one-embed-session';
        const LEGACY_OFFICEFLOW_STORAGE_KEY = 'officeflow-one-mvp-state';
        const officeflowFirebaseConfig = {
            apiKey: "AIzaSyBfT58Y9XwjalTk0E0NPBWqkVVVOWN9zFQ",
            authDomain: "officeflow-one.firebaseapp.com",
            projectId: "officeflow-one",
            storageBucket: "officeflow-one.firebasestorage.app",
            messagingSenderId: "1084176732785",
            appId: "1:1084176732785:web:56e241ddcdb69afdf101d0"
        };

        function getOfficeFlowState() {
            try {
                const raw =
                    localStorage.getItem(OFFICEFLOW_STORAGE_KEY) ||
                    localStorage.getItem(LEGACY_OFFICEFLOW_STORAGE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (error) {
                console.warn('OfficeFlow state unavailable', error);
                return null;
            }
        }

        const officeflowState = getOfficeFlowState();
        const officeflowSession = officeflowState?.session?.authenticated ? officeflowState.session : null;
        const officeflowUid = String(officeflowSession?.uid || '').trim();
        const officeflowEmail = String(officeflowSession?.email || '').toLowerCase();
        const fixedAssetUserKey = (officeflowUid || officeflowEmail || 'guest').replace(/[^a-z0-9]+/gi, '_');
        const OFFICEFLOW_APP_ID = `ofw-fixed-assets-${fixedAssetUserKey}`;

        function waitForFixedAssetsAuthReady(auth, timeoutMs = 8000) {
            return new Promise((resolve) => {
                if (!auth) {
                    resolve(null);
                    return;
                }
                if (auth.currentUser) {
                    resolve(auth.currentUser);
                    return;
                }
                let settled = false;
                const timer = setTimeout(() => {
                    if (!settled) {
                        settled = true;
                        unsubscribe();
                        resolve(auth.currentUser || null);
                    }
                }, timeoutMs);
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    if (!settled && user) {
                        settled = true;
                        clearTimeout(timer);
                        unsubscribe();
                        resolve(user);
                    }
                });
            });
        }

        const CATEGORY_MAP = {
            'PC/노트북': 'PC', '모니터': 'MON', '서버/네트워크': 'SVR', '소프트웨어': 'SW', '사무가구': 'FUR', '차량운반구': 'CAR',
            '가전제품': 'APP', '계측장비': 'MEA', '공구/비품': 'TOL', '기타장비': 'ETC'
        };

        const MOCK_ASSETS = [];

        const statusMap = { 'active': '사용중', 'repair': '수리중', 'idle': '유휴(재고)', 'disposed': '폐기' };
        const historyTypeMap = { 'move': '이동', 'return': '반납', 'repair': '수리' };

        // [SAFETY] Robust Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (!name || !spanRef.current) return;
                
                // Safe render function
                const render = () => {
                    if (!spanRef.current) return;
                    if (window.lucide?.icons?.[name]) {
                        // Direct SVG string (Fastest)
                        const svg = window.lucide.icons[name].toSvg({ width: size, height: size, "class": className });
                        spanRef.current.innerHTML = svg;
                    } else if (window.lucide?.createIcons) {
                        // Fallback using createIcons
                        const i = document.createElement('i');
                        i.setAttribute('data-lucide', name);
                        i.className = className;
                        spanRef.current.innerHTML = '';
                        spanRef.current.appendChild(i);
                        window.lucide.createIcons({ root: spanRef.current, name, attrs: { width: size, height: size, "class": className } });
                    }
                };
                
                if (window.lucide) {
                    render();
                } else {
                    // Retry logic for async loading
                    const interval = setInterval(() => {
                        if (window.lucide) {
                            render();
                            clearInterval(interval);
                        }
                    }, 100);
                    setTimeout(() => clearInterval(interval), 3000);
                }
            }, [name, size, className]);

            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        // [CRITICAL FIX] Restored formatDate function
        const formatDate = (d) => {
            if (!d) return '-';
            try {
                // If it's a Firestore Timestamp (has seconds)
                if (typeof d === 'object' && d.seconds) {
                    return new Date(d.seconds * 1000).toLocaleDateString('ko-KR');
                }
                // Regular date string or object
                const date = new Date(d);
                return isNaN(date.getTime()) ? '-' : date.toLocaleDateString('ko-KR');
            } catch (e) {
                return '-';
            }
        };

        // Alias safeDate to formatDate for consistency
        const safeDate = formatDate;

        // [SAFETY] Safe Number Formatters
        const formatCurrency = (n, currency = 'KRW') => {
            try {
                const safeCurrency = currency === 'USD' ? 'USD' : 'KRW';
                if (n === null || n === undefined || n === '') return safeCurrency === 'USD' ? '$0' : '0원';
                const num = Number(n);
                if (isNaN(num)) return safeCurrency === 'USD' ? '$0' : '0원';
                const locale = safeCurrency === 'USD' ? 'en-US' : 'ko-KR';
                return new Intl.NumberFormat(locale, { style: 'currency', currency: safeCurrency, maximumFractionDigits: 0 }).format(num);
            } catch (e) { return currency === 'USD' ? '$0' : '0원'; }
        };
        
        const formatCompactNumber = (n) => {
            try {
                const num = Number(n);
                if (isNaN(num)) return '0';
                return new Intl.NumberFormat('ko-KR', { notation: "compact", maximumFractionDigits: 1 }).format(num);
            } catch (e) { return '0'; }
        };

        const calculateDepreciation = (price, purchaseDate, usefulLifeYears = 5, method = 'straight') => {
            try {
                if (!price || !purchaseDate || !usefulLifeYears) return 0;
                const principal = Number(price);
                const start = new Date(purchaseDate);
                if (isNaN(principal) || isNaN(start.getTime())) return 0;
                const yearsPassed = Math.max(0, (new Date() - start) / (1000 * 60 * 60 * 24 * 365));

                if (method === 'declining') {
                    const rate = 2 / usefulLifeYears;
                    return Math.max(0, principal * Math.pow(1 - rate, yearsPassed));
                }

                return Math.max(0, principal - (principal / usefulLifeYears) * yearsPassed);
            } catch(e) { return 0; }
        };

        // [SAFETY] Error Boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-red-50 p-10 text-center">
                            <Icon name="alert-triangle" size={48} className="text-red-500 mb-4" />
                            <h1 className="text-2xl font-bold text-red-600 mb-2">시스템 오류 발생</h1>
                            <p className="text-sm text-red-800 bg-red-100 p-4 rounded border border-red-200 mb-4">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 font-bold shadow-md">페이지 새로고침</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            const bgClass = type === 'success' ? 'bg-slate-800' : 'bg-red-600';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            return (
                <div className={`fixed top-4 right-4 z-50 flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white ${bgClass} animate-slide-in-top`}>
                    <Icon name={icon} size={20} className="text-white" />
                    <span className="text-sm font-medium">{message}</span>
                </div>
            );
        };

        const DonutChart = ({ data, colors }) => {
            const total = data.reduce((acc, cur) => acc + cur.value, 0);
            if (total === 0) return <div className="text-center text-slate-400 text-xs py-10">데이터 없음</div>;
            
            let accumulatedPercent = 0;
            const size = 100;
            const strokeWidth = 15;
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;

            return (
                <div className="flex flex-col items-center w-full">
                    <div className="relative w-36 h-36 mb-4">
                        <svg viewBox="0 0 100 100" className="transform -rotate-90 w-full h-full">
                            <circle cx="50" cy="50" r={radius} stroke="#f1f5f9" strokeWidth={strokeWidth} fill="none" />
                            {data.map((item, index) => {
                                const percent = item.value / total;
                                const strokeDasharray = `${circumference * percent} ${circumference}`;
                                const strokeDashoffset = -1 * circumference * accumulatedPercent;
                                accumulatedPercent += percent;
                                return (
                                    <circle key={index} cx="50" cy="50" r={radius} stroke={colors[index % colors.length]} strokeWidth={strokeWidth} fill="none" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="transition-all duration-500 ease-out" />
                                );
                            })}
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                            <span className="text-[10px] text-slate-400 uppercase tracking-wide">Total Assets</span>
                            <span className="text-xl font-bold text-slate-800">{formatCompactNumber(total)}</span>
                        </div>
                    </div>
                    <div className="w-full space-y-1.5 px-2">
                         {data.map((item, index) => (
                            <div key={index} className="flex items-center justify-between text-xs border-b border-slate-100 pb-1.5 last:border-0">
                                <div className="flex items-center gap-2 overflow-hidden">
                                    <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: colors[index % colors.length] }}></span>
                                    <span className="text-slate-600 truncate font-medium" title={item.label}>{item.label}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="font-bold text-slate-800">{formatCompactNumber(item.value)}</span>
                                    <span className="text-slate-400 text-[10px] w-8 text-right">{((item.value / total) * 100).toFixed(0)}%</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const EnhancedLineChart = ({ data, color }) => {
            if (!data || data.length < 2) return <div className="text-center text-xs text-slate-400 py-8">데이터 부족</div>;
            const maxVal = Math.max(...data.map(d => d.value)) || 1;
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * 100;
                const y = 100 - (d.value / maxVal) * 80; 
                return {x, y};
            });
            let pathD = `M ${points[0].x} ${points[0].y}`;
            points.slice(1).forEach(p => pathD += ` L ${p.x} ${p.y}`);
            const areaD = `${pathD} L 100 100 L 0 100 Z`;
            return (
                <div className="flex h-40 w-full gap-2">
                    <div className="flex flex-col justify-between text-[10px] text-slate-400 text-right min-w-[30px] py-1 pb-6"><span>{maxVal}개</span><span>{Math.round(maxVal/2)}개</span><span>0</span></div>
                    <div className="relative flex-1 h-full">
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full overflow-visible">
                            <defs><linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.2" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient></defs>
                            <line x1="0" y1="20" x2="100" y2="20" stroke="#f1f5f9" strokeWidth="0.5" vectorEffect="non-scaling-stroke"/><line x1="0" y1="60" x2="100" y2="60" stroke="#f1f5f9" strokeWidth="0.5" vectorEffect="non-scaling-stroke"/><line x1="0" y1="100" x2="100" y2="100" stroke="#f1f5f9" strokeWidth="0.5" vectorEffect="non-scaling-stroke"/>
                            <path d={areaD} fill="url(#chartGradient)" /><path d={pathD} fill="none" stroke={color} strokeWidth="3" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                        <div className="flex justify-between mt-2 text-[10px] text-slate-400 font-medium">{data.map((d, i) => (<div key={i} className="flex flex-col items-center"><span>{d.label}</span><span className="text-[8px] text-slate-300 mt-0.5">{d.amountStr}</span></div>))}</div>
                    </div>
                </div>
            );
        };

        const StatusDetailModal = ({ isOpen, onClose, data }) => {
            if (!isOpen || !data) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl animate-fade-in flex flex-col max-h-[80vh]">
                        <div className="px-6 py-4 border-b flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2"><span className={`w-3 h-3 rounded-full`} style={{backgroundColor: data.color}}></span>{data.label} 자산 목록</h2>
                            <button onClick={onClose}><Icon name="x" size={20} className="text-slate-500 hover:text-slate-800"/></button>
                        </div>
                        <div className="p-4 overflow-auto flex-1">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 text-slate-500 font-semibold border-b sticky top-0"><tr><th className="px-4 py-2">자산코드</th><th className="px-4 py-2">자산명</th><th className="px-4 py-2">카테고리</th><th className="px-4 py-2">위치</th><th className="px-4 py-2">담당자</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">
                                    {data.assets.length > 0 ? (data.assets.map(asset => (<tr key={asset.id} className="hover:bg-slate-50"><td className="px-4 py-2 font-mono text-slate-600">{asset.code}</td><td className="px-4 py-2 font-bold text-slate-800">{asset.name}</td><td className="px-4 py-2 text-slate-500">{asset.category}</td><td className="px-4 py-2 text-slate-600">{asset.location}</td><td className="px-4 py-2 text-slate-600">{asset.manager}</td></tr>))) : (<tr><td colSpan="5" className="p-4 text-center text-slate-400">해당 상태의 자산이 없습니다.</td></tr>)}
                                </tbody>
                            </table>
                        </div>

            const genCode = (cat) => {
                const prefix = `${sysConfig.companyPrefix}-${catMap[cat]||'ETC'}-`;
                const existingNums = assets
                    .filter(a => a && a.code && String(a.code).startsWith(prefix))
                    .map(a => parseInt(a.code.replace(prefix, ''), 10))
                    .filter(n => !isNaN(n))
                    .sort((a, b) => a - b);

                let nextNum = 1;
                for (let i = 0; i < existingNums.length; i++) {

                        nextNum++;
                    } else if (existingNums[i] > nextNum) {
                        break;
                    }
                }
                
                const length = sysConfig.codeSerialLength || 5; 
                return `${prefix}${String(nextNum).padStart(length,'0')}`;

            const [statusModalOpen, setStatusModalOpen] = useState(false);

            // [NEW] Column Filters State
            const [colFilters, setColFilters] = useState({ code: '', info: '', location: '' });

            useEffect(() => {
                let unsubAuth = null;

                let unsubDisposal = () => {};
                let unsubAudits = () => {};

                let isUnmounted = false;
                let didResolveAuth = false;
                let loadingTimeout = null;

                        const app = modules.initializeApp(configToUse);

                        const appId =

                        loadingTimeout = window.setTimeout(() => {
                            if (isUnmounted) return;

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            modules.signInWithCustomToken(auth, __initial_auth_token).catch((e) => {

                        unsubAuth = modules.onAuthStateChanged(auth, (u) => {

                            unsubHistory();
                            unsubDisposal();
                            unsubAudits();
                            unsubMaintenance();
                            unsubAssets = () => {};
                            unsubHistory = () => {};
                            unsubDisposal = () => {};
                            unsubAudits = () => {};
                            unsubMaintenance = () => {};

                            if (u) {
                                setUser(u);
                                setCloudError('');
                                if (loadingTimeout) window.clearTimeout(loadingTimeout);
                                const configRef = modules.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                                modules.getDoc(configRef).then(s => { if(s.exists()) setSysConfig(prev => ({...prev, ...s.data()})); }).catch(()=>{});
                                unsubAssets = modules.onSnapshot(modules.collection(db, 'artifacts', appId, 'public', 'data', 'assets'), 
                                    (s) => { 
                                            const cleanAssets = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d);

                                            setLoading(false); setIsDemoMode(false); setCloudError('');

                                    (error) => {
                                        console.error("Assets sync error:", error);
                                        setAssets(MOCK_ASSETS);
                                        setIsDemoMode(true);
                                        setCloudError(`클라우드 데이터를 불러오지 못했습니다. (${error?.code || error?.message || 'unknown'})`);
                                        setLoading(false);
                                    }
                                );
                                unsubHistory = modules.onSnapshot(modules.collection(db, 'artifacts', appId, 'public', 'data', 'history'),
                                    (s) => { 
                                            const cleanHistory = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d);
                                            setHistory(cleanHistory); 
                                    },
                                    (error) => { console.error("History sync error:", error); }
                                );
                                unsubDisposal = modules.onSnapshot(modules.collection(db, 'artifacts', appId, 'public', 'data', 'disposals'),
                                    (s) => {
                                        const rows = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d);
                                        rows.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
                                        setDisposalLogs(rows);
                                    },
                                    (error) => { console.error("Disposal sync error:", error); }
                                );
                                unsubAudits = modules.onSnapshot(modules.collection(db, 'artifacts', appId, 'public', 'data', 'audits'),
                                    (s) => {
                                        const rows = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d);
                                        rows.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                                        setAudits(rows);
                                    },
                                    (error) => { console.error("Audit sync error:", error); }
                                );
                                unsubMaintenance = modules.onSnapshot(modules.collection(db, 'artifacts', appId, 'public', 'data', 'maintenance'),
                                    (s) => {
                                        const rows = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d);
                                        rows.sort((a, b) => String(a.nextCheckDate || '').localeCompare(String(b.nextCheckDate || '')));
                                        setMaintenanceRows(rows);
                                    },
                                    (error) => { console.error("Maintenance sync error:", error); }
                                );
                            } else if (!officeflowEmail) {
                                window.setTimeout(() => {
                                    if (!isUnmounted && !didResolveAuth && !auth.currentUser) {
                                        setAssets([]);
                                        setIsDemoMode(false);
                                        setCloudError("로그인 세션을 확인하지 못했습니다. 다시 로그인 후 시도해주세요.");
                                        setLoading(false);
                                    }
                                }, 1500);
                            } else {
                                window.setTimeout(() => {
                                    if (!isUnmounted && !didResolveAuth && !auth.currentUser) {
                                        setAssets([]);
                                        setIsDemoMode(false);
                                        setCloudError("OfficeFlow 인증 세션을 아직 확인하지 못했습니다.");
                                        setLoading(false);
                                    }
                                }, 2500);
                            }
                        });
                    } catch (err) {
                        if (!isUnmounted) {
                            setAssets([]);
                            setIsDemoMode(false);
                            setCloudError(`클라우드 연결을 초기화하지 못했습니다. (${err?.code || err?.message || 'unknown'})`);
                            setLoading(false);
                        }
                    }
                };
                init();

                return () => {
                    isUnmounted = true;
                    if (loadingTimeout) window.clearTimeout(loadingTimeout);
                    unsubAssets();
                    unsubHistory();
                    unsubDisposal();
                    unsubAudits();
                    unsubMaintenance();
                    if (typeof unsubAuth === 'function') unsubAuth();
                };
            }, []);

            useEffect(() => { setCurrentPage(1); }, [searchTerm, filterStatus, colFilters]);
            useEffect(() => { setHistoryPage(1); }, [historySearchTerm, historyFilterType]);

            useEffect(() => {
                if (assets.length > 0) {
                    const params = new URLSearchParams(window.location.search);
                    const scanId = params.get('scan');
                    if (scanId) {
                        const target = assets.find(a => a.id === scanId);
                        if (target) { setEditingAsset(target); setShowModal(true); window.history.replaceState({}, '', window.location.pathname); }
                    }
                }
            }, [assets, sysConfig.depreciationMethod]);

            const analytics = useMemo(() => {
                try {
                    const totalCount = assets.length;
                    const totalAcqPrice = assets.reduce((acc, cur) => acc + Number(cur.price || 0), 0);
                    const currentBookValue = assets.reduce((acc, cur) => acc + calculateDepreciation(Number(cur.price), cur.purchaseDate, 5, sysConfig.depreciationMethod), 0);
                    const categoryMap = {};
                    assets.forEach(a => { const val = Number(a.price || 0); categoryMap[a.category] = (categoryMap[a.category] || 0) + val; });
                    const categoryData = Object.entries(categoryMap).map(([k, v]) => ({ label: k, value: v })).sort((a,b) => b.value - a.value);
                    const statusMapData = { active: 0, repair: 0, idle: 0, disposed: 0 };
                    assets.forEach(a => { if (statusMapData[a.status] !== undefined) statusMapData[a.status]++; });
                    const statusData = [
                        { key: 'active', label: '사용중', value: statusMapData.active, color: '#10b981' },
                        { key: 'idle', label: '유휴/재고', value: statusMapData.idle, color: '#64748b' },
                        { key: 'repair', label: '수리중', value: statusMapData.repair, color: '#f59e0b' },
                        { key: 'disposed', label: '폐기', value: statusMapData.disposed, color: '#ef4444' }
                    ];
                    const today = new Date();
                    const monthlyData = [];
                    for(let i=5; i>=0; i--) {
                        const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                        const label = `${d.getMonth()+1}월`;
                        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                        const monthlyAssets = assets.filter(a => safeSearch(a.purchaseDate, key));
                        const count = monthlyAssets.length;
                        const amount = monthlyAssets.reduce((sum, a) => sum + Number(a.price||0), 0);
                        monthlyData.push({ label, value: count, amountStr: amount > 0 ? formatCompactNumber(amount) : '-' });
                    }
                    const attentionAssets = assets.filter(a => {
                        const lifeYears = 5; 
                        const start = new Date(a.purchaseDate);
                        const age = (new Date() - start) / (1000 * 60 * 60 * 24 * 365);
                        return age >= lifeYears * 0.9;
                    });
                    return { totalCount, totalAcqPrice, currentBookValue, categoryData, statusData, monthlyData, attentionAssets };
                } catch (e) {
                    return { totalCount: 0, totalAcqPrice: 0, currentBookValue: 0, categoryData: [], statusData: [], monthlyData: [], attentionAssets: [] };
                }
            }, [assets]);

            const filteredAssets = useMemo(() => {
                return assets.filter(a => {
                    try {
                        if (!a) return false;
                        const s = searchTerm;
                        const globalMatch = ((safeSearch(a.name, s) || safeSearch(a.code, s) || safeSearch(a.location, s) || safeSearch(a.manager, s) || safeSearch(a.category, s) || safeSearch(a.subCategory, s)) && (filterStatus === 'all' || a.status === filterStatus));
                        
                        // [NEW] Column Filters Logic
                        if (!globalMatch) return false;
                        if (colFilters.code && !safeSearch(a.code, colFilters.code)) return false;
                        if (colFilters.info && !(safeSearch(a.name, colFilters.info) || safeSearch(a.category, colFilters.info) || safeSearch(a.spec, colFilters.info))) return false;
                        if (colFilters.location && !(safeSearch(a.location, colFilters.location) || safeSearch(a.manager, colFilters.location))) return false;
                        
                        return true;
                    } catch (e) { return false; }
                });
            }, [assets, searchTerm, filterStatus, colFilters]);

            const paginatedAssets = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredAssets.slice(start, start + itemsPerPage);
            }, [filteredAssets, currentPage]);
            const totalAssetPages = Math.ceil(filteredAssets.length / itemsPerPage);

            const filteredLabelAssets = useMemo(() => {
                return assets.filter(a => {
                    try {
                        if(!a) return false;
                        const s = labelSearchTerm;
                        return (safeSearch(a.name, s) || safeSearch(a.code, s)) &&
                        (labelFilterCategory === 'all' || a.category === labelFilterCategory);
                    } catch (e) { return false; }
                });
            }, [assets, labelSearchTerm, labelFilterCategory]);

            const sortedHistory = useMemo(() => {
                if (!Array.isArray(history)) return [];
                return history.filter(h => {
                    try {
                        if (!h) return false;
                        const term = historySearchTerm;
                        const matchSearch = safeSearch(h.assetName, term) || safeSearch(h.assetCode, term);
                        const matchType = historyFilterType === 'all' || h.type === historyFilterType;
                        return matchSearch && matchType;
                    } catch (e) { return false; }
                }).sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
            }, [history, historySearchTerm, historyFilterType]);

            const paginatedHistory = useMemo(() => {
                const start = (historyPage - 1) * historyItemsPerPage;
                return sortedHistory.slice(start, start + historyItemsPerPage);
            }, [sortedHistory, historyPage]);
            const totalHistoryPages = Math.ceil(sortedHistory.length / historyItemsPerPage);
            useEffect(() => {
                if (totalAssetPages > 0 && currentPage > totalAssetPages) setCurrentPage(totalAssetPages);
            }, [currentPage, totalAssetPages]);
            useEffect(() => {
                if (totalHistoryPages > 0 && historyPage > totalHistoryPages) setHistoryPage(totalHistoryPages);
            }, [historyPage, totalHistoryPages]);

            const handleExportExcel = () => {
                if(filteredAssets.length === 0) return showToast("내보낼 데이터가 없습니다.", "error");
                const ws = XLSX.utils.json_to_sheet(filteredAssets.map(a => ({ '자산코드': a.code, '자산명': a.name, '규격/사양': a.spec || '-', '카테고리': a.category, '상세구분': a.subCategory || '-', '보관위치': a.location, '담당자': a.manager, '상태': statusMap[a.status] || a.status, '취득일': a.purchaseDate, '취득가액': a.price, '잔존가액': calculateDepreciation(a.price, a.purchaseDate, 5, sysConfig.depreciationMethod) })));
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Assets"); XLSX.writeFile(wb, `자산대장_${new Date().toISOString().slice(0,10)}.xlsx`); showToast("엑셀 다운로드가 시작되었습니다.");
            };

            const handleSave = async (data) => {
                if(isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                const col = fb.collection(db, 'artifacts', appId, 'public', 'data', 'assets');
                try {
                    if (editingAsset) await fb.updateDoc(fb.doc(col, editingAsset.id), {...data, updatedAt: fb.serverTimestamp()});
                    else await fb.addDoc(col, {...data, createdAt: fb.serverTimestamp()});
                    setShowModal(false); showToast("저장되었습니다.");
                } catch(e) { showToast(e.message, "error"); }
            };
            const handleDelete = async (id) => {
                if(!confirm("삭제하시겠습니까?")) return;
                if(isDemoMode) return showToast("데모 모드 삭제 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try {
                    const historySnapshot = await fb.getDocs(fb.collection(db, 'artifacts', appId, 'public', 'data', 'history'));
                    const targetHistoryRefs = [];
                    historySnapshot.docs.forEach((historyDoc) => {
                        const h = historyDoc.data();
                        if (h && h.assetId === id) targetHistoryRefs.push(historyDoc.ref);
                    });

                    const firstBatch = fb.writeBatch(db);
                    firstBatch.delete(fb.doc(db, 'artifacts', appId, 'public', 'data', 'assets', id));
                    const firstChunk = targetHistoryRefs.slice(0, 449);
                    firstChunk.forEach((ref) => firstBatch.delete(ref));
                    await firstBatch.commit();

                    for (let i = 449; i < targetHistoryRefs.length; i += 450) {
                        const batch = fb.writeBatch(db);
                        targetHistoryRefs.slice(i, i + 450).forEach((ref) => batch.delete(ref));
                        await batch.commit();
                    }

                    setSelectedForPrint(prev => {
                        const s = new Set(prev);
                        s.delete(id);
                        return s;
                    });
                    showToast("자산 및 연관 이력이 삭제되었습니다.");
                } catch(e) { showToast(e.message, "error"); }
            };
            const handleSaveSettings = async () => {
                if(isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try { await fb.setDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), sysConfig); showToast("설정 저장됨"); } catch(e) { showToast(e.message, "error"); }
            };

            const handleSaveHistory = async (hData) => {
                if(isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                const batch = fb.writeBatch(db);
                
                if (hData.isEditMode) {
                    const hRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'history', hData.id);
                    batch.update(hRef, { 
                        newLocation: hData.newLocation, newManager: hData.newManager, 
                        issue: hData.issue, cost: hData.cost, memo: hData.memo, updatedAt: fb.serverTimestamp() 
                    });
                    if (hData.type === 'move' && hData.assetId) {
                        const aRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'assets', hData.assetId);
                        batch.update(aRef, { location: hData.newLocation, manager: hData.newManager, updatedAt: fb.serverTimestamp() });
                    }
                } else {
                    const hRef = fb.doc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'history'));
                    batch.set(hRef, { ...hData, date: fb.serverTimestamp() });
                    const aRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'assets', hData.assetId);
                    const updates = { updatedAt: fb.serverTimestamp() };
                    if (hData.type === 'move') { updates.location = hData.newLocation; updates.manager = hData.newManager; }
                    else if (hData.type === 'return') { updates.status = 'idle'; updates.location = sysConfig.defaultReturnLocation; updates.manager = sysConfig.defaultReturnManager; }
                    else if (hData.type === 'repair' && hData.statusUpdate) { updates.status = 'repair'; }
                    batch.update(aRef, updates);
                }

                try { await batch.commit(); setShowHistoryModal(false); setEditingHistory(null); showToast("처리되었습니다."); } catch(e) { showToast(e.message, "error"); }
            };

            const handleDeleteHistory = async (id) => {
                if(!confirm("이 이력을 삭제하시겠습니까? (자산 상태는 변경되지 않습니다)")) return;
                if(isDemoMode) return showToast("데모 모드 삭제 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try { await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'history', id)); showToast("이력이 삭제되었습니다."); } catch(e) { showToast(e.message, "error"); }
            };

            const handleResetHistory = async () => {
                if (!confirm("경고: 모든 이력 데이터가 영구적으로 삭제됩니다.\n정말 초기화하시겠습니까?")) return;
                if (isDemoMode) return showToast("데모 모드에서는 초기화할 수 없습니다.", "error");
                
                setLoading(true);
                try {
                    const db = fb.getFirestore();
                    const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                    const snapshot = await fb.getDocs(fb.collection(db, 'artifacts', appId, 'public', 'data', 'history'));
                    
                    if (snapshot.empty) {
                        showToast("삭제할 이력이 없습니다.");
                        return;
                    }

                    const BATCH_LIMIT = 450;
                    for (let i = 0; i < snapshot.docs.length; i += BATCH_LIMIT) {
                        const batch = fb.writeBatch(db);
                        snapshot.docs.slice(i, i + BATCH_LIMIT).forEach((historyDoc) => {
                            batch.delete(historyDoc.ref);
                        });
                        await batch.commit();
                    }

                    showToast("모든 이력이 성공적으로 초기화되었습니다.");
                } catch (e) {
                    console.error("Reset Error:", e);
                    showToast("초기화 실패: " + e.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            const handleSaveDisposal = async (payload) => {
                if (isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                const batch = fb.writeBatch(db);
                try {
                    const dRef = fb.doc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'disposals'));
                    batch.set(dRef, { ...payload, createdAt: fb.serverTimestamp() });
                    const aRef = fb.doc(db, 'artifacts', appId, 'public', 'data', 'assets', payload.assetId);
                    batch.update(aRef, {
                        status: 'disposed',
                        location: payload.method === '매각' ? '매각처리' : '폐기완료',
                        updatedAt: fb.serverTimestamp()
                    });
                    await batch.commit();
                    showToast("폐기/매각 처리되었습니다.");
                } catch (e) {
                    showToast(e.message, "error");
                }
            };

            const handleCreateAudit = async (payload) => {
                if (isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try {
                    const nextRound = `${new Date().getFullYear()}-${String(audits.length + 1).padStart(2, '0')}`;
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'audits'), {
                        roundName: nextRound,
                        checkedCount: Number(payload.checkedCount || 0),
                        mismatchCount: Number(payload.mismatchCount || 0),
                        memo: payload.memo || '',
                        date: new Date().toISOString().slice(0,10),
                        createdAt: fb.serverTimestamp()
                    });
                    showToast("실사 회차가 생성되었습니다.");
                } catch (e) {
                    showToast(e.message, "error");
                }
            };

            const handleSaveMaintenance = async (payload) => {
                if (isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try {
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'maintenance'), {
                        ...payload,
                        createdAt: fb.serverTimestamp()
                    });
                    showToast("유지보수 일정이 등록되었습니다.");
                } catch (e) {
                    showToast(e.message, "error");
                }
            };

            const handleMaintenanceDone = async (row) => {
                if (isDemoMode) return showToast("데모 모드 저장 불가", "error");
                const db = fb.getFirestore(); const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : OFFICEFLOW_APP_ID;
                try {
                    await fb.updateDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'maintenance', row.id), {
                        status: 'done',
                        lastDoneDate: new Date().toISOString().slice(0,10),
                        updatedAt: fb.serverTimestamp()
                    });
                    showToast("유지보수 완료 처리되었습니다.");
                } catch (e) {
                    showToast(e.message, "error");
                }
            };

            const togglePrintSelection = (id) => {

                                <div className="max-w-6xl mx-auto space-y-6">
                                    <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-lg flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div><h4 className="font-bold text-indigo-800">자산 라벨 출력 센터</h4><p className="text-sm text-indigo-700">폼텍 라벨 용지에 맞춰 자산 태그를 출력합니다.</p></div>
                                        <div className="flex flex-wrap gap-4 items-center">
                                            <div className="flex items-center gap-2"><span className="text-xs font-bold text-indigo-700">용지:</span><select value={labelSheet} onChange={e=>setLabelSheet(e.target.value)} className="text-sm border rounded px-2 py-1"><option value="3107">3107 (16칸)</option><option value="3102">3102 (40칸)</option><option value="3104">3104 (27칸)</option><option value="3109">3109 (18칸)</option><option value="3212">3212 (12칸)</option><option value="3105">3105 (21칸)</option></select></div>
                                            
                                            <div className="flex items-center gap-2"><span className="text-xs font-bold text-indigo-700">시작 위치(건너뛰기):</span><input type="number" min="0" max="100" value={printStartIndex} onChange={(e) => setPrintStartIndex(Number(e.target.value))} className="text-sm border rounded px-2 py-1 w-16 text-right" /></div>

                                            <div className="text-sm font-bold text-indigo-800">{selectedForPrint.size}개 선택됨</div>
                                            <button onClick={() => selectedForPrint.size ? window.print() : showToast("선택된 자산이 없습니다.", "error")} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 shadow-sm flex items-center gap-2 text-sm font-medium"><Icon name="printer" size={16} /> 인쇄하기</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-1 bg-white border rounded-lg shadow-sm overflow-hidden flex flex-col h-[600px]">
                                            <div className="p-3 border-b bg-slate-50 font-semibold text-sm">출력 대상 선택</div>
                                            <div className="p-3 border-b space-y-2"><input placeholder="검색..." value={labelSearchTerm} onChange={e=>setLabelSearchTerm(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" /><select value={labelFilterCategory} onChange={e=>setLabelFilterCategory(e.target.value)} className="w-full border rounded px-3 py-2 text-sm"><option value="all">모든 카테고리</option>{Object.keys(CATEGORY_MAP).map(cat => (<option key={cat} value={cat}>{cat}</option>))}</select></div>
                                            <div className="overflow-y-auto flex-1 p-2 space-y-1">{filteredLabelAssets.map(a => (<div key={a.id} onClick={() => {const s=new Set(selectedForPrint); s.has(a.id)?s.delete(a.id):s.add(a.id); setSelectedForPrint(s);}} className={`p-3 rounded border cursor-pointer flex items-center gap-3 ${selectedForPrint.has(a.id)?'bg-indigo-50 border-indigo-300':'hover:bg-slate-50 border-transparent'}`}><div className={`w-4 h-4 rounded border flex items-center justify-center ${selectedForPrint.has(a.id)?'bg-indigo-600 border-indigo-600':'border-slate-300'}`}>{selectedForPrint.has(a.id)&&<Icon name="check" size={12} className="text-white"/>}</div><div><div className="font-bold text-sm text-slate-800">{a.name}</div><div className="text-xs text-slate-500">{a.code}</div></div></div>))}</div>
                                        </div>
                                        <div className="lg:col-span-2 bg-slate-200 p-8 overflow-y-auto h-[600px] flex justify-center">
                                            <div className={`preview-sheet sheet-${labelSheet}`}>
                                                {Array.from({ length: printStartIndex }).map((_, i) => (
                                                    <div key={`empty-${i}`} className="label-item empty-cell"></div>
                                                ))}
                                                {assets.filter(a => selectedForPrint.has(a.id)).map(a => (
                                                    <LabelItem key={a.id} asset={a} companyName={sysConfig.companyName} />
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'settings' && (
                                <div className="max-w-4xl mx-auto space-y-6">
                                     <div className="bg-white p-6 rounded-lg border border-slate-200 shadow-sm">
                                        <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="sliders" size={20} className="text-slate-500" /> 환경 설정</h2>
                                        <div className="space-y-6">
                                            <div className="pb-4 border-b border-slate-100">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-bold text-slate-800">회사 정보 설정</div><div className="text-xs text-slate-500 mt-1">라벨 출력 및 보고서에 표시될 회사명을 설정합니다.</div></div><span className="px-2 py-1 bg-green-100 text-green-700 text-xs rounded font-bold">General</span></div>
                                                <div><label className="block text-xs font-semibold text-slate-600 mb-1">회사명 (라벨 출력용)</label><input type="text" value={sysConfig.companyName} onChange={(e) => setSysConfig({...sysConfig, companyName: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" placeholder="예: (주)대한민국" /></div>
                                            </div>
                                            <div className="pb-4 border-b border-slate-100">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-bold text-slate-800">회계/재무 설정</div><div className="text-xs text-slate-500 mt-1">감가상각 방식 및 기본 통화를 설정합니다.</div></div><span className="px-2 py-1 bg-amber-100 text-amber-700 text-xs rounded font-bold">Finance</span></div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="block text-xs font-semibold text-slate-600 mb-1">감가상각 계산법</label><select value={sysConfig.depreciationMethod} onChange={(e) => setSysConfig({...sysConfig, depreciationMethod: e.target.value})} className="w-full border rounded px-3 py-2 text-sm"><option value="straight">정액법 (Straight-Line)</option><option value="declining">정률법 (Declining Balance)</option></select></div><div><label className="block text-xs font-semibold text-slate-600 mb-1">기본 통화</label><select value={sysConfig.currency} onChange={(e) => setSysConfig({...sysConfig, currency: e.target.value})} className="w-full border rounded px-3 py-2 text-sm"><option value="KRW">KRW (₩)</option><option value="USD">USD ($)</option></select></div></div>
                                            </div>
                                            <div className="pb-4 border-b border-slate-100">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-bold text-slate-800">자산코드 생성 규칙</div><div className="text-xs text-slate-500 mt-1">자동 생성 규칙을 설정합니다.</div></div><span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded font-bold">Auto-Gen</span></div>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    <div><label className="block text-xs font-semibold text-slate-600 mb-1">회사 대표 코드 (Prefix)</label><input type="text" value={sysConfig.companyPrefix} onChange={(e) => setSysConfig({...sysConfig, companyPrefix: e.target.value.toUpperCase()})} className="w-full border rounded px-3 py-2 text-sm uppercase font-mono" /></div>
                                                    <div><label className="block text-xs font-semibold text-slate-600 mb-1">순차번호 자리수 (기본: 5)</label><input type="number" min="3" max="10" value={sysConfig.codeSerialLength} onChange={(e) => setSysConfig({...sysConfig, codeSerialLength: parseInt(e.target.value) || 5})} className="w-full border rounded px-3 py-2 text-sm" /></div>
                                                    <div><label className="block text-xs font-semibold text-slate-600 mb-1">생성 방식</label><select className="w-full border rounded px-3 py-2 text-sm bg-slate-50" disabled><option>대표코드 - 카테고리 - 순차번호</option></select></div>
                                                </div>
                                            </div>
                                            <div className="pb-4 border-b border-slate-100">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-bold text-slate-800">자산 반납 기본값 설정</div><div className="text-xs text-slate-500 mt-1">자산 반납(퇴사) 처리 시 자동으로 적용될 값을 설정합니다.</div></div><span className="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded font-bold">Automation</span></div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="block text-xs font-semibold text-slate-600 mb-1">기본 반납 보관장소</label><input type="text" value={sysConfig.defaultReturnLocation} onChange={(e) => setSysConfig({...sysConfig,defaultReturnLocation: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" placeholder="예: 전산실(창고)" /></div><div><label className="block text-xs font-semibold text-slate-600 mb-1">기본 반납 담당자</label><input type="text" value={sysConfig.defaultReturnManager} onChange={(e) => setSysConfig({...sysConfig, defaultReturnManager: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" placeholder="예: 자산관리팀" /></div></div>
                                            </div>
                                            
                                            <div className="pt-4 border-t border-slate-100">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-bold text-slate-800">데이터 관리</div><div className="text-xs text-slate-500 mt-1">데이터 초기화 등 관리자 기능을 수행합니다.</div></div><span className="px-2 py-1 bg-red-100 text-red-700 text-xs rounded font-bold">Danger Zone</span></div>
                                                <div className="flex justify-end items-center gap-4">
                                                    <span className="text-xs text-slate-500">모든 이력 데이터(이동/반납/수리)를 삭제합니다. (복구 불가)</span>
                                                    <button onClick={handleResetHistory} className="bg-white border border-red-200 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-50 hover:border-red-300 transition-colors flex items-center gap-2"><Icon name="trash-2" size={16}/> 모든 이력 초기화</button>
                                                </div>
                                            </div>

                                            <div className="mt-3 flex justify-end"><button onClick={handleSaveSettings} className="bg-primary text-white px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-slate-800 shadow-lg transition-all">설정 저장하기</button></div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="print-area">
                            <div className={`sheet-${labelSheet}`}>
                                {Array.from({ length: printStartIndex }).map((_, i) => (
                                    <div key={`empty-p-${i}`} className="label-item empty-cell"></div>
                                ))}
                                {assets.filter(a => selectedForPrint.has(a.id)).map(a => (
                                    <LabelItem key={a.id} asset={a} companyName={sysConfig.companyName} />
                                ))}
                            </div>
                        </div>
                    </main>

                    {showModal && <AssetFormModal isOpen={showModal} onClose={()=>setShowModal(false)} onSubmit={handleSave} initialData={editingAsset} sysConfig={sysConfig} assets={assets} />}
                    {showHistoryModal && <HistoryFormModal isOpen={showHistoryModal} onClose={()=>setShowHistoryModal(false)} onSubmit={handleSaveHistory} type={historyType} assets={assets} sysConfig={sysConfig} initialHistory={editingHistory} onViewHistory={(a) => setTimelineAsset(a)} />}
                    {statusModalOpen && <StatusDetailModal isOpen={statusModalOpen} onClose={() => setStatusModalOpen(false)} data={selectedStatusData} />}
                    
                    {/* [NEW] Timeline Modal */}
                    {timelineAsset && <HistoryTimelineModal asset={timelineAsset} allHistory={history} onClose={() => setTimelineAsset(null)} sysConfig={sysConfig} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
