<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corp.Manager - 기업 자산 통합 관리</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="assets/cute-coding-robot-icon.svg" />

    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 5. Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        deleteDoc,
        updateDoc,
        doc,
        onSnapshot,
        serverTimestamp,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBfT58Y9XwjalTk0E0NPBWqkVVVOWN9zFQ",
        authDomain: "officeflow-one.firebaseapp.com",
        projectId: "officeflow-one",
        storageBucket: "officeflow-one.firebasestorage.app",
        messagingSenderId: "1084176732785",
        appId: "1:1084176732785:web:56e241ddcdb69afdf101d0",
        measurementId: "G-SYP4NQMGP7",
      };

      const app = initializeApp(firebaseConfig);

      // 전역 객체에 Firebase 모듈 할당 (React에서 사용하기 위함)
      window.FB = {
        app,
        analytics: getAnalytics(app),
        auth: getAuth(app),
        db: getFirestore(app),
        onAuthStateChanged,
        collection,
        addDoc,
        deleteDoc,
        updateDoc,
        doc,
        onSnapshot,
        serverTimestamp,
        setDoc,
      };
    </script>

    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .animate-fade-in-up {
        animation: fadeIn 0.4s ease-out forwards;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .bar-grow {
        transition: width 1s ease-in-out;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;
      const { createRoot } = ReactDOM;

      // Firebase modules from window
      const {
        auth,
        db,
        onAuthStateChanged,
        collection,
        addDoc,
        deleteDoc,
        updateDoc,
        doc,
        onSnapshot,
        serverTimestamp,
        setDoc,
      } = window.FB || {};
      const readOfficeFlowSession = () => {
        try {
          const raw =
            window.parent && window.parent !== window
              ? window.parent.localStorage.getItem("officeflow-one-mvp-state")
              : localStorage.getItem("officeflow-one-mvp-state");
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          console.warn("OfficeFlow session read failed:", error);
          return null;
        }
      };
      const officeFlowSession = readOfficeFlowSession();
      const officeFlowUid = String(officeFlowSession?.session?.uid || "").trim();
      const officeFlowEmail = String(officeFlowSession?.session?.email || "")
        .toLowerCase()
        .trim();
      const officeFlowKey = (officeFlowUid || officeFlowEmail).replace(/[^a-z0-9]/gi, "_");
      const appId = officeFlowKey
        ? `ofw-corp-assets-${officeFlowKey}`
        : "ofw-corp-assets-guest";

      // Icon Helper Component (Lucide)
      const Icon = ({ name, size = 20, className = "" }) => {
        const iRef = useRef(null);
        useEffect(() => {
          if (window.lucide && iRef.current) {
            window.lucide.createIcons({
              root: iRef.current,
              name: name,
              attrs: { width: size, height: size, class: className },
            });
          }
        }, [name, size, className]);
        return <i ref={iRef} data-lucide={name} className="inline-flex"></i>;
      };

      // --- Helpers ---
      const formatCurrency = (amount) =>
        new Intl.NumberFormat("ko-KR", { style: "currency", currency: "KRW" }).format(amount);
      const parseLocalDate = (value) => {
        const date = normalizeDateInput(value);
        if (!date) return null;
        const [y, m, d] = date.split("-").map(Number);
        if (!y || !m || !d) return null;
        return new Date(y, m - 1, d);
      };
      const formatDate = (dateString) => {
        const date = parseLocalDate(dateString);
        return date ? date.toLocaleDateString("ko-KR") : "-";
      };
      const getDaysDifference = (targetDate) => {
        const target = parseLocalDate(targetDate);
        if (!target) return null;
        const today = new Date();
        const todayLocal = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        return Math.ceil((target - todayLocal) / (1000 * 60 * 60 * 24));
      };
      const formatDday = (targetDate) => {
        const days = getDaysDifference(targetDate);
        return days === null ? "-" : `D-${days}`;
      };
      const normalizeText = (v) => String(v ?? "").trim();
      const parseNumberSafe = (v) => {
        const n = Number(
          String(v ?? "")
            .replace(/,/g, "")
            .trim()
        );
        return Number.isFinite(n) ? n : 0;
      };
      const normalizeDateInput = (v) => {
        const s = normalizeText(v);
        if (!s) return "";
        const replaced = s.replace(/[.\/]/g, "-").replace(/\s+/g, "");
        const ymd = replaced.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (ymd)
          return `${ymd[1]}-${String(ymd[2]).padStart(2, "0")}-${String(ymd[3]).padStart(2, "0")}`;
        const dt = new Date(s);
        if (Number.isNaN(dt.getTime())) return "";
        return dt.toISOString().slice(0, 10);
      };
      const getYearSafe = (dateValue) => {
        const d = normalizeDateInput(dateValue);
        if (!d) return null;
        const year = Number(d.slice(0, 4));
        return Number.isFinite(year) ? year : null;
      };
      const getInsuranceGroupKey = (item) =>
        normalizeText(item?.renewalGroupId) ||
        [
          normalizeText(item?.type),
          normalizeText(item?.company),
          normalizeText(item?.name),
          normalizeText(item?.insuredObject),
        ].join("|");
      const sanitizeLink = (value) => {
        const link = normalizeText(value);
        if (!link) return "";
        const lower = link.toLowerCase();
        if (
          lower.startsWith("javascript:") ||
          lower.startsWith("data:") ||
          lower.startsWith("vbscript:")
        ) {
          return "";
        }
        return link;
      };

      // --- CSV Functions ---
      const downloadCSV = (data, type) => {
        if (!data || data.length === 0) {
          alert("데이터 없음");
          return;
        }
        let headers = [],
          mapRow = null;

        if (type === "insurances") {
          headers = ["종류", "보험사", "증권명", "피보험물", "시작일", "만기일", "금액"];
          mapRow = (i) => [
            i.type,
            i.company,
            i.name,
            i.insuredObject || "",
            i.startDate,
            i.endDate,
            i.amount,
          ];
        } else if (type === "vehicles") {
          headers = ["차량번호", "모델", "소유형태", "업체명", "운전자", "만기일", "월비용"];
          mapRow = (i) => [
            i.plateNumber,
            i.model,
            i.ownershipType,
            i.provider || "",
            i.driver,
            i.contractEnd,
            i.monthlyCost,
          ];
        } else if (type === "accidents") {
          headers = [
            "발생일",
            "차량번호",
            "운전자",
            "내용",
            "수리비",
            "대인배상",
            "대물배상",
            "자차부담금",
            "총비용",
            "보험처리여부",
          ];
          mapRow = (i) => [
            i.date,
            i.plateNumber,
            i.driver,
            i.description,
            i.repairCost || 0,
            i.insurancePerson || 0,
            i.insuranceProperty || 0,
            i.deductible || 0,
            i.totalCost || 0,
            i.insuranceClaimed,
          ];
        }

        const csvContent = [
          headers.join(","),
          ...data.map((item) =>
            mapRow(item)
              .map((v) => `"${String(v).replace(/"/g, '""')}"`)
              .join(",")
          ),
        ].join("\n");
        const blob = new Blob(["\ufeff" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${type}_export_${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const parseCSVLine = (line) => {
        const values = [];
        let cur = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === "," && !inQuotes) {
            values.push(cur);
            cur = "";
          } else {
            cur += ch;
          }
        }
        values.push(cur);
        return values.map((v) => v.trim());
      };
      const parseCSV = (text) => {
        const cleaned = String(text || "").replace(/^\uFEFF/, "");
        const lines = cleaned.split(/\r?\n/).filter((line) => line.trim() !== "");
        if (!lines.length) return [];
        const headers = parseCSVLine(lines[0]).map((h) => h.replace(/^"|"$/g, "").trim());
        return lines.slice(1).map((line) => {
          const values = parseCSVLine(line).map((v) => v.replace(/^"|"$/g, "").replace(/""/g, '"'));
          return headers.reduce((obj, header, index) => {
            obj[header] = values[index] ?? "";
            return obj;
          }, {});
        });
      };

      // --- App Component ---
      function App() {
        // Firebase가 로드되기 전이면 대기
        if (!window.FB)
          return <div className="flex h-screen items-center justify-center text-slate-500 font-medium">클라우드 연결중...</div>;

        const [isAuthenticated, setIsAuthenticated] = useState(Boolean(officeFlowEmail));
        const [passwordInput, setPasswordInput] = useState("");
        const [globalSettings, setGlobalSettings] = useState({ adminPassword: "admin1234" });

        const [user, setUser] = useState(null);
        const [activeTab, setActiveTab] = useState("dashboard");
        const [dashboardYear, setDashboardYear] = useState(new Date().getFullYear());

        const [insurances, setInsurances] = useState([]);
        const [vehicles, setVehicles] = useState([]);
        const [accidents, setAccidents] = useState([]);
        const [claims, setClaims] = useState([]);
        const [documents, setDocuments] = useState([]);
        const [partners, setPartners] = useState([]);
        const [loading, setLoading] = useState(true);
        const [cloudError, setCloudError] = useState("");
        const [listKeyword, setListKeyword] = useState("");
        const [listDateFrom, setListDateFrom] = useState("");
        const [listDateTo, setListDateTo] = useState("");
        const [listSort, setListSort] = useState("date_desc");

        const [isModalOpen, setIsModalOpen] = useState(false);
        const [modalType, setModalType] = useState(null);
        const [formData, setFormData] = useState({});
        const [editId, setEditId] = useState(null);
        const [renewSource, setRenewSource] = useState(null);
        const [documentForm, setDocumentForm] = useState({
          category: "보험증권",
          title: "",
          relatedType: "",
          relatedKey: "",
          link: "",
          memo: "",
        });
        const [partnerForm, setPartnerForm] = useState({
          category: "보험사",
          name: "",
          contact: "",
          manager: "",
          phone: "",
          note: "",
        });
        const [claimDrafts, setClaimDrafts] = useState({});
        const [claimsFilterStatus, setClaimsFilterStatus] = useState("전체");
        const [claimsKeyword, setClaimsKeyword] = useState("");

        const fileInputRef = useRef(null);
        const uploadTypeRef = useRef(null);
        const [uploadType, setUploadType] = useState(null);

        useEffect(() => {
          if (officeFlowEmail) {
            setIsAuthenticated(true);
          }

          let didResolveAuth = false;
          const loadingTimeout = window.setTimeout(() => {
            setLoading(false);
            setCloudError((prev) => prev || "클라우드 연결이 지연되고 있습니다.");
          }, 4000);

          const unsubscribe = onAuthStateChanged(auth, (nextUser) => {
            didResolveAuth = true;
            setUser(nextUser);
            if (nextUser) {
              window.clearTimeout(loadingTimeout);
            }
          });

          if (!auth.currentUser && officeFlowEmail) {
            window.setTimeout(() => {
              if (!didResolveAuth && !auth.currentUser) {
                setCloudError("OfficeFlow 인증 세션을 아직 확인하지 못했습니다.");
                setLoading(false);
              }
            }, 2500);
          } else if (!auth.currentUser) {
            window.setTimeout(() => {
              if (!didResolveAuth && !auth.currentUser) {
                setCloudError("로그인 세션을 확인하지 못했습니다. 다시 로그인 후 시도해주세요.");
                setLoading(false);
              }
            }, 1500);
          }

          return () => {
            window.clearTimeout(loadingTimeout);
            unsubscribe();
          };
        }, []);

        useEffect(() => {
          if (!user) return;
          const unsubSet = onSnapshot(
            doc(db, "artifacts", appId, "public", "data", "settings", "config"),
            (s) => {
              if (s.exists()) setGlobalSettings(s.data());
              else
                setDoc(doc(db, "artifacts", appId, "public", "data", "settings", "config"), {
                  adminPassword: "admin1234",
                });
            },
            (error) => {
              console.error("Settings snapshot error:", error);
              setCloudError("설정 데이터를 불러오지 못했습니다.");
            }
          );
          const unsubIns = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "insurances"),
            (s) => setInsurances(s.docs.map((d) => ({ id: d.id, ...d.data() }))),
            (error) => {
              console.error("Insurances snapshot error:", error);
              setCloudError("보험 데이터를 불러오지 못했습니다.");
            }
          );
          const unsubVeh = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "vehicles"),
            (s) => setVehicles(s.docs.map((d) => ({ id: d.id, ...d.data() }))),
            (error) => {
              console.error("Vehicles snapshot error:", error);
              setCloudError("차량 데이터를 불러오지 못했습니다.");
            }
          );
          const unsubAcc = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "accidents"),
            (s) => {
              const sortedAccidents = s.docs
                .map((d) => ({ id: d.id, ...d.data() }))
                .sort((a, b) => new Date(b.date) - new Date(a.date));
              setAccidents(sortedAccidents);
              setLoading(false);
            },
            (error) => {
              console.error("Accidents snapshot error:", error);
              setCloudError("사고 데이터를 불러오지 못했습니다.");
              setLoading(false);
            }
          );
          const unsubClaims = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "claims"),
            (s) => {
              setClaims(s.docs.map((d) => ({ id: d.id, ...d.data() })));
            },
            (error) => {
              console.error("Claims snapshot error:", error);
              setCloudError("청구 데이터를 불러오지 못했습니다.");
            }
          );
          const unsubDocs = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "documents"),
            (s) => {
              const rows = s.docs
                .map((d) => ({ id: d.id, ...d.data() }))
                .sort((a, b) =>
                  normalizeText(b.createdAt || "").localeCompare(
                    normalizeText(a.createdAt || ""),
                    "ko"
                  )
                );
              setDocuments(rows);
            },
            (error) => {
              console.error("Documents snapshot error:", error);
              setCloudError("문서 데이터를 불러오지 못했습니다.");
            }
          );
          const unsubPartners = onSnapshot(
            collection(db, "artifacts", appId, "public", "data", "partners"),
            (s) => {
              const rows = s.docs
                .map((d) => ({ id: d.id, ...d.data() }))
                .sort((a, b) =>
                    normalizeText(a.category).localeCompare(normalizeText(b.category), "ko")
                );
              setPartners(rows);
            },
            (error) => {
              console.error("Partners snapshot error:", error);
              setCloudError("업체 데이터를 불러오지 못했습니다.");
            }
          );
          return () => {
            unsubSet();
            unsubIns();
            unsubVeh();
            unsubAcc();
            unsubClaims();
            unsubDocs();
            unsubPartners();
          };
        }, [user]);

        const handleLogin = (e) => {
          e.preventDefault();
          if (officeFlowEmail) {
            setIsAuthenticated(true);
            return;
          }
          if (passwordInput === globalSettings.adminPassword) setIsAuthenticated(true);
          else alert("비밀번호 불일치");
        };

        const handlePasswordChange = async (e) => {
          e.preventDefault();
          if (formData.newPassword !== formData.confirmPassword) return alert("비밀번호 불일치");
          await setDoc(
            doc(db, "artifacts", appId, "public", "data", "settings", "config"),
            { adminPassword: formData.newPassword },
            { merge: true }
          );
          alert("변경 완료");
          setIsModalOpen(false);
          setFormData({});
        };

        const handleSave = async (e) => {
          e.preventDefault();
          if (!user) return alert("서버 연결 끊김");
          const isInsuranceMode = modalType === "insurance" || modalType === "insuranceRenew";
          const isRenewMode = modalType === "insuranceRenew";
          const colName = isInsuranceMode
            ? "insurances"
            : modalType === "vehicle"
              ? "vehicles"
              : "accidents";
          let data = { ...formData };
          delete data.id;

          if (!editId) {
            data.createdAt = serverTimestamp();
          }

          if (modalType === "vehicle" && data.ownershipType === "자차") {
            data.monthlyCost = 0;
            data.contractEnd = null;
            data.provider = "";
          }
          if (modalType === "accident") {
            const rc = Number(data.repairCost || 0),
              ip = Number(data.insurancePerson || 0),
              iprop = Number(data.insuranceProperty || 0),
              ded = Number(data.deductible || 0);
            data = {
              ...data,
              repairCost: rc,
              insurancePerson: ip,
              insuranceProperty: iprop,
              deductible: ded,
              totalCost: rc + ip + iprop + ded,
            };
          } else {
            data.amount = Number(data.amount || 0);
            data.monthlyCost = Number(data.monthlyCost || 0);
          }
          if (isInsuranceMode) {
            data.startDate = normalizeDateInput(data.startDate);
            data.endDate = normalizeDateInput(data.endDate);
            const source = renewSource || {};
            const renewalGroupId =
              normalizeText(source.renewalGroupId) ||
              normalizeText(source.id) ||
              normalizeText(data.renewalGroupId);
            data.renewalGroupId = renewalGroupId;
            data.isCurrent = isRenewMode
              ? true
              : typeof data.isCurrent === "boolean"
                ? data.isCurrent
                : true;
            data.renewedFromId = isRenewMode
              ? normalizeText(source.id)
              : normalizeText(data.renewedFromId) || "";
          }

          try {
            if (editId && !isRenewMode) {
              await updateDoc(doc(db, "artifacts", appId, "public", "data", colName, editId), data);
            } else {
              const newDoc = await addDoc(
                collection(db, "artifacts", appId, "public", "data", colName),
                data
              );
              if (isInsuranceMode) {
                const groupId = normalizeText(data.renewalGroupId) || newDoc.id;
                await updateDoc(doc(db, "artifacts", appId, "public", "data", colName, newDoc.id), {
                  renewalGroupId: groupId,
                  isCurrent: true,
                });
                const related = insurances.filter(
                  (x) =>
                    x.id !== newDoc.id &&
                    getInsuranceGroupKey({ ...x, renewalGroupId: x.renewalGroupId || x.id }) ===
                      groupId
                );
                if (related.length)
                  await Promise.all(
                    related.map((x) =>
                      updateDoc(doc(db, "artifacts", appId, "public", "data", colName, x.id), {
                        isCurrent: false,
                      })
                    )
                  );
              }
            }
            setIsModalOpen(false);
            setFormData({});
            setEditId(null);
            setRenewSource(null);
          } catch (e) {
            console.error(e);
            alert("저장 실패");
          }
        };

        const handleDelete = async (col, id) => {
          if (confirm("삭제하시겠습니까?"))
            await deleteDoc(doc(db, "artifacts", appId, "public", "data", col, id));
        };

        const handleEdit = (item, type) => {
          setFormData(item);
          setEditId(item.id);
          setModalType(type);
          setRenewSource(null);
          setIsModalOpen(true);
        };
        const handleRenewInsurance = (item) => {
          setFormData({
            type: item.type || "",
            company: item.company || "",
            name: item.name || "",
            insuredObject: item.insuredObject || "",
            startDate: normalizeDateInput(item.endDate) || "",
            endDate: "",
            amount: Number(item.amount || 0),
          });
          setEditId(null);
          setRenewSource(item);
          setModalType("insuranceRenew");
          setIsModalOpen(true);
        };

        const handleOpenAdd = (type) => {
          setFormData({});
          setEditId(null);
          setModalType(type);
          setRenewSource(null);
          setIsModalOpen(true);
        };

        const handleSaveClaim = async (accidentId, patch) => {
          const target = accidents.find((a) => a.id === accidentId);
          if (!target) return;
          const payload = {
            accidentId,
            plateNumber: target.plateNumber || "",
            driver: target.driver || "",
            amount: Number(target.totalCost || target.repairCost || 0),
            status: patch.status || "청구중",
            paidAmount: Number(patch.paidAmount || 0),
            paidDate: normalizeDateInput(patch.paidDate) || "",
            note: normalizeText(patch.note) || "",
            updatedAt: new Date().toISOString(),
          };
          await setDoc(
            doc(db, "artifacts", appId, "public", "data", "claims", accidentId),
            payload,
            { merge: true }
          );
        };

        const handleSaveDocument = async (payload) => {
          if (!payload || !payload.title) return;
          await addDoc(collection(db, "artifacts", appId, "public", "data", "documents"), {
            category: normalizeText(payload.category) || "기타",
            title: normalizeText(payload.title),
            relatedType: normalizeText(payload.relatedType) || "",
            relatedKey: normalizeText(payload.relatedKey) || "",
            link: sanitizeLink(payload.link),
            memo: normalizeText(payload.memo) || "",
            createdAt: new Date().toISOString(),
          });
        };
        const handleDeleteDocument = async (id) => {
          if (!confirm("문서를 삭제하시겠습니까?")) return;
          await deleteDoc(doc(db, "artifacts", appId, "public", "data", "documents", id));
        };

        const handleSavePartner = async (payload) => {
          if (!payload || !payload.category || !payload.name) return;
          await addDoc(collection(db, "artifacts", appId, "public", "data", "partners"), {
            category: normalizeText(payload.category),
            name: normalizeText(payload.name),
            contact: normalizeText(payload.contact) || "",
            manager: normalizeText(payload.manager) || "",
            phone: normalizeText(payload.phone) || "",
            note: normalizeText(payload.note) || "",
            createdAt: new Date().toISOString(),
          });
        };
        const handleDeletePartner = async (id) => {
          if (!confirm("업체를 삭제하시겠습니까?")) return;
          await deleteDoc(doc(db, "artifacts", appId, "public", "data", "partners", id));
        };

        const handleFileUpload = (type) => {
          uploadTypeRef.current = type;
          setUploadType(type);
          fileInputRef.current.click();
        };
        const processFile = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = async (evt) => {
            try {
              const rows = parseCSV(evt.target.result);
              if (!rows.length) return alert("데이터 없음");
              const uploadedType = uploadTypeRef.current || uploadType;
              if (!uploadedType) return alert("업로드 유형을 다시 선택해주세요.");
              const makeKey = (type, data) => {
                if (type === "insurances") {
                  return [
                    "INS",
                    normalizeText(data.type),
                    normalizeText(data.company),
                    normalizeText(data.name),
                    normalizeDateInput(data.startDate),
                    normalizeDateInput(data.endDate),
                  ].join("|");
                }
                if (type === "vehicles") {
                  return ["VEH", normalizeText(data.plateNumber)].join("|");
                }
                return [
                  "ACC",
                  normalizeDateInput(data.date),
                  normalizeText(data.plateNumber),
                  normalizeText(data.description),
                ].join("|");
              };
              const existingSet = new Set(
                (uploadedType === "insurances"
                  ? insurances
                  : uploadedType === "vehicles"
                    ? vehicles
                    : accidents
                ).map((x) => makeKey(uploadedType, x))
              );
              let inserted = 0;
              let skipped = 0;
              let failed = 0;
              for (const row of rows) {
                let d = {};
                if (uploadedType === "insurances")
                  d = {
                    type: normalizeText(row["종류"]),
                    company: normalizeText(row["보험사"]),
                    name: normalizeText(row["증권명"]),
                    insuredObject: normalizeText(row["피보험물"]),
                    startDate: normalizeDateInput(row["시작일"]),
                    endDate: normalizeDateInput(row["만기일"]),
                    amount: parseNumberSafe(row["금액"]),
                  };
                else if (uploadedType === "vehicles")
                  d = {
                    plateNumber: normalizeText(row["차량번호"]),
                    model: normalizeText(row["모델"]),
                    ownershipType: normalizeText(row["소유형태"]),
                    provider: normalizeText(row["업체명"]),
                    driver: normalizeText(row["운전자"]),
                    contractEnd: normalizeDateInput(row["만기일"]),
                    monthlyCost: parseNumberSafe(row["월비용"]),
                  };
                else if (uploadedType === "accidents") {
                  const rc = parseNumberSafe(row["수리비"]),
                    ip = parseNumberSafe(row["대인배상"]),
                    iprop = parseNumberSafe(row["대물배상"]),
                    ded = parseNumberSafe(row["자차부담금"]);
                  d = {
                    date: normalizeDateInput(row["발생일"]),
                    plateNumber: normalizeText(row["차량번호"]),
                    driver: normalizeText(row["운전자"]),
                    description: normalizeText(row["내용"]),
                    repairCost: rc,
                    insurancePerson: ip,
                    insuranceProperty: iprop,
                    deductible: ded,
                    totalCost: rc + ip + iprop + ded,
                    insuranceClaimed: normalizeText(row["보험처리여부"]) || "미처리",
                  };
                }
                const requiredOk =
                  uploadedType === "insurances"
                    ? d.type && d.company && d.name && d.startDate && d.endDate
                    : uploadedType === "vehicles"
                      ? d.plateNumber && d.model && d.ownershipType
                      : d.date && d.plateNumber && d.driver;
                if (!requiredOk) {
                  skipped++;
                  continue;
                }
                if (uploadedType === "vehicles" && d.ownershipType === "자차") {
                  d.monthlyCost = 0;
                  d.contractEnd = "";
                  d.provider = "";
                }
                const key = makeKey(uploadedType, d);
                if (!d || !key || existingSet.has(key)) {
                  skipped++;
                  continue;
                }
                try {
                  await addDoc(collection(db, "artifacts", appId, "public", "data", uploadedType), {
                    ...d,
                    createdAt: serverTimestamp(),
                  });
                  existingSet.add(key);
                  inserted++;
                } catch (err) {
                  failed++;
                }
              }
              alert(`업로드 완료\n성공 ${inserted}건 / 중복·무효 ${skipped}건 / 실패 ${failed}건`);
            } catch (e) {
              console.error(e);
              alert("오류 발생");
            }
            fileInputRef.current.value = "";
          };
          reader.readAsText(file);
        };

        const handleViewCostDetail = (accidentData) => {
          setFormData(accidentData);
          setModalType("costDetail");
          setIsModalOpen(true);
        };
        const handleViewInsuranceHistory = (insuranceItem) => {
          const target = normalizeText(insuranceItem?.insuredObject);
          const rows = insurances
            .filter((x) => normalizeText(x.insuredObject) === target)
            .sort((a, b) => {
              const ad = normalizeDateInput(a.endDate);
              const bd = normalizeDateInput(b.endDate);
              return normalizeText(bd).localeCompare(normalizeText(ad), "ko");
            });
          setFormData({ selectedInsurance: insuranceItem, insuranceHistoryRows: rows });
          setModalType("insuranceHistory");
          setIsModalOpen(true);
        };

        const stats = useMemo(() => {
          const filteredInsurances = insurances.filter((i) => {
            const startYear = getYearSafe(i.startDate);
            const endYear = getYearSafe(i.endDate);
            if (!startYear || !endYear) return false;
            return startYear <= dashboardYear && endYear >= dashboardYear;
          });
          const filteredVehicles = vehicles.filter((v) => {
            if (v.ownershipType === "자차") return true;
            if (!v.contractEnd) return true;
            const contractYear = getYearSafe(v.contractEnd);
            if (!contractYear) return true;
            return contractYear >= dashboardYear;
          });
          const filteredAccidents = accidents.filter((a) => getYearSafe(a.date) === dashboardYear);

          const tic = filteredInsurances.reduce((a, c) => a + (c.amount || 0), 0);
          const tvm = filteredVehicles.reduce((a, c) => a + (c.monthlyCost || 0), 0);
          const tac = filteredAccidents.reduce((a, c) => a + (c.totalCost || c.repairCost || 0), 0);

          const ei = insurances.filter((i) => {
            const d = getDaysDifference(i.endDate);
            return d > 0 && d <= 30;
          });
          const ev = vehicles.filter((v) => {
            const d = getDaysDifference(v.contractEnd);
            return d > 0 && d <= 30;
          });

          const annualVehicleCost = tvm * 12;
          const totalAnnualCost = tic + annualVehicleCost + tac;
          const costDist =
            totalAnnualCost > 0
              ? {
                  insurance: Math.round((tic / totalAnnualCost) * 100),
                  vehicle: Math.round((annualVehicleCost / totalAnnualCost) * 100),
                  accident: Math.round((tac / totalAnnualCost) * 100),
                }
              : { insurance: 0, vehicle: 0, accident: 0 };

          const vTypes = filteredVehicles.reduce((acc, v) => {
            const type = v.ownershipType || "기타";
            acc[type] = (acc[type] || 0) + 1;
            return acc;
          }, {});

          return {
            tic,
            tvm,
            tac,
            ei,
            ev,
            vc: filteredVehicles.length,
            ac: filteredAccidents.length,
            ic: filteredInsurances.length,
            costDist,
            vTypes,
            recentAccidents: filteredAccidents.slice(0, 4),
          };
        }, [insurances, vehicles, accidents, dashboardYear]);

        const claimsByAccidentId = useMemo(() => {
          return claims.reduce((acc, row) => {
            acc[row.accidentId] = row;
            return acc;
          }, {});
        }, [claims]);

        const alertItems = useMemo(() => {
          const list = [];
          stats.ei.forEach((i) =>
            list.push({
              level: "high",
              msg: `보험 만기 임박: ${i.name} (${i.insuredObject}) ${formatDday(i.endDate)}`,
            })
          );
          stats.ev.forEach((v) =>
            list.push({
              level: "high",
              msg: `차량 계약 만기 임박: ${v.plateNumber} ${formatDday(v.contractEnd)}`,
            })
          );
          accidents.forEach((a) => {
            const c = claimsByAccidentId[a.id];
            if (!c || c.status !== "지급완료") {
              list.push({
                level: "medium",
                msg: `미정산 사고: ${a.plateNumber} / ${formatDate(a.date)} / ${formatCurrency(a.totalCost || a.repairCost || 0)}`,
              });
            }
          });
          return list.slice(0, 20);
        }, [stats, claimsByAccidentId, accidents]);

        const yearOptions = useMemo(() => {
          const current = new Date().getFullYear();
          const years = [];
          for (let i = current - 2; i <= current + 2; i++) years.push(i);
          return years;
        }, []);
        useEffect(() => {
          setListKeyword("");
          setListDateFrom("");
          setListDateTo("");
          setListSort(
            activeTab === "insurance"
              ? "endDate_asc"
              : activeTab === "vehicle"
                ? "contractEnd_asc"
                : "date_desc"
          );
        }, [activeTab]);

        const insuranceCurrentMap = useMemo(() => {
          const byGroup = {};
          insurances.forEach((i) => {
            const g = getInsuranceGroupKey(i);
            if (!byGroup[g]) byGroup[g] = [];
            byGroup[g].push(i);
          });
          const map = {};
          Object.values(byGroup).forEach((groupRows) => {
            const sorted = [...groupRows].sort((a, b) => {
              const ad = normalizeDateInput(a.endDate);
              const bd = normalizeDateInput(b.endDate);
              if (ad !== bd) return normalizeText(bd).localeCompare(normalizeText(ad), "ko");
              return normalizeText(b.id).localeCompare(normalizeText(a.id), "ko");
            });
            if (sorted[0]) map[sorted[0].id] = true;
            sorted.slice(1).forEach((x) => {
              map[x.id] = false;
            });
          });
          return map;
        }, [insurances]);

        const currentRows = useMemo(
          () =>
            activeTab === "insurance" ? insurances : activeTab === "vehicle" ? vehicles : accidents,
          [activeTab, insurances, vehicles, accidents]
        );

        const getRowDateByTab = (row) =>
          normalizeDateInput(
            activeTab === "insurance"
              ? row.endDate
              : activeTab === "vehicle"
                ? row.contractEnd
                : row.date
          );

        const filteredRows = useMemo(() => {
          const kw = normalizeText(listKeyword).toLowerCase();
          const fromDate = normalizeDateInput(listDateFrom);
          const toDate = normalizeDateInput(listDateTo);
          const inRange = (d) => {
            if (!fromDate && !toDate) return true;
            if (!d) return false;
            if (fromDate && d < fromDate) return false;
            if (toDate && d > toDate) return false;
            return true;
          };
          let rows = currentRows.filter((row) => {
            const d = getRowDateByTab(row);
            const dateOk = inRange(d);
            if (!dateOk) return false;
            if (!kw) return true;
            if (activeTab === "insurance") {
              return [row.type, row.company, row.name, row.insuredObject].some((v) =>
                normalizeText(v).toLowerCase().includes(kw)
              );
            }
            if (activeTab === "vehicle") {
              return [row.plateNumber, row.model, row.ownershipType, row.provider, row.driver].some(
                (v) => normalizeText(v).toLowerCase().includes(kw)
              );
            }
            return [row.plateNumber, row.driver, row.description, row.insuranceClaimed].some((v) =>
              normalizeText(v).toLowerCase().includes(kw)
            );
          });
          rows = [...rows].sort((a, b) => {
            if (listSort === "cost_desc") {
              const av =
                Number(
                  activeTab === "insurance"
                    ? a.amount
                    : activeTab === "vehicle"
                      ? a.monthlyCost
                      : a.totalCost || a.repairCost
                ) || 0;
              const bv =
                Number(
                  activeTab === "insurance"
                    ? b.amount
                    : activeTab === "vehicle"
                      ? b.monthlyCost
                      : b.totalCost || b.repairCost
                ) || 0;
              return bv - av;
            }
            if (listSort === "cost_asc") {
              const av =
                Number(
                  activeTab === "insurance"
                    ? a.amount
                    : activeTab === "vehicle"
                      ? a.monthlyCost
                      : a.totalCost || a.repairCost
                ) || 0;
              const bv =
                Number(
                  activeTab === "insurance"
                    ? b.amount
                    : activeTab === "vehicle"
                      ? b.monthlyCost
                      : b.totalCost || b.repairCost
                ) || 0;
              return av - bv;
            }
            if (listSort === "plate_asc")
              return normalizeText(a.plateNumber).localeCompare(normalizeText(b.plateNumber), "ko");
            if (listSort === "name_asc")
              return normalizeText(
                activeTab === "insurance" ? a.name : activeTab === "vehicle" ? a.model : a.driver
              ).localeCompare(
                normalizeText(
                  activeTab === "insurance" ? b.name : activeTab === "vehicle" ? b.model : b.driver
                ),
                "ko"
              );
            const ad = getRowDateByTab(a);
            const bd = getRowDateByTab(b);
            if (listSort.endsWith("_asc"))
              return normalizeText(ad).localeCompare(normalizeText(bd), "ko");
            return normalizeText(bd).localeCompare(normalizeText(ad), "ko");
          });
          return rows;
        }, [currentRows, activeTab, listKeyword, listDateFrom, listDateTo, listSort]);

        const filteredClaimRows = useMemo(() => {
          const kw = normalizeText(claimsKeyword).toLowerCase();
          return accidents.filter((a) => {
            const c = claimsByAccidentId[a.id] || {};
            const d = claimDrafts[a.id] || {
              status: c.status || "청구중",
              paidDate: c.paidDate || "",
              paidAmount: c.paidAmount || 0,
              note: c.note || "",
            };
            if (claimsFilterStatus !== "전체" && d.status !== claimsFilterStatus) return false;
            if (!kw) return true;
            return [a.plateNumber, a.driver, a.description, d.status]
              .map((v) => normalizeText(v).toLowerCase())
              .some((v) => v.includes(kw));
          });
        }, [accidents, claimsByAccidentId, claimDrafts, claimsFilterStatus, claimsKeyword]);

        const menuItems = [
          { id: "dashboard", icon: "layout-dashboard", label: "대시보드" },
          { id: "insurance", icon: "shield-check", label: "보험 관리" },
          { id: "vehicle", icon: "car", label: "차량 관리" },
          { id: "accident", icon: "alert-triangle", label: "사고 내역" },
          { id: "renewal", icon: "refresh-cw", label: "만기·갱신 센터" },
          { id: "claims", icon: "receipt", label: "청구·정산 관리" },
          { id: "alerts", icon: "bell", label: "알림센터" },
          { id: "reports", icon: "file-text", label: "리포트 센터" },
          { id: "documents", icon: "folder-open", label: "증빙 문서함" },
          { id: "partners", icon: "building-2", label: "업체/계약처 관리" },
        ];

        if (!isAuthenticated)
          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up">
                <div className="bg-blue-600 p-8 text-center text-white relative">
                  <Icon name="shield-check" size={48} className="mx-auto mb-4" />
                  <h1 className="text-2xl font-bold">Corp.Manager</h1>
                  <p className="text-blue-100 text-sm mt-1">Standalone Ver.</p>
                  <div className="absolute top-2 right-2 flex items-center gap-1 bg-blue-700 px-2 py-1 rounded text-xs opacity-80">
                    {user ? (
                      <Icon name="wifi" size={12} className="text-green-300 animate-pulse" />
                    ) : (
                      <Icon name="cloud-off" size={12} />
                    )}
                    {user ? "클라우드 연동됨" : "클라우드 연결중"}
                  </div>
                </div>
                <form onSubmit={handleLogin} className="p-8 space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">비밀번호</label>
                    <div className="relative">
                      <span className="absolute left-3 top-3 text-gray-400">
                        <Icon name="lock" size={20} />
                      </span>
                      <input
                        type="password"
                        className="w-full pl-10 pr-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={passwordInput}
                        onChange={(e) => setPasswordInput(e.target.value)}
                        autoFocus
                        placeholder="비밀번호를 입력하세요"
                      />
                    </div>
                  </div>
                  <button className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-lg flex justify-center gap-2 items-center">
                    <Icon name="log-in" size={20} /> 접속
                  </button>
                </form>
              </div>
            </div>
          );

        return (
          <div className="flex h-screen">
            <input
              type="file"
              ref={fileInputRef}
              onChange={processFile}
              accept=".csv"
              className="hidden"
            />

            <aside className="w-64 bg-slate-900 text-white hidden md:flex flex-col h-screen fixed left-0 top-0 z-20 shadow-2xl">
              <div className="p-8">
                <h1 className="text-2xl font-black text-white tracking-tighter flex items-center gap-2">
                  <div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-base shadow-lg">
                    C
                  </div>
                  Corp.Manager
                </h1>
                <p className="text-slate-500 text-[10px] mt-1 uppercase tracking-widest font-bold">
                  Enterprise Solution
                </p>
              </div>
              <nav className="flex-1 px-4 space-y-2">
                {menuItems.map((m) => (
                  <button
                    key={m.id}
                    onClick={() => setActiveTab(m.id)}
                    className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-200 group ${
                      activeTab === m.id
                        ? "bg-blue-600 text-white shadow-lg shadow-blue-900/50 translate-x-1"
                        : "text-slate-400 hover:bg-slate-800 hover:text-white hover:translate-x-1"
                    }`}
                  >
                    <Icon name={m.icon} size={20} />
                    <span>{m.label}</span>
                    {activeTab === m.id && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-blue-300"></div>}
                  </button>
                ))}
              </nav>
              <div className="p-6 border-t border-slate-800">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-sm shadow-lg">
                    A
                  </div>
                  <div className="leading-tight">
                    <div className="text-sm font-bold">관리자</div>
                    <div className="text-xs text-slate-500">시스템 마스터</div>
                  </div>
                </div>
                <div
                  className={`mt-4 flex items-center gap-2 text-[11px] font-semibold px-2.5 py-2 rounded-lg border ${
                    cloudError
                      ? "text-red-300 bg-red-900/30 border-red-900/40"
                      : user
                        ? "text-emerald-300 bg-emerald-900/20 border-emerald-900/40"
                        : "text-amber-300 bg-amber-900/20 border-amber-900/40"
                  }`}
                >
                  <Icon
                    name={cloudError ? "cloud-off" : user ? "cloud" : "cloud-off"}
                    size={14}
                    className={cloudError ? "text-red-300" : user ? "text-emerald-300" : "text-amber-300"}
                  />
                  <span>{cloudError ? "클라우드 오류" : user ? "클라우드 연동됨" : "클라우드 연결중"}</span>
                </div>
                {!officeFlowEmail && (
                  <button
                    onClick={() => {
                      setModalType("password");
                      setIsModalOpen(true);
                    }}
                    className="mt-3 w-full flex items-center gap-2 px-4 py-2 text-sm text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors"
                  >
                    <Icon name="settings" size={16} /> 설정 (비밀번호)
                  </button>
                )}
              </div>
            </aside>

            <main className="flex-1 md:ml-64 overflow-y-auto p-4 md:p-8 bg-slate-100">
              {cloudError && (
                <div className="mb-4 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800 shadow-sm">
                  {cloudError}
                </div>
              )}
              <div className="md:hidden mb-4 bg-white rounded-xl border border-gray-200 p-3 shadow-sm space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-sm font-semibold text-gray-700">메뉴</span>
                  <span className={`text-xs font-semibold ${user ? "text-emerald-600" : "text-red-500"}`}>
                    {user ? "클라우드 정상" : "클라우드 확인중"}
                  </span>
                </div>
                <select
                  value={activeTab}
                  onChange={(e) => setActiveTab(e.target.value)}
                  className="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white text-gray-700"
                >
                  {menuItems.map((m) => (
                    <option key={m.id} value={m.id}>
                      {m.label}
                    </option>
                  ))}
                </select>
