                                  <td className="px-6 py-4">
                                    <span className="bg-slate-100 px-2 py-1 rounded text-xs">
                                      {v.ownershipType}
                                    </span>
                                    {v.provider && (
                                      <span className="text-xs text-gray-500 ml-1">
                                        ({v.provider})
                                      </span>
                                    )}
                                  </td>
                                  <td className="px-6 py-4">{v.driver}</td>
                                  <td className="px-6 py-4 text-right">
                                    {formatCurrency(v.monthlyCost)}
                                  </td>
                                  <td className="px-6 py-4 text-center">
                                    <button
                                      onClick={() => handleEdit(v, "vehicle")}
                                      className="inline-flex items-center gap-1 text-blue-500 hover:text-blue-700 mr-3 text-xs font-semibold"
                                    >
                                      <Icon name="edit" size={14} />
                                      수정
                                    </button>
                                    <button
                                      onClick={() => handleDelete("vehicles", v.id)}
                                      className="inline-flex items-center gap-1 text-red-500 hover:text-red-700 text-xs font-semibold"
                                    >
                                      <Icon name="trash-2" size={14} />
                                      삭제
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            {activeTab === "accident" &&
                              filteredRows.map((a) => (
                                <tr key={a.id} className="border-b hover:bg-gray-50">
                                  <td className="px-6 py-4">{formatDate(a.date)}</td>
                                  <td className="px-6 py-4">{a.plateNumber}</td>
                                  <td className="px-6 py-4 truncate max-w-xs">{a.description}</td>
                                  <td className="px-6 py-4">
                                    <span
                                      className={`px-2 py-1 rounded text-xs ${a.insuranceClaimed === "처리완료" ? "bg-blue-100 text-blue-700" : "bg-gray-100"}`}
                                    >
                                      {a.insuranceClaimed}
                                    </span>
                                  </td>
                                  <td className="px-6 py-4 text-right">
                                    <button
                                      onClick={() => handleViewCostDetail(a)}
                                      className="font-bold text-red-500 hover:text-red-700 hover:underline"
                                    >
                                      {formatCurrency(a.totalCost || a.repairCost)}
                                    </button>
                                  </td>
                                  <td className="px-6 py-4 text-center">
                                    <button
                                      onClick={() => handleEdit(a, "accident")}
                                      className="inline-flex items-center gap-1 text-blue-500 hover:text-blue-700 mr-3 text-xs font-semibold"
                                    >
                                      <Icon name="edit" size={14} />
                                      수정
                                    </button>
                                    <button
                                      onClick={() => handleDelete("accidents", a.id)}
                                      className="inline-flex items-center gap-1 text-red-500 hover:text-red-700 text-xs font-semibold"
                                    >
                                      <Icon name="trash-2" size={14} />
                                      삭제
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            {filteredRows.length === 0 && (
                              <tr>
                                <td
                                  colSpan={activeTab === "insurance" ? 7 : 6}
                                  className="px-6 py-10 text-center text-gray-400"
                                >
                                  조건에 맞는 데이터가 없습니다.
                                </td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                </>
              )}
            </main>

            {isModalOpen && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                <div
                  className={`bg-white rounded-xl shadow-2xl w-full overflow-hidden animate-fade-in-up ${modalType === "insuranceHistory" ? "max-w-5xl" : "max-w-md"}`}
                >
                  <div className="bg-slate-800 p-4 text-white flex justify-between">
                    <h3 className="font-bold flex items-center gap-2">
                      <Icon
                        name={
                          modalType === "password"
                            ? "key"
                            : modalType === "costDetail"
                              ? "file-text"
                              : modalType === "insuranceHistory"
                                ? "history"
                                : editId
                                  ? "edit"
                                  : "plus"
                        }
                        size={18}
                      />
                      {modalType === "password"
                        ? "비밀번호 변경"
                        : modalType === "costDetail"
                          ? "사고 비용 상세"
                          : modalType === "insuranceHistory"
                            ? "피보험물 보험 이력"
                            : modalType === "insuranceRenew"
                              ? "보험 갱신 등록"
                              : editId
                                ? "정보 수정"
                                : "신규 등록"}
                    </h3>
                    <button
                      onClick={() => {
                        setIsModalOpen(false);
                        setRenewSource(null);
                      }}
                    >
                      <Icon name="x" />
                    </button>
                  </div>
                  {modalType === "password" ? (
                    <form onSubmit={handlePasswordChange} className="p-6 space-y-4">
                      <input
                        type="password"
                        placeholder="새 비밀번호"
                        className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={formData.newPassword || ""}
                        onChange={(e) => setFormData({ ...formData, newPassword: e.target.value })}
                        required
                      />
                      <input
                        type="password"
                        placeholder="비밀번호 확인"
                        className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        value={formData.confirmPassword || ""}
                        onChange={(e) =>
                          setFormData({ ...formData, confirmPassword: e.target.value })
                        }
                        required
                      />
                      <button className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold">
                        변경 저장
                      </button>
                    </form>
                  ) : modalType === "costDetail" ? (
                    <div className="p-6">
                      <div className="space-y-4 text-sm">
                        <div className="flex justify-between p-3 bg-gray-50 rounded-lg">
                          <span className="text-gray-600">수리비</span>
                          <span className="font-bold text-gray-800">
                            {formatCurrency(formData.repairCost || 0)}
                          </span>
                        </div>
                        <div className="flex justify-between p-3 bg-gray-50 rounded-lg">
                          <span className="text-gray-600">자차 부담금</span>
                          <span className="font-bold text-gray-800">
                            {formatCurrency(formData.deductible || 0)}
                          </span>
                        </div>
                        <div className="flex justify-between p-3 bg-blue-50 rounded-lg border border-blue-100">
                          <span className="text-blue-600">대인 배상</span>
                          <span className="font-bold text-blue-800">
                            {formatCurrency(formData.insurancePerson || 0)}
                          </span>
                        </div>
                        <div className="flex justify-between p-3 bg-blue-50 rounded-lg border border-blue-100">
                          <span className="text-blue-600">대물 배상</span>
                          <span className="font-bold text-blue-800">
                            {formatCurrency(formData.insuranceProperty || 0)}
                          </span>
                        </div>
                        <div className="flex justify-between p-4 bg-slate-800 text-white rounded-lg mt-4 shadow-sm">
                          <span className="font-medium">총 합계</span>
                          <span className="font-bold text-lg">
                            {formatCurrency(formData.totalCost || 0)}
                          </span>
                        </div>
                      </div>
                      <button
                        onClick={() => setIsModalOpen(false)}
                        className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-bold mt-6 hover:bg-gray-300 transition-colors"
                      >
                        닫기
                      </button>
                    </div>
                  ) : modalType === "insuranceHistory" ? (
                    <div className="p-6">
                      <div className="mb-3 text-sm text-gray-700">
                        <span className="font-bold">피보험물:</span>{" "}
                        {formData.selectedInsurance?.insuredObject || "-"}
                      </div>
                      <div className="max-h-[55vh] overflow-auto border border-gray-200 rounded-lg">
                        <table className="w-full text-sm text-left">
                          <thead className="bg-gray-50 text-gray-500">
                            <tr>
                              <th className="px-3 py-2">증권명</th>
                              <th className="px-3 py-2">보험사</th>
                              <th className="px-3 py-2">기간</th>
                              <th className="px-3 py-2">상태</th>
                              <th className="px-3 py-2 text-right">금액</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {(formData.insuranceHistoryRows || []).map((row) => {
                              const current =
                                row.isCurrent !== undefined
                                  ? row.isCurrent
                                  : insuranceCurrentMap[row.id];
                              return (
                                <tr key={row.id} className="hover:bg-gray-50">
                                  <td className="px-3 py-2 whitespace-nowrap">{row.name}</td>
                                  <td className="px-3 py-2 whitespace-nowrap">{row.company}</td>
                                  <td className="px-3 py-2 whitespace-nowrap">
                                    {formatDate(row.startDate)} ~ {formatDate(row.endDate)}
                                  </td>
                                  <td className="px-3 py-2 whitespace-nowrap">
                                    {current ? (
                                      <span className="px-2 py-1 rounded text-[10px] bg-emerald-100 text-emerald-700 font-semibold">
                                        현재
                                      </span>
                                    ) : (
                                      <span className="px-2 py-1 rounded text-[10px] bg-slate-100 text-slate-600 font-semibold">
                                        이력
                                      </span>
                                    )}
                                  </td>
                                  <td className="px-3 py-2 text-right font-semibold whitespace-nowrap">
                                    {formatCurrency(row.amount || 0)}
                                  </td>
                                </tr>
                              );
                            })}
                            {(!formData.insuranceHistoryRows ||
                              formData.insuranceHistoryRows.length === 0) && (
                              <tr>
                                <td colSpan="5" className="px-3 py-8 text-center text-gray-400">
                                  이력 데이터가 없습니다.
                                </td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                      <button
                        onClick={() => setIsModalOpen(false)}
                        className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-bold mt-6 hover:bg-gray-300 transition-colors"
                      >
                        닫기
                      </button>
                    </div>
                  ) : (
                    <form
                      onSubmit={handleSave}
                      className="p-6 space-y-4 max-h-[70vh] overflow-y-auto"
                    >
                      {(modalType === "insurance" || modalType === "insuranceRenew") && (
                        <>
                          <div className="grid grid-cols-2 gap-3">
                            <select
                              className="w-full border p-2 rounded"
                              value={formData.type || ""}
                              onChange={(e) => setFormData({ ...formData, type: e.target.value })}
                              required
                            >
                              <option value="">종류 선택</option>
                              <option value="화재보험">화재보험</option>
                              <option value="자동차보험">자동차보험</option>
                              <option value="배상책임">배상책임</option>
                              <option value="기타">기타</option>
                            </select>
                            <input
                              type="text"
                              placeholder="보험사"
                              className="w-full border p-2 rounded"
                              value={formData.company || ""}
                              onChange={(e) =>
                                setFormData({ ...formData, company: e.target.value })
                              }
                              required
                            />
                          </div>
                          <input
                            type="text"
                            placeholder="증권명"
                            className="w-full border p-2 rounded"
                            value={formData.name || ""}
                            onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                            required
                          />
                          <input
                            type="text"
                            placeholder="피보험물 (대상)"
                            className="w-full border p-2 rounded"
                            value={formData.insuredObject || ""}
                            onChange={(e) =>
                              setFormData({ ...formData, insuredObject: e.target.value })
                            }
                            required
                          />
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="text-xs text-gray-500">시작일</label>
                              <input
                                type="date"
                                className="w-full border p-2 rounded"
                                value={formData.startDate || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, startDate: e.target.value })
                                }
                              />
                            </div>
                            <div>
                              <label className="text-xs text-gray-500">만기일</label>
                              <input
                                type="date"
                                className="w-full border p-2 rounded"
                                value={formData.endDate || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, endDate: e.target.value })
                                }
                              />
                            </div>
                          </div>
                          <input
                            type="number"
                            placeholder="연간 보험료 (원)"
                            className="w-full border p-2 rounded"
                            value={formData.amount || ""}
                            onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                            required
                          />
                        </>
                      )}
                      {modalType === "vehicle" && (
                        <>
                          <div className="grid grid-cols-2 gap-3">
                            <input
                              type="text"
                              placeholder="차량번호"
                              className="w-full border p-2 rounded"
                              value={formData.plateNumber || ""}
                              onChange={(e) =>
                                setFormData({ ...formData, plateNumber: e.target.value })
                              }
                              required
                            />
                            <input
                              type="text"
                              placeholder="모델"
                              className="w-full border p-2 rounded"
                              value={formData.model || ""}
                              onChange={(e) => setFormData({ ...formData, model: e.target.value })}
                              required
                            />
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <select
                              className="w-full border p-2 rounded"
                              value={formData.ownershipType || ""}
                              onChange={(e) => {
                                const v = e.target.value;
                                setFormData({
                                  ...formData,
                                  ownershipType: v,
                                  monthlyCost: v === "자차" ? 0 : formData.monthlyCost,
                                  provider: v === "자차" ? "" : formData.provider,
                                });
                              }}
                              required
                            >
                              <option value="">소유형태</option>
                              <option value="자차">자차</option>
                              <option value="리스">리스</option>
                              <option value="렌트">렌트</option>
                            </select>
                            <input
                              type="text"
                              placeholder="운전자"
                              className="w-full border p-2 rounded"
                              value={formData.driver || ""}
                              onChange={(e) => setFormData({ ...formData, driver: e.target.value })}
                            />
                          </div>
                          {formData.ownershipType && formData.ownershipType !== "자차" && (
                            <input
                              type="text"
                              placeholder="리스/렌트 업체명 (예: 롯데렌터카)"
                              className="w-full border p-2 rounded bg-blue-50"
                              value={formData.provider || ""}
                              onChange={(e) =>
                                setFormData({ ...formData, provider: e.target.value })
                              }
                            />
                          )}
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="text-xs text-gray-500">월 비용</label>
                              <input
                                type="number"
                                className="w-full border p-2 rounded"
                                disabled={formData.ownershipType === "자차"}
                                value={formData.monthlyCost || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, monthlyCost: e.target.value })
                                }
                              />
                            </div>
                            <div>
                              <label className="text-xs text-gray-500">계약 만료</label>
                              <input
                                type="date"
                                className="w-full border p-2 rounded"
                                disabled={formData.ownershipType === "자차"}
                                value={formData.contractEnd || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, contractEnd: e.target.value })
                                }
                              />
                            </div>
                          </div>
                        </>
                      )}
                      {modalType === "accident" && (
                        <>
                          <select
                            className="w-full border p-2 rounded"
                            value={formData.vehicleId || ""}
                            onChange={(e) => {
                              const v = vehicles.find((x) => x.id === e.target.value);
                              setFormData({
                                ...formData,
                                vehicleId: e.target.value,
                                plateNumber: v?.plateNumber,
                              });
                            }}
                            required
                          >
                            <option value="">차량 선택</option>
                            {vehicles.map((v) => (
                              <option key={v.id} value={v.id}>
                                {v.plateNumber}
                              </option>
                            ))}
                          </select>
                          <div className="grid grid-cols-2 gap-3">
                            <input
                              type="date"
                              className="w-full border p-2 rounded"
                              value={formData.date || ""}
                              onChange={(e) => setFormData({ ...formData, date: e.target.value })}
                              required
                            />
                            <input
                              type="text"
                              placeholder="운전자"
                              className="w-full border p-2 rounded"
                              value={formData.driver || ""}
                              onChange={(e) => setFormData({ ...formData, driver: e.target.value })}
                              required
                            />
                          </div>
                          <textarea
                            placeholder="사고 내용 상세"
                            className="w-full border p-2 rounded h-20"
                            value={formData.description || ""}
                            onChange={(e) =>
                              setFormData({ ...formData, description: e.target.value })
                            }
                            required
                          ></textarea>
                          <div className="bg-gray-50 p-3 rounded border border-gray-200">
                            <p className="text-xs font-bold text-gray-500 mb-2">비용 상세 (원)</p>
                            <div className="grid grid-cols-2 gap-2 text-sm">
                              <input
                                type="number"
                                placeholder="수리비"
                                className="border p-2 rounded"
                                value={formData.repairCost || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, repairCost: e.target.value })
                                }
                              />
                              <input
                                type="number"
                                placeholder="자차부담금"
                                className="border p-2 rounded"
                                value={formData.deductible || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, deductible: e.target.value })
                                }
                              />
                              <input
                                type="number"
                                placeholder="대인배상"
                                className="border p-2 rounded"
                                value={formData.insurancePerson || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, insurancePerson: e.target.value })
                                }
                              />
                              <input
                                type="number"
                                placeholder="대물배상"
                                className="border p-2 rounded"
                                value={formData.insuranceProperty || ""}
                                onChange={(e) =>
                                  setFormData({ ...formData, insuranceProperty: e.target.value })
                                }
                              />
                            </div>
                          </div>
                          <select
                            className="w-full border p-2 rounded"
                            value={formData.insuranceClaimed || "미처리"}
                            onChange={(e) =>
                              setFormData({ ...formData, insuranceClaimed: e.target.value })
                            }
                          >
                            <option>미처리</option>
                            <option>처리완료</option>
                            <option>진행중</option>
                          </select>
                        </>
                      )}
                      <div className="grid grid-cols-2 gap-2 pt-1">
                        <button
                          type="button"
                          onClick={() => {
                            setIsModalOpen(false);
                            setFormData({});
                            setEditId(null);
                            setRenewSource(null);
                          }}
                          className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-300 transition-colors"
                        >
                          취소
                        </button>
                        <button className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-lg">
                          {modalType === "insuranceRenew"
                            ? "갱신 저장"
                            : editId
                              ? "수정 완료"
                              : "저장하기"}
                        </button>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }
      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
